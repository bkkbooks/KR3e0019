湯下亦得黏食不消成氣塊即用煮麵湯下食牛羊魚鱉肉成氣塊不散即用湯汁下宿酒不醒酒下血氣不調當歸酒下妊娠不服産後淡茶下加至七丸小兒三丸常服一兩丸水氣檳榔散治水疾及諸般氣腫大效白檳榔勿用大腹子不得見猛火煨令微黃用半兩芫花醋拌炒令乾澤㵼甜葶藶隔紙於銚子內炒令紫色漢防己郁李仁湯浸去皮微炒各一兩陳橘皮去瓤炒半兩瞿麥只取花用半兩藳本一分大戟三分銼碎微炒滑石三分右件細杵為末每服一錢用桑白皮濃煎湯空心調下當時取碧緑水後如爛羊脂即差如未盡隔日再服看腫消如故更不用服如治水疾忌鹽一百日逐氣散治水疾樟栁根不限多少去粗皮薄切隂乾日曬亦得為末右用黃顙魚三頭大蒜三箇菉豆一合以水一大碗同煮以豆爛為度先將豆任意喫後却以汁調藥末二錢其水即化為氣消也腳氣訶子散治腳氣疼痛發熱腫悶或上攻或即吐逆令人不覺大抵地方多卑濕處多厥狀多般有此疾訶子大腹煨熱和皮用木香漢防己紫蘇莖子乾木瓜羌活芍藥沈香杉木節各半兩右十味銼為細末分作十服每服用水八合煎至二合去滓通口服每二服滓併煎一服兼大治風氣上衝烏藥散治乾濕腳氣烏藥一兩蒔蘿一分二味各炒令黃色右同為末溫酒下二錢若是乾腳氣用苦楝子一箇拍開水一升煎至五合調下立差小便證犀灰散治小便澀筒管內痛聖濟總録作蠶灰散用蠶退紙不拘多少燒灰細研入麝香少許和勻每服二錢米飲調下薑黃散治血臟久冷腹疼痛小便濃白泔薑黃二兩大附子一兩炮紅芍藥半兩牡丹皮一分紅藍子半兩芫花一分醋浸過炒令黃色木香一分栁桂半兩去皮荆三稜半兩沒藥一分郁李仁一分去皮右一十一味同為末每服一大錢如腹痛用當歸沒藥酒煎服水七分酒三分同煎及七分熱服大便證白豆蔲散治脾胃氣不和止脾泄瀉痢白豆蔲二兩用仁一半生一半熟枳殼半斤去瓤以漿水煮軟麩炒令香止肉桂二兩去皮橘皮二兩去瓤炒切細訶子二兩去核半生半熟當歸二兩洗了銼碎右六味杵為末每服一錢水一中盞薑棗同煎至七分稍熱服如要丸用好棗漿水煮去皮核細研為丸如桐子大以薑擘破炒令黑色入水煎湯下十五丸小草還丹補脾腎虛冷止大腸滑泄地黃半斤銼炒令黑黃色茱萸三兩青橘皮去白萆薢甘薑石榴皮各二兩厚朴一兩半薑汁炙令黃香為度右七味為末醋糊為丸如梧桐子大每服空心米飲下三十丸或嚼破生薑米飲下保安丹治脾元虛滑及久患㵼服藥未效日夜不止臍腹冷疼及一切氣刺氣痛聖濟總録作保安丸附子炮當歸陳橘皮去白乾薑炮各一兩蜀椒去子厚朴去皮以薑汁炙令香熟吳茱萸各半兩舶上硫黃一分另研至細右八味同為細末硫黃末和勻以米醋和作劑分為兩團别用白麵半斤裹上件藥令勻如燒餅法煨令麵熟為度麵入臼內杵三五百下丸如梧桐子大每患一切氣痛及宿酒食不消炒薑鹽湯下二十丸如患㵼痢米飲下丁香散治脾泄瀉厚朴半兩去皮用生薑汁塗炙令香黃檳榔一箇火煨過肉豆蔲二箇去皮麵裹煨丁香二錢焙過右四味同杵為末每服二錢用粥飲煎三二沸溫湯服以少許清粥飲衝下草豆蔲散治胃口冷喫食無味及脾泄㵼不止兼大治酒後數圊如痢心胸不快不思飲食草豆蔲半兩每箇麵裹煨候麵焦黃去麵用甘草一兩炙肉桂去皮一兩陳橘皮去瓤一兩蠻薑一兩右五味同為細末每服一錢半更入陳米末一錢水一盞棗一枚同煎七分溫服其滓再煎服之橘皮煮散治脾元氣不和泄痢不止腹內雷鳴氣脹膨滿冷氣刺痛及解傷寒橘皮去白白术各二兩訶子乾薑炮官桂去皮枳殼去瓤麩炒木香人參甘草炮以上各一兩草豆蔲七枚去皮檳榔五枚厚朴一兩半薑汁塗炙黃半夏二分湯洗二十度用右十三味杵羅為末每服二錢生薑三片棗子二枚水一盞同煎七分去滓溫服神聖香薑散治久患脾泄瀉宣連一兩勻銼如豆大生薑四兩勻挫如黑豆大右二味一處以慢火炒令乾薑脆深赤色即止去薑取出只要黃連研為細末每服二錢空心臘茶甚者不過二服即差大聖散治脾元臟冷滑不止腹痛絞刺和隂氣進食川烏頭四兩生用益智子三兩去皮乾薑二兩生用青橘皮二兩􅚬香一兩舶上者右五味同杵為末每服一大錢水一大盞入鹽一捻煎至五分溫服如小腸氣攻刺急煎一二服熱喫訶子散治脾胃虛冷滑泄不思飲食和一切冷氣訶子炮去皮厚朴去皮薑汁塗炙黃香甘草炙白术炒草豆蔲炮去皮陳橘皮去瓤各等分右六味同杵為末每服一大錢水一盞入薑棗同煎至七分溫服煨肝散治脾元虛冷滑泄不止口內生瘡腹中冷不思飲食暖胃消食止㵼蒼术三兩縮砂去皮柴胡去苗厚朴薑汁炙去皮桔梗各一兩蕪荑三分桂心二分去皮陳橘去瓤逺志去心北紫菀各半兩胡椒一分右十一味同杵為末以細絹篩為散每服以豶豬肝四兩切作片每片用末一大錢匕糝於肝上入蔥白蒔蘿鹽等令有滋味一重重布了麵片裹之糖灰火內煨令通熱麵焦黃色即得去麵取肝空腹服之其麵可二分以來或細切肝以散拌和如作角子如常煿熱食之亦得並以薄米飲下之忌生冷毒物等如聖散治腸風㵼血日夜不止車螯一合二箇皂角刺四十九箇硇砂硃砂乳香各一分三味同研右四味入車螯合內以蚯蚓裹用炭火六斤煆火盡為度取出研為細末入心溫酒調下一錢紫金膏治腸風㵼血兼療痔漏龍腦麝香滴乳香雄黃蜜陀僧已上五味各挑一錢砒霜半分硃砂一分阿魏一分安息香一分右乳香安息阿魏以熟水浸之通軟用大碗中以乳石研令細其有龍腦麝香硃砂蜜陀僧雄黃都碾為末其砒霜入菉豆粉二兩同研令細更用巴豆三粒去皮心膜以水一大碗浸之一日六度换水取出後用拾重紙出油亦研細與藥都一處研勻方入濕藥中令和攤在碗中俟通手便丸之如豆大空心好溫茶下一丸心痛水㵼生薑湯下一丸食癥麵湯下氣痛溫酒下一丸大妙烏金散治逺年近日腸風下血不止枳殼不以多少燒成黑灰存性便以盞子合定為細末羊脛炭不以多少為細末右二件用枳殼末五錢炭末三錢和令勻用米飲一中盞調下空心服再服見效十便良方名黑龍散敗毒散治脾毒下血臟腑疼痛頻往圊厮後重弩咽槐花炒白礬燒及八分許存性二味等分是生時稱右二味同為末每服一錢烏梅一箇水一盞煎六分去滓溫服芍藥散治非時下血及血痢赤芍藥一兩半官桂去皮三兩甘草半兩炮右藥同為末每一錢水一盞生薑半斤餳少許同煎至七分溫服烏犀丸治臟毒下血不止用淡豆䜴大蒜去皮苗等分一處杵令和勻可丸即丸如梧桐子大每服鹽湯下三十四丸久患痢亦冝服之中毒歸魂散解中藥毒煩燥吐血口內如針刺者北礬一兩茶草一兩右二味同搗為細末作一服以新汲水調之立解此藥入口其味甘甜並不覺苦味者是也必併服兩服盡五更初一服如人行三五里再進一服當日見效忌油膩毒物萬靈丹解一切藥毒及蟲毒金蠶等毒光明硃砂一兩須是辰州者令人淨潔面東研一伏時黃沙牛膽一枚取汁如無新者隂乾者用時以溫水浸軟溫水調用大天南星三兩為末生用右以膽汁和溲前二味為丸如皂子大隂乾如有中諸毒者但頭肚未裂皆可救療服時先取汁腳以新水洗之澄取清者半盞入鹽磨化一丸頓服續以薄粥投之以吐為度其疾永除保靈丹解蠱毒即一切藥毒方缺博濟方卷三
