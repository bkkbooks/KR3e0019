滿肚上青筋疥蝦蟆十枚洗去腹肚以酒浸炙令黄香即住木香一分胡黄連半兩黄連半兩九節者沉香一分丁香一分麝香少許木鼈半兩燒令烟盡用乾薑一錢燒令存性用巴豆二十二粒以水淘洗去心膜并油並以紙裹用重物壓去油再研如麫止右十味細杵羅為末以水浸蒸餅為丸如蘿蔔子大空心臨卧米飲下一丸三嵗以上二丸至三丸忌粘滑物方治小兒走馬疳蝕透損骨者及小可攻蝕用之必效用大天南星一枚當心剜作坑子安好雄黄一塊在内用麥麫裹火内燒候雄黄鎔作汁以盞子合定出火毒一宿去麫研為細末入好麝香少許掃在瘡上秋霜散治小兒走馬疳蝕唇頰齒牙浮動宣露口臭至妙信砒一分粉霜半錢膩粉半錢麝香少許右四味同研令細如粉毎用時以指頭拈一粟米許揩在患處牙齦上立効麝香丸治小兒疳熱化食壓驚麝香青黛雷丸鶴蝨管仲黄連各一兩扁豆一十四箇油煎去皮右七味除麝香青黛外一處杵羅為細末於乳鉢内再研和匀用獖豬膽汁和蒸餅為丸如菉豆大毎服五七丸空心日午米飲下看兒大小加減如常服尤妙青黛散治小兒疳熱殺蟲青黛半兩好者細研宣連一錢半為末苦楝根三兩細切炮乾為末雄黄一分通者别研硃砂一分好者别研麝香一分依上别研夜明砂半兩别研川大黄半兩細剉蒸三度焙乾為末取用蕪荑半兩别研右九味為細末毎服看兒大小服一錢半錢如若用蜜水調下日再服米飲調下亦可此宜常服萬金散治小兒疳蚘咬心痛面伏地卧口吐清水痰涎白檳榔半分苦楝根石榴根皮鶴虱藜蘆右五味同為末空心熱茶調下一錢更臨時看兒大小加減藥忌餳糖黏滑食凡疳在内即眼澀肚脹痢色無定或如靛青日漸瘦弱此乃内疳之候若鼻下赤爛自揉鼻頭上有瘡瘡不著痂漸漸遶耳生瘡頭大項細此腦疳之候若唇被蝕齒作五色或峭黒口下疳白瘡上腭孔子口中臭氣唇齒槁爛此乃口疳之候若下部開張痢下膿血有時赤爛痛不可忍痢下又無度臭不可聞此是患疳之候萬壽方治小兒疳氣羸瘦腹大頸小頭髮稀疎臟腑不調或㵼秘乾蝸牛半兩乾蚯蚓半兩蛇蜕皮一分乾蝦蟇三箇使君子五箇炮麝香一分右上四味入罐子内封閉口炭火燒通赤同後二味研細取為丸如菉豆大毎服五丸米飲下一日二服胡連丸治小兒疳㵼痢等極妙胡黄連丁香蜜陀僧各半兩肉豆蔲一箇右件同研細入麝香一分和匀次入菉豆末少許同水和為丸如麻子大兒三嵗以下一丸三嵗以上五丸孩子腦疳鼻癢及赤爛黄連湯下脾虚羸瘦泄痢四肢虚腫青州棗湯下肝疳眼澀生瘡甘草湯下骨疳冷地卧愛食土紫蘇茶湯調下常服米飲下肺疳上氣急喘橘皮湯下筋疳㵼血鹽湯下蟲疳及㵼無定生薑湯下雜病真珠散治小兒吐妳及霍亂吐㵼不止石亭脂抄一錢匕白滑石抄三錢匕右二味同研千餘遍看兒大小生薑糯米泔調下一字立差乳香丸治小兒霍亂吐㵼不定半夏半兩湯洗七遍生薑汁炒黄乳香砂仁各一錢研右三味為末麫糊為丸如菉豆大毎服五丸米飲下日三服方治小兒未及周嵗吐㵼不止此乳母氣血動榮或熱奶傷胃致有痰涎雄黄好者少許大黄五靈脂各等分右三味同研為細末毎服一字磨刀水調下香朴散治小兒脾痛兼和氣止㵼及腹肋刺痛起止疼痛不思飲食厚朴一兩木香一分麥糪一分炒神麯一分炒青橘去白一分陳橘去白一分右六味同為細末毎服半錢温水調下煅金液丹治小兒三五嵗患無辜㵼痢亦可服硫黄一名石亭脂一名金液取三五兩至十兩並煅得舶上黄為第一餘黄並使得但無夾襍為上碎碾入罐子内可及八九分無妨右件藥取煅藥罐子一箇盛藥在内下蓋子了採狗蹄草一大握本名石龍芮木鑑草一大握稻田中生一莖四花如田字亦名水田草獨莖生將二草入鐵臼内爛𢷬更入一掬黄土同杵匀如泥若無上件二草且只使益母草代之亦可便將裹藥罐子底下并周匝可厚五六分只至口縫不裹然後置於平地上四面簇炭五六斤上面安熟火一斤以來燒之直候火燒藥罐子九分來通赤専看口縫處有碧焰子起便急手撥炭火急將柴灰三斗都蓋勿令氣燄出直候冷撥灰取出刮去泥土以上是煅一度訣也度度依此煅之第二度依前法杵藥草裹固煅之如前法煅五度若火候得所煅出如熟雞子香即是候也若急要服只煅兩度亦可服之煅度數多者為妙煅度數足便於凈地上埋爐子一宿出火毒凡逐度煅了刮去下面砂石尤妙又取出爐子於銚子著水煮一二十沸然後敲破爐子取藥杵爛更入乳鉢内㸃煎水研爛如泥並無粗者却研令乾毎一兩藥用蒸餅一兩以來浸握出水了入藥内和合更於茶臼内杵令匀如麫可丸如梧桐子大日晒乾孩子留末子細研以米飲調以盂子灌之夜啼心驚妳傷有痰涎者並速研藥一分以來令服之日二服自然便效逐下積物多多與服並無忌若三五嵗患無辜㵼痢並服得烏龍散治小兒秋後㵼痢久患不差大腸滑泄龍骨黄丹定粉豬指甲子各等分右四味同入一磁器罐子内安藥以物塞口用火煅令通赤放冷取出研為末毎服半錢米飲調下使君子丸治小兒臟腑虚滑及疳瘦下痢腹脹不思飲食使君子一兩麫裹煨以麫黄為度甘草半兩炙厚朴半兩去皮薑汁炙令香陳橘皮去白一分青黛半兩如是夾驚及帶熱㵼即入此一味如只是臓腑不調不用此味訶子半兩半生半煨去核用右件同為細末煉蜜為丸如雞豆大三嵗以上毎服一丸米飲化下兒年百日以上三嵗以下毎服半丸乳汁或清米飲化下胡黄連丸治小兒疳痢㵼痢等極妙胡黄連半兩肉豆蔲一箇檳榔一枚丁香半兩訶子二枚以一枚煨一枚生用紅雪一兩蜜陀僧半兩右七味同研細末入麝香一分和匀次入菉豆末少許同水和為丸如麻子大兒三嵗以下一丸三嵗以上五丸孩子腦疳鼻痒及爛黄連湯下脾胃羸瘦泄痢四肢虚腫青州棗湯下肝疳眼澀生瘡甘草湯下骨疳冷地卧愛食土紫蘇茶調下常服米飲子下肺疳上氣急喘橘皮湯下筋疳㵼血鹽湯下疳蟲及㵼無定生薑湯下如聖散治小兒多時㵼痢眼生醫膜并疳眼翳蛇蜕皮二條各長二尺用紙燭燒炭研榖精草一兩去根土蟬殻一分去足黒附子末二錢去臍子石决明一分定粉四錢右件前三味先𢷬羅為末次入諸藥研為散毎服一字半羊子肝一具切破糝末用麻皮線纒米泔煮熟先熏眼後與喫如未能喫食研汁灌之木香丸治小兒調中順氣補虚草豆蔲五箇和皮人參茯苓防風藿香陳橘皮去白各一兩右六味同為細末毎服一字或半錢薑鹽米飲調下葶藶丸治小兒妳食衝脾傷風欬嗽墜涎甜葶藶一兩紙上炒過牽牛子一兩爁熟漢防己一兩爁熟大杏仁一兩去皮尖炒熟研右三味先𢷬羅為末入杏仁同研用煮棗肉再杵為劑丸如菉豆大毎服三丸至五丸淡生薑湯吞下一日二服燒青丸治小兒妳癖食癖毎至午後時作寒熱微有欬嗽脇肋癖硬輕粉二錢𤣥精石一分粉霜一錢硇砂一錢白麫三兩右五味同細研滴水和為餅子以文武火燒熟為度再研滴水和丸如黄米大毎服七丸漿水下三嵗以下服五丸肉湯丸治小兒瘕呷咳不止銅青大黄豬牙皂角各為末各炒一錢右三味同研令細用油餅麫和為丸如小豆大毎服五七丸煎豬肉湯下忌酸鹹龍腦膏治小兒風熱咽喉腫疼塞悶生瘡搔頭燥悶及蟲咬心痛龍腦半錢白礬一分銚子内煉過煎却礬汁泣乾為度𤣥明粉一錢蟬殻三十箇去足研末炒蛇退皮一條長二尺鐡器上􅏼焦為度旋除下黒者生者再煿須𦂳按實著鐵器焦後研為末牛黄研半字右六味一處煉研入砂糖少許和為劑丸桐子大冷水化一丸方治小兒牙宣常有鮮血不止牙齦臭爛者雌黄炒一大錢麝香炒半錢右件同研至細先用紙條子以生油塗之然後糝末在上少用末剪作小片子尖看大小用插在爛動處一服差丹砂丸消除積滯化胃久伏積聚巴豆一分去皮以米醋煮一二十沸却入新水内洗七遍凈去膜并心及乳鉢内一向研如粉量出油豆蔲四箇為末木香硃砂研細各一分右同研令細以麫糊和為丸如菘菜子大毎服三五丸小兒一丸酒食所傷鹽湯下温水亦得小兒疳氣肚脹腹聚米飲下抵聖丸治下虚中積久曽取轉不得者犀角鎊末二錢蝎梢三七箇銀末硃砂各一兩巴豆二十八枚去皮膜莞花二錢同巴豆用好醋二盞煮令醋盡揀出巴豆以冷水浸洗控乾再炒令乾𢷬末取二分用右同為細末再研如麫將巴豆别研如糊和匀以水煮麫糊為丸如小菉豆大如小兒因驚積聚黏滑毒物在於脾胃累曽取下變成虚積棗湯下體熱困悶眼合不開黄連甘草薄荷桃仁湯化膩粉一字許下一嵗以上三嵗以下二丸小可只一丸米飲下大人喫食吐逆心腹脹滿夜有盜汗日漸羸瘦用薑棗湯下婦人血氣米醋湯下五七丸更在臨時約其虚實加減用之張氏家𫝊方名紫金丹香葛散治小兒上焦虚熱喫水不止枇杷子炒過乾薑胡黄連甘草黒參麥門冬各等分右六件同為細末毎服一錢水一盞生薑一片煎至七分後更入蜜少許再煎至五分放温食後服犀角散治小兒骨熱晩後多發熱面赤五心煩悶四肢無力飲食減少夜多盜汗面色痿黄犀角鎊末柴胡去蘆枳殻麩炒去瓤麥門冬去心茯苓去皮芍藥大黄桑白皮人參以上各一分黄耆鼈甲一箇九肋醋炙令黄右十一味同為細末毎服半錢用桃仁九箇漿水煮麥門冬一十九箇去心共桃仁同研令細入水一盞與藥同煎至六分去滓温服早食後卧各一服亦治大人盜汗靈砂丹治衆疾及小兒瘹風硃砂半兩大附子炮青橘去白杏仁去皮尖各一兩巴豆以水五升慢火煮三十沸春冬用一百箇秋夏用五十枚右先將巴豆以水五升煮令油出水盡為度細研與衆藥末和以粳米飯和為丸如豌豆大小兒瘹風桃栁枝一握煎下小兒肚脹石榴湯下小兒及患人相度虚實加減服一方用麫薑一兩炮金鏇散治大人小兒衆疾白附子炮木香肉豆蔲去皮肉桂取心大黄生桔梗呉茱茰麩炒白蕪荑取仁芍藥川芎凈知母白茯苓當歸豬牙皂角去皮生白僵蠶二分直者檳榔二箇一箇生箇熟巴豆去皮日日換湯浸二七日又用麥麩水煮一日細研黄連取凈各二兩右十八味同杵羅為細末入巴豆於乳鉢内同研令匀然後入磁器中宻封候至一七日後毎用一字湯使如後卒中風羊髓酒下頭旋菊花酒下血淋大黄湯下腰膝病醋湯下吐血竹茹湯下腸風背隂繁栁草自然汁入熟酒又槲葉燒灰調酒下寸白蟲先喫牛脯後以蕪荑湯下霍亂吐㵼新汲水下肺氣喘杏仁湯下小兒一切疾米飲下小兒齁蜜湯下小兒誤吞錢膩粉湯下小兒天瘹風以蟬殻燒灰入小便調下靈寶丸治小兒瘡疥及三十六種風疾服之必愈天麻鄲州者洗天南星白附子新羅者獨活白僵蠶川烏頭炮羌活洗乾蝎全者各一兩牛黄龍腦各一分細研旋入麝香半兩細研旋入右十一味各要上好藥凈洗日内曬乾不用近火杵為細末煉蜜為丸如豌豆大諸色風疾薄荷温酒下五丸女人血風更入少當歸末温酒下如癱瘓風下牀不得先用白礬半兩為末葱十莖煎湯温浴後用薄荷汁温酒下三十丸衣被蓋出汗别服補藥如是男子婦人疥癬瘰􅕅並須依前法澡浴服三十丸出汗當日必差小兒瘡疥亦須如常浴毎一嵗一丸並須出汗並差忌熱麫豬肉魚毒物等治斑瘡方用臘月兔兒活血以蒸餅相和丸如粟米大毎服五丸無根水送下食乳者乳汁送下解毒必勝散治瘡疱將出未能匀徧透肌用牛蒡子不限多少炒令熟杵為細末毎服一錢入荆芥二穗水一盞同煎至七分放温與服如瘡疹已出更與服亦妙博濟方卷四
