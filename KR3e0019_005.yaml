body:
  text: 博濟方卷五宋王衮編瘡科癰疽者五臟六腑不和所生也五臟主裏氣行經絡而沉六腑主外氣行經絡而浮若喜怒不常飲食不節隂陽不調冷熱相干則臟腑氣虛氣虛則腠理開踈寒邪客於經絡之間為寒所折則榮衛稽留於脉榮者血也衛者氣也血榮得寒則澀而不行衛氣從之與寒邪相搏故壅遏不通氣者陽也陽氣藴積則生熱寒熱不散故積聚成癰疽也癰之狀毒氣浮淺皮薄以澤疽之證皮厚似牛領之皮毒氣深也久則熱勝於寒熱氣淳盛畜積故傷肉而敗肌肉壤則化為膿血癰患屬表骨髓不枯易為治療疽患屬臟傷骨爛筋則難理經曰一寸二寸為癤三寸五寸為癰五寸至一尺為疽一尺至二尺三尺曰竟體疽疽成圓竅皆出諸氣人有憤鬱不遂志欲者血氣畜積亦多發此疾凡痤癤者是六腑受邪經絡壅滯而發熱毒浮淺不能為害但出膿血時令盡不爾則再攻為瘡愈盛矣治一切癰腫未破疼痛令內消用生地黃杵如泥隨腫大小攤于布上糝木香末于中又再攤地黃一重貼于腫上不過三五度抵聖丸治骨疽瘡及冷漏久不合者滴乳香膩粉白礬燒成性各等分右三味同為細末每遇患者先用鹽醬水洗之以津唾調之貼瘡上必效殘霞膏治風毒流注惡瘡熱疼生肌化毒烏蛇四兩五倍子一兩半蛇皮半兩已上生使銼碎巴豆二十箇去殼雄黃牙銷各一兩研碎麝香續添一錢右件依法修事於銚子內入油二斤半煎聞油香入前藥熬候藥并巴豆焦黑色漉出諸藥不用却入黃蠟一兩半慢火養成膏以磁器內盛但有風毒瘡以小紙攤貼妙羚羊角飲子治丈夫婦人風毒攻衝頭靣生瘡虛腫等羚羊角犀角羌活檳榔人參已上各一兩當歸少許右件銼碎略焙杵過分作四貼每貼用水一升煎至四合分作兩服空心臨卧分服其每貼兩服滓更用水半升煎至七分又作一服喫之溫服立差敗風膏治本臟風毒攻疰生瘡及熱毒氣注赤癢白芨半兩白蘝半兩白礬一兩剪草一兩半淨洗細銼吳茱茰一分水銀豌豆大麝香少許右七味為末相和先用油半斤以下磁碗內盛以熳火熬令沸更入蠟一分同煎三五沸却安冷處入前藥末調和自然成膏或是瘡以鹽湯洗後以貼在瘡上四白散治腎臟風毒攻注四肢頭靣生瘡遍身㿋癢白花蛇一兩半酒浸一宿炙令香去皮骨稱新羅白附子白僵蠶微炒白蒺藜微炒去刺各一兩右四味同杵為末早晚空心溫酒下二錢檳榔散治腎臟風攻疰生瘡兼療惡瘡甘草黃連蜜陀僧各一分檳榔一斤炮木香少許右五味同杵為末先以溫鹽漿水洗過瘡挹乾以唾調貼之止痛生肌烏犀膏治皂角水及惡水入瘡口內熱痛不止皂角子不計多少燒灰存性用三分右先研皂子絶細續入沙糖和勻如膏貼於瘡立效黑神散治腸風痔疾羌活去蘆黃耆蔓荆子狗脊火燎去毛枳殼麩炒去瓤檳榔􅌝􅌣以盛盡藥為度不以箇數􅌝􅌣去子留瓤右等分杵羅為末入􅌝􅌣中盛于砂合或瓦罐子內鹽泥都封塗之火煅通赤候冷取出藥末更别用藥如後荆芥子白蕪荑二味與前等分木香減半右同前藥杵羅為末空心茶酒調下一錢日三服别無忌治痔方黃檗黃連黃丹膩粉白礬右為末各用三錢都一處和令勻患者先煎葱湯洗後用藥末一錢塗之久患不過三度理之大有效楊倓家藏方無膩粉名三黃散乳香散治風毒痔瘡乳香豬牙皂角穿山甲各二兩蛇蛻一條頭尾全者篛葉四兩去兩頭粗硬者黃牛角尖一對可長二寸以來右都入在砂罐子內蓋口用鹽泥固濟曬乾用十斤炭火煆候碧焰子出去火放冷取出細研每服二錢用胡桃肉一箇細研以酒半盞入藥同調空心服五服後見效追毒膏治瘰􅊓神效丁香七箇麝香一錢莨五十粒雄鼠糞七粒兩頭尖者以麥麩兩匙同炒候麩黑黃去麩用斑猫三箇去翅足以糯米炒令黃去米用槲皮三斤去粗皮了捶碎細銼以水二斗煎取四升濾過重熬候成膏然後入諸項藥右六味同杵為末候槲皮煎溫和乃入諸藥攪令勻貯於磁器內每服空心以溫酒一盞調下三匙以來臨時更看人大小及肥瘐加減斟酌用之喫了更以清溫酒下之便仰卧須臾即吐出若病根年深者如蝦䗫衣魚腸相似近者若蜆肉吐了以溫水漱口粟米淡粥補如無粟米亦可忌一切毒物月餘血竭散治瘰􅊓已破膿水不止者青州棗二十箇燒為灰乾地黃半兩别杵為末血竭炒二錢半右三味都細研如粉以津唾調貼瘡上治瘰􅊓滿項不破及腫疼痛方用不蛀皂子三百箇酒一升半化硇砂一兩同浸皂兒七日以文武火熬成候酒盡為度每至臨卧含化三粒限半月必差逐邪散瘰􅊓者由風邪毒氣客於肌肉隨虛而停結為瘡如李梅棗核大小兩三相連皮肉間時發寒熱是也久則潰膿連屬而生久不愈則為瘰􅊓瘻不以年逺限之必效皂子不限多少以絹袋盛入厠中浸三七日取淨安地坎中剜蓋出毒一宿焙乾搗為末斑猫五十箇去頭翅麩慢火炒令黃色去却麩後搗為末右用皂子末二錢匕斑猫末一錢匕水銀粉二錢生雞卵一箇取白傾盞內更入飯飲半盞并藥一處打勻四更初服至五更取下毒物或從小便中下出如有些小澀痛不妨或患及五年只三服三年只二服二年只一服忌口只用燒鹽喫五七日其方曾經親驗甚有神效生犀丸次日服消毒化結聚生犀半分鎊生龍腦半分真麝香半分紅娘子二十箇班猫二十一箇去頭翅同紅娘子著豆麵炒焦黃為度右五味並為末用豆麵糊丸如菉豆大每日空心日午夜卧用臘茶放溫酒下一丸服至十日加至二丸除淡飯燒鹽外餘並忌一月日食切忌葷腥木香散斂瘡口木香一分檳榔七箇白芨半兩銼白蘞半兩銼雞內金一兩焙乾根子黃皮一分肉桂一分麝香少許黃蜀葵花一兩焙右九味一時焙乾為末研細看瘡口大小逐漸滴水調成膏於熟絹上貼每日一度換掩治一切瘡止痛生肉並皆用之妙醉仙散治大風疾遍身癮疹㿋癢胡麻子牛蒡子枸杞子蔓荆子四味藥揀洗淨各半兩一處同炒令烟出為度白蒺藜半兩苦參半兩瓜蔞根防風去蘆各半兩右八味同杵為末每十五錢藥末入輕粉二錢一處拌勻每服一錢生末茶調下空心日午臨卧各一服服藥後五七日間先於齒牙縫內出臭黃涎渾身疼痛次後便利下膿血此是病根其疾永瘥治疥㿍滿身作瘡不可療者何首烏艾各等分銼為末右相度瘡多少用藥并水煎令濃盆內盛洗甚解痛生肌巴㦸散治元臟虛冷上攻口瘡紫巴㦸穿心者一兩以陳粟米同炒令黃色佳香白芷半兩銼碎微炒蠻薑末炒一錢總録作高良薑右三味同為細末每服二錢用豬石子一對去筋膜每石子一箇入末一錢用濕紙褁煨熟趂熱去紙先以口承石子熱氣口中有涎即吐出候冷即可細細嚼服之紫金霜治大人小兒口瘡黃蘖如兩指大二片以蜜慢火炙令紫色訶子一枚燒過盞子蓋少時麝香少許膩粉少許右件搗羅為末每服二字許糝於舌上立差傷折如聖膏治一切刀斧所傷并久患惡瘡龍骨半兩虎骨半兩黃丹五分放尉斗以火燒令通赤硃砂一錢膩粉一錢麝香二十文乳香一塊好者皂子大右件同研為細末應是一切瘡以黃連湯或薑湯拭乾糝在瘡上不得以衣霑著瘡口大效虎骨散治血風遍疰疼痛丈夫筋骨疼及打撲損疼痛甚者虎骨酥炙敗龜炙當歸官桂去皮地龍去皮牛膝去苗漏蘆葳靈仙𤣥胡索自然銅燒赤醋淬右一十味各等分杵羅為細末每服一錢用熱酒調下每日一服療傷折川山甲虎脛骨各一兩燒為灰雞舌香一枚生用麝香少許右件同研令至細每半錢看所患大小以黃米粥攤在紙上候溫和得所然後糝末在藥上封褁所傷處疼痛立止隔日换貼之五傷接骨膏治一切傷折及驢馬傷墜并打撲閃肭著疼痛不可忍者沒藥一兩好者生用乳香一分好者生用川椒一兩揀擇細研生用芍藥一兩㨂擇生用川芎一兩好者生用川當歸一兩㨂擇淨洗過細切炒令乾自然銅一兩半用火燒令赤候冷杵研令細用水飛過紙上襯於灰上吸乾取一兩右件都搗羅為末入自然銅末拌和令勻用黃蠟三兩半於銚子內鎔為汁次入藥末不住手攪令勻冷丸如彈子大每服一丸用好酒一盞同煎煎散藥丸為度候通口呷訖就痛處卧些小只可一服止大段疼痛者兩丸至三丸永定痛膏治大段傷折疼痛白檳榔二枚肉豆䓻一枚官桂半兩柳桂一分木鱉子二十箇香白芷二錢當歸一兩丁香三兩天南星一箇白附子一兩黑附子大者一一箇黃蠟臨時不定右一十二味都為末一兩蠟用藥末一兩同於鐺內煎直候紫色上來藥方熟後用井泉水一盞將鐺內藥傾入水盆內然後以手控乾其藥直須熱炙更不得分毫結梗捻為餅子褁在傷處其藥三日後却將藥重於火上炙團一處依舊捻餅子褁於傷損處返魂神白散治打撲損及傷中大效花乳石五斤捶碎如皂子大硫黃捶碎如皂子大右用磁合子一箇先入乳石一重次入硫黃一重重重鋪盡浮上用鴨舌草獨掃是也赤石脂和塗合子口縫又用鹽泥固濟勿令有小縫紋用新磚一口四靣書金木水火字中央書土字上安合子用炭火二斤煅之耗及三分漸漸去之取去合子地坑內埋一宿細研為末但是刀傷損至死者於傷處糝藥其血化為黃水更糝藥其人便活更不疼痛如婦人産後血暈至死但心頭暖即以童小便調下一錢取下惡血如豬肝片終身不患血風等證若鬲上有血化為黃水吐出及隨小便出便差若牛抵人腸出不損者急內入以桑白皮縫合於縫上糝藥立活封固不可有縫如內痛血入臟腑熱煎童子小便及入酒少許調一錢服之此藥真神仙所𫝊如逄德行者可以令博救共獲隂功黑龍散治傷折手腳骨髓突出補碎續筋穿山甲四兩虎頭骨四兩洛粉三兩炒帶黃色為度麝香一錢龍腦一錢丁香一兩好者新瓦焙微見火氣右先用瓦罐子一箇投虎骨在罐子內燒令煙起次入穿山甲同燒烟焰起為度取出放冷同前藥杵羅令細用小黃米一大合水盞煎成稠粥續入藥末一字醋一小杓子再煎攪勻後于損處先著手帕子一條攤上靣覆褁勿令透氣再著紙褁三五重并油單都褁角即一伏時一度換依前法忌冷水濕麵不得針灸服自然銅沒藥治之如無黃米只以糯米代之蓬莪茂散治傷撲疼痛蓬莪茂白僵蠶各一兩蘇木一兩沒藥半兩右四味同杵羅為細末每服二錢以水一盞煎至七分溫服日三五服當歸散治驢傷馬墜他物傷折痛楚不可忍者川當歸三分熬令香京芎一兩半熬令黃桂心二分去皮甘草三分炒令黃轉附子一分炮澤蘭一分炒令香蜀椒一分右七味搗為散每服酒調方寸匕日三服如傷折呌唤痛聲不絶服食良久之間不復疼痛十日可筋骨相連或小兒奔車所損臂膝皮肉决見骨木呌唤聲不絶服數日便能行動其效如神丹藥張果先生服杏仁法夫人受命于天放形于地以日為魂以月為魄一生以後更不合死皆是飲食養育不致殞絶矣藥在籬根之下凡人未必盡知冠冕之流貴耳賤目只重吳蜀之空名不知咫尺之可取以為用錢可期必致殊不知長生之祕服之則可延年世上單服一味藥而得延年者黃精枸把藥中為妙品猶有生頭痛病而難服彭祖夏姬商山四皓煉杏仁為丹以致仙宫而王子晉丁令威等並不去世事畜妻子服生杏仁服之久逺仙來迎候乘龍駕鶴以致升騰者只服杏仁矣服之生五臟補筋骨添血髓益精神强記目眀視徹千里消痰癖變凡為仙若王子晉服經四十年不覺身飛騰空丁令威服經二十年不覺身飛此二子者不服諸藥唯服生杏仁凡有此神驗不須煉熟氣生力全若煉熟則減其半杏仁共有十名一曰長生元二名千嵗元三名化白令少元四名却老元五名通神萬嵗元六名定精元七名益精元八名超升元九名换骨輕身元十名煉杏仁金丹元其人服之一一經厯矣杏仁性不冷亦不熱無一切忌觸亦不與諸藥相妨唯忌不淘白粳米甜水粥邂逅喫者有少不安須臾即可若客行在路只恐不及如法如遇不淘白粳米甜水粥但放令冷任食少多無妨害唯忌此粥外並不妨杏仁性溫平有少苦味久即甘美服之三年更不覺有苦氣唯覺甘美性不下氣能去膈上熱壯腰腳服者當自知之取生杏仁去皮尖雙仁服黃色者尤妙於平旦時空腹未漱口時二七枚口中退皮尖熟嚼令津液半口可咽之訖如行一里任喫諸食如單覔延年者任食肉及葷辛如欲升騰者即不得食一切肉及葷辛住畜妻子營養傭作也肉者易敗壞之物所以不益於身葷辛品味仙家忌之能斷諸肉即仙道易成或服生杏仁一年百病自除二年身輕目眀徹視千里但得延命五十年服經六年骨肉盡换靣若桃紅延年七十服經七年行及奔馬换舊齒重生服八年玊女侍衛延得一百五十年服經九年時聞仙宫鐘磬延命五百年服經十年命與日月齊如食五辛及血肉則不得聞也服經二十年身騰空虛而無所歸服經三十年仙道畢矣仙宫來迎若斷妻子血味五辛營養者服之二十年衆仙來迎白日升天如斷血味營養只畜妻子者四十年一朝不覺自受衆仙來迎余性好射獵血肉為本今登六十遊恆山頂上得此方便於山拾杏仁服之經十年自覺身輕目眀便踴躍無睡服二十年余已八十矣本亦只營一百年即擬自理實不敢希望延年忽有三十餘人從恆山頂上來余欲避之不得便卓然立只迎去半里便即禮拜不敢正視有童子先來相引忽然莫識何處須臾間知是仙宫非人凡世余故留此方遺後眀者勿輕之勿與凡流之輩徒𫝊必輕之以為口實也張先生服生杏仁慎忌損益法契聖寺原師處得此法原師於王屋山楊行真處得此本每日旦朝空腹取杏仁二七枚去皮尖雙仁者靣向東南未漱口前熟嚼令口中津液有半口便即咽却如人行一里當任意食之恐滅藥力杏仁取效服三七日四七日即覺泄氣過常時三倍服三箇月腳熱如火腹中搜病不覺自愈服經八箇月肺臟調和搜病永斷有如嬰兒之視至十六箇月臟腑更新胸膈通泰上氣永斷癖病消散服經二十四箇月肝臟鮮眀肝上有瘕皮不覺自脫落眼目精眀眼病永除目能逺視服經三十二箇月脾臟疏暢胃脘開通常自搖動脾氣永消腹胃通快服經四十箇月腎臟端正去黑皮氣無壅滯腰臍之間結冷永盡房室少壯服初滿二年百害不傷服經三年百神覆護三年榖氣破散臍中疼痛忽然出生血一千片勿驚怪此是藥來即就止此是上上應延年之效如三年內大腸中血不下者亦是次上上之善應延年之象如滿四年無不下者到五年內其血更亦不來矣如依前更來是榖氣厚重藥力未加而藥腸未來當須加杏仁至四十七枚乃可破得榖腸必被藥力衝破亦同延年必仙之效耳凡服杏仁血下一日不嫌飲食二日平旦㵼血㵼血之後便聞飲食惡氣耳聞眼見即生嘔逆如有能忍饑得七日者是上仙如不能忍饑者任食煮白粳米粥汁飲之以時為之是次仙三日五日七日並下血一升皆聞食臭八日平旦下血後聞飲食美任意食之若食即須少食之多即令人滿悶七日别一度下血一升到八日已上平旦血三升二升半八日九日十日十一日並同至十二日已上即兩日三度下血至十三日十四日十五日並同至十六日别一度下血六升或五升十六十七十八十九日並同至二十日已上兩日三度下血三升四升至二十一二十二二十三日並同至二十六日二十七日並同至二十八日已上兩日一度下血四升或五升至二十九日三十日並同從此之後從四日減一日其血少於尋常三升二升有似身輕喻若上重檐脫靴而行服之者當自知之矣恰一百日不覺血定榖腸並被换遍如世人只圖差病不要長生者血下之後三日即須取桑椹或桑上青椹杵作散一如煎茶服一兩碗其血即止如無椹子末者取藍汁及刺薊汁一碗服即止其血至時無度微肚疼少時許即是可眀也吳真君服椒法夫椒性稟五行情通六義葉青應於甲乙皮赤在於丙丁花黃與戊己為容膜白兆庚辛之色子之呈質應乎坎方熱不上蒸暖及丹府傍通血脉中助真元又能消酒食之毒又能辟溫邪之氣安和五臟調暢三焦陽草之中功不可比每金州川椒一斤揀令净者去目及合口者仍於鐺銚內炒令透於地上鋪紙兩重以椒在上用新盆內合定周回以黃土培之半日許其毒成汗取出曬乾木臼輕杵取紅皮四五兩再入鐡臼杵為末以白蜜為丸如桐子大候乾以紗絹袋子盛掛通風處每日空心茶酒任下十丸至十五丸半年加之二十丸一年後加至二十五丸並無所忌又歌曰其椒應五行其仁通六義欲知先有功夜間且不起服之半年內腳心汗如水四時去煩勞五臟無風氣眀目腰不疼身輕心健記别更有異能三年精自祕顔色如嬰童精爽又少睡但服此神方一生無瘧疾若能志心服三尸自然棄更有九般蟲各各自回避儻逢此色人第一書𫝊意雖未遇神仙初緣已得地至人𫝊受神仙服餌雄黃丸夫雄黃千載變為黃金服餌莫若真人此法微妙不𫝊凡世今但録此方久服即身輕益氣悅澤顔色去三尸辟百毒逺疫癘鎮心神竒功最妙卒莫紀陳每擇雄黃如雞冠血色不雜砂石者不限多少搗羅令細以松柏和杵為丸如彈子大每旦以酒研下一丸服至十日腹中三尸百蟲自下靣上紫黑皆除服及一月百疾自差耳目聰明久服即可致神仙常須潔淨不損藥力尤佳煉松脂法用桑柴灰淋汁將松脂同於鍋內或土石器中煉成汁後用棕皮濾過灰汁內徑者以水澤如雪白者用如未精依前法再煉之每合前藥以和勻為服枸杞煎明目駐顔行步康健壯元氣潤悅肌膚採枸把子不以多少先去蒂子然後用清水净洗淘出控乾後用夾布袋子一枚入枸把子在內於淨砧上取自然汁澄一宿去其清水入石器內熳火煎成膏子取出入磁器內收每服半匙頭以溫酒調下久服神妙大有所益如合時天色稍暖其炸下汁更不用經宿其膏煎下三兩載並不損壞如永逺服多煎下亦無妨服九節菖蒲法駐顔延年明耳目去風氣通關竅安神益腎九節菖蒲不以多少唯生於山澗石上東流水中者採取為妙若是少得時只石上水中生者亦得不可用陂澤中生者於八月間採取得去根鬚淨擇了以淘米泔浸三日三夜每日换米泔取出控乾以硬竹削為片子如錢厚以布袋盛貯於長流水中浸三伏時更用井花水淨洗擇如蒸飯九度每蒸後曬一日候數足不得犯鐡器於木石臼子內細搗羅為末煉蜜為丸如梧桐子大初服二十丸漸加至三十丸四十丸五十丸用鹽湯下荼酒亦得忌羊血若有餘者以紙袋子盛貯掛在風裏如服盡更取末合或酒煮糊和丸亦得煅金液丹訣硫黃一名石亭脂一名金液取三五兩至十兩並煅得舶上硫黃為第一餘黃並使得但無夾雜為上碎研入罐子內可及八九分無妨右件取煆藥罐子一箇盛藥在內下蓋子了採狗蹄草一大握本名五龍芮大鑑草一大握稻田中生一莖四花如田字亦名水田草獨莖生將二草入鐵臼內搗爛更入一掬黃土同杵勻如泥若無二件草且只將益母草代之亦可更將裹藥罐子底下并周匝可厚五六分只至口縫不裹然後置於平土上四靣簇炭五六斤上靣安熱火一斤來燒之直候火燒罐子九分來通赤尋開口縫處有碧焰子起便急手撥炭火急將柴灰三㪷都蓋勿令氣焰出直候冷撥灰取出刮去泥土已上是煅一度訣也度度依此煅之第二度法依前法取藥草褁因煆之如前法煅五度若火候得所煅出如熟雞子香即是候也若要急服只煅兩度亦可服煅度數足者妙煆度數足便於地上埋爐子一宿出火毒凡逐度煆了刮去下靣砂石妙又取出爐子於銚子內著水煮一二十沸然後敲破爐子取藥杵爛更入乳鉢內㸃煎水研爛如泥並無粗者却研令乾每二錢用蒸餅一兩以來湯浸握出水了入藥內和合更入茶臼內杵勻如麵可丸梧桐子大日曬乾收服法如後一每遇患者才腹臟稍祕及飲食減少似有作寒作熱狀候即服便清此即效也差了日只可一服一無患逐日早服二十丸至三十丸諸疾永不生一但遇有患更不問疾之冷熱但取藥服之以效為度自然見神功别藥更不宜雜藥亦不得著别藥吐㵼此藥自然補㵼與常不同不問丈夫婦人老小有患並服無忌一孩子留末子細研以米飲調以盂子灌之夜啼心驚妳傷有痰涎者并速研藥一分以來令服之日二服自然便效逐下積物多多與服並無忌若三五嵗患亦無一㵼疾不止以黃連貝母二味煎湯下藥恐嫌苦杵藥羅入等分蒸餅丸如梧桐子大米飲下一若患腸風痔疾入白前末等分依前法丸服米飲下一刀鎗頑瘡以末傅之一應久患風氣疾肺疾積冷病患忽患傷寒瘧疾胸膈不利頭疼北熱並冝依前法多服一只如傷寒多被醫人誤下轉藥或發汗不依前後返却隂陽遂致患疾難起今後如遇有患才覺中著傷寒便多取藥服令日吃一二百丸逐下若得㵼勿為怪直候㵼盡病自然復平屢曾如此醫人其驗無比一此藥可療衆病更臨時看疾深淺加減丸數服食若皮膚之疾可以針治藥恐難到此藥至靈無比只為世人多妄𫝊云有毒畏忌不服到有疾難療枉有所傷豫親傳此法以此方救療的有依憑倘已病痊不須多服金鏃散方白附子炮取心半兩木香半兩地龍三分肉豆蔲半兩去皮乾蝎三十箇肉桂取心半兩黃連取淨二兩大黃半兩生桔梗半兩吳茱茰半兩麩炒白僵蠶三分直者白蕪荑取仁半兩芍藥半兩川芎半兩淨知母半兩白茯苓半兩當歸半兩檳榔二箇一箇生一箇熟人參半兩豬牙皂角半兩生去皮巴豆二兩去皮逐日换湯浸二細研七日又用麥麩水煮一日右二十味同杵羅為細末次入巴豆於乳鉢內同研令勻然後入瓷器中密封於暖處候至一七日後每服一字湯使如後卒中風羊髓酒下頭旋菊花酒下血淋大黃湯下腰膝疼醋湯下子死胎桂心水銀湯下二服取下吐血竹茹湯下腸風背隂繁桞草自然汁入熟酒又斛葉燒灰調酒下寸白蟲先喫牛脯後以蕪荑湯下霍亂吐㵼新汲水下肺氣喘杏仁湯下小兒一切疾米飲下酒食薑棗湯下婦人血氣暖酒下冷血艾湯下眼痛菊花湯下疝氣茴香湯下五淋木通湯下瘧疾蒜酒湯下久冷椒湯下月脉不通熱酒下赤帶痢豆湯下白𢃄艾湯下食癥橘皮湯下疰痛桃仁湯下産後溫酒下難産同驚風蝎稍湯入小便少許下疳等米飲下赤白痢乾薑甘草湯下白痢白术湯下赤痢地榆湯下中熱麻黃下鬼箭桃符湯下小兒齁蜜湯下漆瘡椒湯下虎風是筋骨痛畫獅子燒灰調湯下精神恍惚金銀湯下婦人淋葵菜湯下赤眼甘草湯下腰膝疼痺牛膝湯下喫噎橘皮湯下肺氣蛤蚧湯下寒熱桞枝湯下小兒誤吞大錢膩粉湯下水疾苦葫蘆湯下膈上熱淡竹葉湯下熱毒風山梔子湯下要宣薑棗湯調半錢誤喫水銀粉泄不止煎黑鉛湯下婦人血勞黃瘦病桂心湯服後下黑血差鮮血不差五勞豬膽湯服七日後鼻中出鮮血差黑血不可治小兒天弔風以蟬殼燒灰入小便調下神仙太乙丹治諸病皆醫藥所不及者硃砂一兩辰州者為上不用夾砂石者紫石英一兩鐡引粉一兩雄黃一兩砒霜半兩用信州者太隂𤣥精半兩銀箔二十斤金箔二十斤麝香一兩别研端午日南行豬糞燒灰後稱一兩右十味先將難研者研細後於端午日侵早更各細研了却一處同研令極勻候午時用三五家粽子尖其粽子須用端午日求取靣向南搜劑為丸如雞豆大凡遇大患時每丸可療兩人小可疾病每丸可分為三服舶上硫黃一兩研令碎水銀一兩右先將未曽經使者銚子一箇坐於文武火上令暖入水銀在內片時後入硫黃用桞木槌子研令鎔勻後拈下銚子放冷取出細研却入前藥同研令勻和搜此藥本謂之龍虎太乙丹蓋用此二味故也時多隱之此藥經久不壞其功益盛收時以金銀器或垍器內盛貯仍以硃砂同入合收之具湯使如後凡草木蟲魚鳥獸菌菌等毒並用溫酒和童子小便磨下一切藥毒鬼毒如前下金石毒炒雞鴨糞淋酒磨下瘟疫用炒生薑湯下狂走不識人者生薑蜜水磨下麻豆瘡生薑蜜湯磨下隂陽二毒傷寒三日後煨葱酒磨下五般瘴氣犀角末調酒磨下五般蠱毒炒烏雞糞一合并竈心土末三錢同用酒煎十數沸去滓磨藥五更初服腳不得著地於床上垂腳坐服之鬼交狐魅丈夫心神迷惑婦人則情意狂亂或懷鬼孕用桃仁七箇去皮尖細研酒調下丈夫婦人鬼瘧並用豬膽酒下飛尸遁尸煎桃桞枝酒下尸疰鬼疰麝香酒下藥箭毒桑白皮酒下中虎毒沙虱毒磨犀角黃連酒下鱉癥龜背磨犀角麝香酒下蛇咬虎傷炒烏雞糞淋酒下驢涎馬汗馬血入肉悶絶欲死者水蛭末調酒下心躁氣擁金銀煎酒下心疼氣絶炒生薑鹽酒下大便不通煨葱白酒下小便不通煎通草湯下腫毒入肚磨犀角酒下腳氣衝心豆淋酒下銅銀冶爐烟入腹煨葱白酒下婦人血刺血暈煎當歸酒下丈夫婦人中急風炒烏雞糞淋酒下如是牙關噤開口不得用生半夏末揩牙齦并塗兩牙關則口開便灌藥心風用活地龍一條內於生葱管內用研令爛少酒投之取清者一盞下頭風煎枸杞酒磨下喉閉壅塞薄荷酒磨下細細咽之一百三十般風痛以鼠粘子酒下要根除本一丸分兩服空心臨卧各一服如有人卒暴死牛馬糞清磨下如未醒再用童子小便和酒下驚怖死者麝香酒下如魘魅欲死者新汲水調竈心土磨下更以吹鼻散內鼻中不得呌喚有燈即不得吹滅如無燈即不得㸃上中熱死口鼻血流用牛黃酒下又以小便沃熱灰擁心上冷則易之溺死者放水出後以新汲水和半夏末二丸安鼻內後以艾灰酒下自縊死者緩緩解下不得割斷繩子酒和雞冠血并童子小便磨下男子雌雞血女人用雄雞冠血下仍用雞冠血磨丹塗喉上次以四人將小竹筒子於兩耳鼻內齊吹如活後更服藥十日凡一切惡疾至死者但心頭暖雖久可救下藥扶起令藥行即相次活矣右須皆空心靣東服之疾甚者不過再服若急疾有病且以溫酒和童子小便磨下服然後依所患湯使服之或病勢深重須吐㵼者則服一丸如吐㵼過多則以菉豆末一錢水調服之立止忌熱食白牛肉一切臭穢物如孕婦不可服之青金丹治衆疾巴豆二兩先去心膜皮用頭醋煮之乾更硫黃煮一伏時取出不用硫黃杵二三百杵研如膏木香青橘皮去瓤吳茱萸附子已上各半兩並一半生一半熟檳榔二箇右件同為細末入巴豆膏煉蜜三兩入青黛半兩研細和丸如菉豆大每服三五丸至十丸服餌如後丈夫逺年氣疼醋湯下丈夫背氣疼橘皮湯下五般瘧疾艾湯下咳嗽杏仁湯下一切風寒桞枝湯下痢疾烏梅湯下大便不通大麻子湯下心痛胡椒湯下婦人血氣不通當歸湯下赤白痢黃連湯下赤眼梔子湯下血汗葱湯下中毒桔梗湯下赤白帶芍藥湯下霍亂木瓜湯下水㵼不止米飲下宣轉生薑湯下靈砂丹治衆疾硃砂半兩大附子一兩炮去皮臍青橘皮去白一兩麵薑一兩泡杏仁一兩去皮尖巴豆春冬用一百箇秋夏五十箇以水五升慢火煮三十沸右先將巴豆以水五升煮令油出水盡為度細研與衆藥末和勻以粳米飲和為丸如豌豆大其治療如右常服消酒食以酒下或溫湯下氣痢生薑湯下痔漏腸風胡荽湯下大風痰梔子湯下心痛熱酒下疏利滯氣津液下瘧疾醋湯下肺病及一切勞疾桃桞皮各一握煎湯下腰疼膝痛酒下水㵼新汲水下小兒􅂒風桃桞枝一握煎湯下小便祕燈心湯下腰腳風葱湯下藿亂木瓜湯下發汗麻黃湯下䐴腰生薑湯下懷胎氣衝心酒下一切風防風湯下隂毒傷寒熱酒下止㵼黃連湯下蛇蟲咬心冷水下宿食不消白湯下頭痛不止白湯下痺氣膨脹茶下痃痺丁香湯下五勞七傷楮實湯下口瘡棗湯下腳氣上衝胸熱湯下心痛打損酒下傷食各隨原色湯下敗血不散米飲下難産黃葉湯下小便澀大黃湯下肺氣咳嗽杏仁湯下眼昏黑花黑豆湯下牙疼茱萸湯下小兒肚脹石榴湯下乍寒乍熱桃心湯下懷胎不安芎藭湯下口吐酸水訶子湯下産前㵼痢艾湯下小兒五疳乳汁下脅腹疼痛芍藥湯下大人再服五丸小人及患人相度虛實加减丸數服之修治藥法一豫今選集名方以防疾苦然博文之士不在具陳行路之間亦慮遺忘今略書其修合節度列之如右凡藥有酸醎甘辛苦之五味寒熱溫凉四氣有毒無毒隂乾爆乾收採各順嵗時新陳别其真假凡將修合並須精細凡藥有分劑斤兩輕重多少不可妄有增减若用得其宜與病相㑹入口必愈凡藥有宜丸者宜服散者宜水煮者宜酒漬者亦有不可入湯酒不可犯火氣並如本法不可改易凡搗羅藥竟恐有鐡屑以好磁石攪㶸取之凡病在胸膈以上者先食後服藥病在心腹以下者先服藥後食在四肢血脉者空心服宜旦骨髓者宜飽滿臨卧並依本法次第服之凡藥須要酒服者以助其勢飲服者直攻其疾有冷有暖有疏有數並有本方不可妄服凡藥須去苖去核有燥有濕將欲杵合再稱取合足分兩或差應病必誤凡篩散藥竟即須再羅貴其勻細凡和合丸藥成圓必須再杵千百下視其色和同亦須易為丸撚凡云蜜劑取藥末分兩算乃蒸煉其蜜合和滋潤全勝火熬法用生蜜自如本方凡煮藥常用微火煎令小沸用水多少煎及分數並依本方凡修合本方自有修製切在依禀不可更變凡藥有三品禀性不同攻病既除不必盡劑凡服藥有先有後有早有晏蓋相須而相使或相反而相制但從本方不宜更易博濟方卷五
