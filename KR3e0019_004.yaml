body:
  text: 博濟方卷四宋王衮編胎産大凡婦人懐孕當入月即當豫備所須及合用湯藥仍知逐月吉凶方面免臨事忽遽以至不周如産婦但腹痛而未腰疼者即未産候也凡生産有坐産卧産各須平正其身不得稍有傴曲即令兒生失道如未是其時切不可上草太早及强􅀈氣用力衝擊於兒以致生疾切忌産時傍人不得揮霍恐驚動産母只可令一兩老成并親屬人扶持令行或不能行即須且立直候兒逼生方可得正産或正卧切忌上草太早生病極多子母纔分莫問兒女速與童子小便一盞及逐惡血藥一服下得令便卧且候移時背靠軟物仰卧立膝髙搘牀頭厚鋪裀褥遮障孔隙免有賊風所傷仍須三日内常令産婦鼻内聞猛醋烟以備血暈也又不得敎熟睡頻喚省緣氣血全虚恐生昏亂凡在一七日内唯頻服童子小便醇酒各半盞煎令沸放温服日五七劑及食白淡粥二七日食淡膂肉三七日漸食滋味一月内菜實生冷恚怒嗔愁並皆不可稍染微痾即成大病一百日内氣血未和勿恃平寧便為無事往往自恣輒成大病凡十二月産帳及藏胎衣但向月徳月空上皆可假令正月即月徳在丙月空在壬上坐産婦丙上藏胎衣如壬位不便即於丙上安之亦得但於集聖厯日上撿看備詳也藿香散安胎和氣利胷膈治噎塞阻食藿香人參茯苓去皮白芷甘草威靈仙桔梗右七味各等分杵為末毎服二錢水一盞生薑三片同煎六分温服阿膠散治姙傷寒安胎出汗大獨頭蒜一顆以秋瓜蔓褁了外用黄泥固濟定以炭火二斤燒令通赤放冷打開取出細研如未有瓜蔓但只以瓜根半兩代之羌活獨活蒼术米泔浸一宿去粗皮焙紫菀白术人參附子炮去皮臍阿膠真好者已上各一分甘草半兩炙右一十味都𢷬為細末毎服一大錢水一盞入連鬚䓤白一寸同煎至七分温服如人行十里許連二服至三服末後一服吃了便以冷水漱口一二十遍漱罷以衣微蓋汗出大妙催方滑胎散治疼痛槐子炒麥糵炒貝母炒滑石當歸炒各等分右五味同為細末毎於未産月十日前毎日空心用温酒下二錢滑胎散産前服牽牛子一兩赤土少許右二味研令極細母覺陣頻時煎榆白皮湯調下一錢又方用臈月兔頭腦髓一箇攤於紙上均剪作符子於上面書生字一箇覺陣頻動時於母釵子股上夾定燈焰上燒灰盞子盛了煎丁香酒調下治子死胎中方黄明乳香不限多少右於端午時或嵗除夜收豬心血相和研為丸如雞豆大以紅絹袋盛掛於門上如患者以冷酒磨下一丸備急丹治産後惡血衝心或胎衣不下腹中血塊等用錦文新大黄一兩杵羅為末用頭醋半斤同熬成膏丸如梧桐子患者用温醋湯七分一盞化五丸服之須㬰取下亦治馬墜内損者香桂散治産後臍下疼痛不止産寶諸方作當歸散當歸川芎各一分官桂去皮半兩右三味同為細末分作三服毎服酒一盞煎三五沸更入童便少許同煎至七分温服甚者不過再服必瘥金黄散治産後惡血攻心時發燥蒲黄半兩延胡索一兩桂心一分右三味杵為細末毎服一錢用烏梅湯放冷調下金花散治逐惡物止腹疼桂心去皮威靈仙白芷當歸牡丹皮各等分右五味同杵為末毎服二錢煎麴湯調下大凡婦人産後更須常體問産婦如所出惡物多即不須再三下之過即血虚氣極煩悶暈亂而生病焉如覺比常少及不行切須急攻之緣血隨氣行上掩於心故令煩悶而心滿急二者為異切在審詳蓋産婦體虚切不得妄亂進與湯散如别無狀候但與調氣治血湯散最妙没藥丸治産後心胷煩燥惡血不快没藥蠻薑延胡索乾漆當歸牛膝牡丹皮桂心去皮乾薑各等分右九味同為細末醋煮麫糊為丸如桐子大煎麴湯下十丸至十五丸不拘時延胡散治産後血渴不止延胡索鬱金乾葛官桂去皮青橘去白枳殻各等分右六味並以好醋浸一宿炙乾杵為細末毎服一錢冷橘皮湯下不過三服差常山飲治産後血海虚乘熱發狂悶亂作時常山石膏大黄煨甘草炮鼈甲醋炙柴胡去皮右六味各等分為末毎服三錢水二盞煎至一盞放冷服兼治室女體熱紅脈不行芸薹散治産後心腹諸疾芸薹以紙襯炒當歸官桂赤芍藥各等分右四味為末毎服二錢煖酒下赶下惡物蓬莪茂散治産後血海氣虚腹臟疼痛心胷疰悶毎遇紅脈行或多或少及有塊積者蓬莪茂當歸細切炒大黄紙褁慢火煨候紙黄住桃仁去尖麩炒黄色各一兩桂心芎藭牡丹皮木香延胡索炒用赤芍藥各半兩右一十味𢷬為細末毎服一錢温酒調下午前臨卧各一服大聖通真丸馬鳴退二兩灰秤人參一兩去蘆甘草二兩炮防風一兩一分去蘆當歸二分炙芍藥二兩桔梗三兩石膏二兩研如粉白芷一兩一分乾薑一兩炮附子一兩炮芎藭一兩藁本一兩澤蘭二兩一分白蕪荑一兩川椒三兩出汗取紅秤栢子仁一兩石茱茰一兩一分醋炒蟬退二兩炒蒼术一兩炒白薇一兩白术一兩厚朴一兩一分入生薑汁塗炙令香熱木香黄耆牛膝各一兩本法原不用此三味好事者加之亦得右二十六味𢷬羅為末煉蜜為丸如彈子大毎日空心茶酒任下療八風十二脾寒氣乳風血瘀又治胎不安子在腹中死兼療萬無不効如胎不安服一丸便止如娠時臨月日服一丸至産不知楚痛消去寒熱如産衣復發惡露中風兼傷寒汗不出以麻黄三分去根節杵末酒煎下藥丸汗出如多更進一丸便止腸堅積聚朝暮進一丸隂中痛月經不調不過三丸即差又絶産無子朝暮服之輒因有子四肢脹滿洩利嘔吐不能飲食赤白痢如因産惡物積於大腸中風口噤不語挑開口研酒化一丸灌之即愈男子女人萬病悉皆治之言有所療説不具盡若阻道途有疾輕重以意服兼治傷寒大聖散治婦人産前産後一切疾患大能安胎和氣或子死腹中㽲刺疼痛産後血暈血癖血滯血崩勞血入四肢應是血臟患者并胎衣不下及傷寒嘔吐遍身生瘡經候不調赤白帶下乳生惡氣欬嗽寒熱氣撮四肢室女紅脈不調並宜服之如或子臓虚冷頻頻墮胎及孕娠後乖違將攝因依成疾並可服之若能常服和悦顔色血海安寧飲食進美舉止康强丈夫服之亦療五勞七傷蘇沈良方名澤蘭散澤蘭九分使嫩者不用根白术三分米泔浸切作片子以麩炒令黄色人參三分白芷三分濕紙裹煨過藁本二分去蘆川椒一兩只取三分紅皮用厚朴一兩去皮薑汁炙桔梗一兩生乾地黄一兩半呉茱茰四分洗炒卷栢四分不用根防風一兩白茯苓一兩去皮當歸七分洗去苗芍藥七分川芎七分微炒甘草七分炙黄色栢子仁一兩生用石膏二兩研細水飛過乾薑三分炮肉桂五分去皮不見火白薇二分去土川烏頭三分炮去皮臍黄耆三分白蕪荑七分揀擇只用仁子五味子三分丹參三分細辛一兩阿膠半兩研炒令虚别杵右二十九味並揀擇令凈分兩為末毎日空心以熱酒調下一錢如婦人一切疾病但請服之神妙蘇沈良方云予家婦人女子羸弱多疾者服此藥悉差往往有子二十四味萬靈丸治婦人産前産後諸疾并三十六種冷血風氣等病人參半兩茯苓三分去皮當歸官桂去皮牛膝去苗吳白芷木香藁本麻黄去節細辛甘草炙芎藭黒附子炮蘭香菜如無菜只用子亦得左山寒水石防風桔梗赤參蟬退以上各半兩去土芍藥牡丹皮各三分馬鳴退一兩炙沉香一分石茱茰一分右件同為細末煉蜜為丸如彈子大毎日空心用酒化一丸治八風十二疝乳中風淋血聚并治胎不安若死在腹中不過三丸生下死胎生衣不出一丸便出産後腹内絞痛繞臍下如刀刺相似者一丸便止産前産後赤白痢并帶下及嘔逆心氣煩滿服一丸立差如懐胎入産月但一日一服至生産時不覺痛産時傷寒中風體如板者用熱煎麻黄湯下一丸立止經信不通或頻併來或白喫食無味瘦惡乍熱面赤唇焦手足煩疼遍身如黒㸃生血斑凡婦人一切疾病但服此藥必有功効保生丸治産前産後血氣風冷及是婦人所患一切疾病並皆理療神驗金釵石斛一分别杵秦芁官桂去皮乾地黄貝母防風糯米甘草炮乾薑炮細辛已上各一分當歸蜀椒去黒子只用皮大麻仁大豆卷黒豆皮是黄芩已上各二分石膏明凈者麒麟竭没藥龍腦各一錢半右一十九味並須州土新好者大分細𢷬羅為末煉蜜六兩熱須入水一分同煉令水盡和藥為丸先杵五百下後丸如彈子大匀可成七十二丸用湯使治病狀如後産前産後血氣頭旋身戰可用薄荷酒下月信不通當歸酒下赤白帶下温酒下婦人臨産難産胎衣不下子死腹中横産倒死死絶不語但看頭熱氣在取一丸用芎棗湯研灌口中但入喉立甦神妙産後惡血不盡臍腹疼痛嘔吐發熱憎寒煩悶月候不調或多或少皮膚虚腫産血不止虚勞中風口噤不語半身不遂産前産後赤白痢大便祕澁血渇血暈狂語見鬼頭痛面色痿黄漸成勞瘦飲食無味已上病狀並無灰酒研下一丸服至五七丸臨産五臓不痛男女易生其神驗難述催生當歸酒下産後中風血暈生地黄汗同煎十沸研藥一丸灌之立瘥禦風但五日一度嚼爛一丸空心熱酒下或浴後嚼一丸温酒下小兒天瘹驚風薄荷酒下一丸分作三服中風不語身忽如板用消梨好瓤薄荷同研熱服一丸灌之了衣被蓋但汗出相次掲衣被便當風坐卧立瘥其婦人身邊一切諸疾但只以温酒及當歸薄荷同研一丸立瘥産寶諸方云忌生冷油膩魚雞等物湯酒入口温熱得所但未産以前與産後一臈好依方合一法博濟方中用麒麟竭没藥破血産前不可服若合只依太醫局此方除三味合之分兩亦同産前後亦可通服也初産作小丸服之一法初産了五七日間氣虚蜜藥纔下散胷膈間恐發虚熱凡合一料以糯糊丸半料糯糊丸者初産至兩臈可服丸如桐子大分一二十六服阿膠丸治産前産後神妙真阿膠四斤火炙令熱為末蛇脱皮一條燒灰熟艾半兩燒灰敗筆一管用頭燒灰大麥花少許炙乾如無此花以麥蘖上牙子代之亦得為細末右五味一處研令細以軟粳米飯為丸如雞豆大如丸時黏手以少許麫為丸婦人有身十箇月滿足者有諸般疾病用井花水磨下一丸産後有病用通靈散一字醋湯磨下一丸此藥大安胎臓如築打著及死胎在腹中用醋湯下一丸産前欬噎用千金散子一字熱水調下一丸産前産後被血衝心用黄散子半錢醋湯調下一丸産後遺瀝不止用燒鹽半錢無灰酒下一丸難産者三日至五日服此立下用通靈散子醋湯下一丸如婦産時衣先下未見兒足踏衣生用通靈散子一字調下一丸如兒先下衣未見須㬰用醋湯下一丸如刺前後心用通靈散子一字調下一丸如漿破後經三五日不生用黄散子一錢酒調下一丸産前産後痢醋湯下一丸血氣用艾枝煎湯下一丸罌粟炒令黄為末是千金散真阿膠炙令黄為末是黄散子蛇蜕衣燒灰為末是通靈散子琥珀散治産前産後血氣不和及一切疾當歸一兩微炒川芎一兩赤芍藥二兩蓬莪茂一兩煨右為末毎服二錢空心温酒下如腰腹痛加陳橘皮一兩去白乾薑半兩炮同和匀如不喫酒以水一盞同煎至七分温服經氣雜證白薇丸治婦人無子或月水斷續不匀及上焦虚熱下部冷憊飲食減少肢體黄瘁凡有心腹一切疾病和劑局方名小白薇丸治婦人衝任虚損子藏受寒久無子息及斷續不産此因上熱下冷百病滋生或月水崩下帶漏五色腰腹疼重面黄肌瘦或因産乳不能將䕶路厠太早或久坐濕地並冷風從下入血藏既虚風邪内乘或月水當行失於調攝傷動胞絡隂陽不和上焦虚陽壅燥下藏邪冷結伏致使月孕不成冷極傷敗月水不匀飲食減少夜多盜汗面生䵟黯齒搖髮落脚膝疼重舉動少力並宜服之白薇乾熟地黄川椒去目及閉口者微炒去汗白龍骨各一兩車前子當歸剉碎炒芎藭蛇牀子細辛乾薑炮裂碎各半兩藁本白芷覆盆子官桂去皮菖蒲白茯苓去皮逺志去心人參去蘆桃仁湯浸去皮尖雙仁麩炒黄卷栢各三分麥門冬一兩半去心焙右二十一味同杵為細末煉蜜為丸如桐子大毎日空心及晩食前温酒下三十丸局方云常服壯筋骨益氣血暖下藏除風冷令人有子鼈甲丸治婦人月經不調肌肉黄瘁脇下積氣結硬時發刺疼漸成勞狀鼈甲去裙襕醋炙黄官桂去皮荆三稜醋淬急炒牡丹皮牛膝去苗訶子皮琥珀川大黄煨桃仁麩炒去皮尖土瓜根各等分右一十味同為細末煉蜜為丸如桐子大煎桃仁湯下十五丸破血癥氣塊尤妙桃仁煎治月水不調阻滯不通桃仁二兩湯浸去皮尖雙仁麩炒微黄川大黄二兩蝱蟲一兩炒黒色去翅足頭用川朴硝二兩右四味同為細末用醋五升入銅銀鐺内以慢火熬成膏可丸丸如桐子大當日晩不喫晩食五更初以温酒吞下一丸不嚼破至明日午際取下如赤豆水或似羊肝蝦蟆衣其病下了即一丸分作二服未下再服候鮮紅即住服仍以調氣湯散補之延胡索散治婦人血氣走作疼痛不可忍者及月水不調面色萎黄喫食減少及生産後諸疾並皆治之延胡索生用荆三稜生用蓬莪茂酒浸少時當歸去蘆酒浸焙乾各一兩右四味同為細末毎服二錢空心温酒下如血氣發甚者及月水不匀並用童子小便酒紅花同煎調下只三服差矣當歸煎丸治婦人久積血氣時發刺痛肌瘦力乏月候不匀川當歸去土二兩檳榔赤芍藥牡丹皮延胡索各半兩右五味先將當歸用米醋一升二合慢火熬成膏入衆末和為丸如桐子大毎服二十丸温酒下空心日午服澤蘭丸治婦人血海虚損肌肉黄瘁喫食進退月水不匀四肢倦悶聖濟總録治乍多乍少或斷或續或湛或濁澤蘭一兩附子一兩炮當歸牛膝牡丹皮芍藥各半兩人參陳橘厚朴去皮生薑汁炒令香細辛乾薑炮蛇牀各一兩半黄耆乳香白术蓯蓉酒浸炙官桂去皮各三分川芎半兩逺志去心半兩右一十九味同為細末煉蜜和丸如桐子大空心温酒下十五丸米飲亦得沈香鼈甲散治室女榮衛不調經候凝滯或時頭目昏悶上膈積涎肢體不利五心虚煩飲食進退多困少力木香一兩沉香三分鼈甲九肋者一枚凈去裙襕醋炙令黄香用一兩半常山一兩當歸去土并苗一兩柴胡去苗一兩人參去苗一兩白茯苓去黒皮一兩官桂去粗皮一兩青橘去瓤一兩陳橘去瓤一兩生地黄一兩半夏一兩以湯洗七遍去滑止檳榔三分甘草三分炙右一十五味各製好了焙令乾同搗羅為末毎服二錢水一盞又入生薑三片同煎至七分去滓温服空心日午臨卧各一服御藥院方内有麥門冬一兩無官桂一味乾柿煎丸治衝任久虚下漏不時連年未止變生多病夜有盜汗欬嗽痰涎頭項多痛百節酸疼血海虚冷面生䵟􅍍臍腹刺疼全不喫食日漸瘦弱懐姙不牢或無娠孕並宜服之好乾柿十箇去蓋細切沉香一兩杵為末用好酒三升浸香柿子兩伏時銀器中文武火熬成膏乳鉢内研如糊次入下諸藥禹餘糧石四兩紫色者不用夾黄燒通赤入頭醋内淬十度杵為末研令細入諸藥内白术一兩呉茱茰一兩湯浸一宿去浮者慢火焙川烏頭一兩酒浸一宿炮裂去皮臍乾薑半兩炮地龍二兩槌碎去土於新瓦上慢火炒令黄色陳橘皮去白一兩右七味𢷬為末入前藥膏和令得所入臼内杵一二千下取出為丸如桐子大毎服十丸至十五丸温酒下醋湯下亦得如患多倦少力全不思食粥飲下如欲姙娠服不過兩月必有空心食前服人參荆芥煮散治婦人血風勞氣攻刺疼痛四肢無力不思飲食多困黄瘦胷膈痞滿經水不利心多怔忪荆芥四兩只用穂柴胡去苗秦芁並洗去泥肉豆蔲去殻白芷黄耆鼈甲洗凈醋炙黄桔梗官桂去粗皮各二兩當歸洗去泥芎藭蓬莪茂麥門冬去心芍藥人參茯苓去皮海桐皮枳殻麩炒去瓤甘草炙乾地黄酸棗仁去皮木香各一兩沉香半兩檳榔半兩右二十四味並杵羅為末毎服二錢水一盞生薑三片烏梅二箇同煎至七分温服一日二服如覺臟腑熱即空心服小便多即食後卧時服如患有氣塊血塊立得消亦治丈夫風勞病其功不可盡述香甲散治婦人血風虚勞四肢少力肌肉黄瘁多困減食遍身酸疼真邪相擊心腹撮痛木香三分鼈甲去皮肉醋炙令香二兩牡丹皮紅芍藥陳橘皮去白官桂去皮人參茯苓熟乾地黄秦芁柴胡去苗白术當歸炒黒附子炮製去皮臍各一兩乾薑三分炮製甘草半兩炙右一十六味同為末毎服二錢水一盞入生薑三片棗二枚同煎至七分去滓稍熱服如煩渇心燥更入烏梅一兩同杵為末大香甲丸治婦人血臟風虚冷氣肌肉黄瘦飲食進退經候不匀心腹多脹漸變如勞補血海調氣沉香半兩鼈甲湯浸去裙襕炙令黄香用一兩柴胡去蘆半兩人參半兩桔梗半兩茯苓去皮半兩川芎半兩藿香半兩葉羌活半兩木香半兩陳橘皮去白半兩牡丹皮半兩安息香半兩荆三稜半兩炮厚朴薑汁炙令香半兩當歸半兩官桂去皮半兩附子炮去皮臍半兩牛膝去苗半兩桃仁湯浸去皮尖半兩和皮大腹子一分右二十一味各洗擇凈焙乾為末分一半毎服二錢水一盞入生薑黒梅各少許同煎至八分温服餘一半更入乾漆一分阿魏半兩赤芍藥一分右同為末煉蜜為丸如梧桐子大毎服二十丸至三十丸空心煎烏梅地黄湯下與散子相間服金花散治室女骨蒸熱勞藿香一分零陵香一分蓮子心二分延胡索芍藥香白芷川芎當歸官桂去皮各一分晩蠶蛾二分右一十味同搗羅為散毎服温酒調下一錢一日二服枳殻飲子治婦人手足煩熱夜卧多汗肌肉黄瘁經候不匀四肢煩倦心胷滿悶狀似勞氣商州枳殻二兩麩炒去白半夏一兩湯洗七遍以生薑汁浸三宿用麩炒令黄紅芍藥一兩柴胡去苗一兩半黄芩一兩半右五味同為細末毎服二錢水一盞生薑一塊擘破棗二枚同煎至八分去滓温服候五心煩熱及身體壯熱潮熱退方住服當歸散治婦人血風攻疰百骨節酸疼皮膚虚腫筋脈拘急或生癮疹寒熱不時飲食無味延胡索當歸去蘆蒲黄炒京芎乾地黄赤芍藥澤蘭蓬莪茂炮天麻地榆醋炒焙乾肉桂去皮滑石桂府出者炒先研細右一十一味皆等分唯地榆減諸藥之半各依法修製了杵羅為細末毎服一錢半温酒調下或薄荷茶清調下亦得如手脚冷卒患血氣奔心撮痛炒生薑酒調下二錢牡丹皮散治婦人血風攻疰頭目疼痛遍身煩疼口苦舌乾多困少力或發寒熱狀似傷寒牡丹皮赤芍藥各二兩川芎一兩半羌活一兩半甘菊防風各二兩半夏一兩半湯浸洗七度炒令黄甘草一兩炙右八味同為細末毎服二錢水一盞薑二片薄荷十葉煎至七分稍熱服狼毒丸治婦人血風攻疰腰脚及背膊疼痛四肢煩倦麻痺兼療丈夫元臟風攻遍身痛筋脈拘急腰脚無力天南星狼毒海桐皮黒附子炮各等分又一法更加牛膝一味焙用之以酒浸一宿亦妙右四味各用童子小便浸安著盞子四隻内浸一宿漉出控乾杵為末酒糊為丸如梧桐子大毎日空心以獖豬膽汗十餘滴炒葱一根簽酒下二十丸只酒亦得如有孕不可服之牡丹皮散治婦人脾血臟冷氣不和心胷煩悶不思飲食四肢無力頭昏身體痛牡丹皮芍藥白芷乾薑各一分當歸延胡索陳橘皮去瓤官桂去皮烏藥苦杖紅花川芎各半兩右十二味並生杵為末毎服一錢半用生薑二片酒水各半盞同煎至七分温服如初生産後毎日三服一七日後漸減服數如喫藥後腹内些小疼痛請不怪如喫至滿月永無病生赤芍藥散治婦人氣血不和心胷煩悶不思飲食四肢少力頭目昏眩身體疼痛牡丹皮白茯苓紅芍藥呉白芷甘草各一兩柴胡二兩半去苗右六味為末毎服二錢水一盞入薑棗同煎至七分温服食後臨卧各一服勝金丹治婦人血海虚冷臍腹冷疼肌肉黄瘦飲食進退時多困倦四肢發煩産前産後諸疾但依法服食大効大黄三兩用米醋浸兩宿以竹刀子細切於瓶上蒸九度研為糊當歸半兩蒲黄半兩官桂去皮半兩赤芍藥半兩乾地黄半兩醋微炒劉寄奴一分畧炒芫花一分醋炒令黄色於銀器内炒不得犯鐡器蓬莪茂半兩炮川芎半兩延胡索半兩於銀器内炒杜牛膝半兩地龍去土醋内炒過半兩右十二味並同為末傾入大黄膏内捜和為丸如雞豆大毎日早晨臨卧用温酒化下一丸如産前有疾以炒生薑酒化下一丸産後只用温酒化下一丸月數未多即且莫服此藥黒靈散治婦人逺年血氣甚者穿山甲半箇黒鯉魚皮半箇小兒髮半兩皂莢不蛀者三錠右四味同入於甆瓶子内用鹽泥固濟先用文武火燒次用大火煅之令赤熱放冷取出研細毎服半錢温酒調下順氣木香丸治婦人血氣攻刺手足疼痛冷痺心腹久積掙刺口吐冷涎面目青黄色發歇有時黄芫花一兩巴豆七箇用醋半椀浸一宿於銚内煮盡醋炒紫色延胡索秦艽桑蛾各半兩官桂一分木香一分右七味為末醋煮麫為丸如緑豆大毎服十丸熱酒下没藥散治婦人急血氣疼痛不可忍者没藥紅花揀凈延胡索洗當歸洗去土各等分右四味為細末毎服二錢以酒半盞童子小便半盞相和匀赤燒稱鎚或小鈐子淬過後調下常服只用温酒一盞亦得伏龍散治婦人赤白帶下久患不差肌瘦黄瘁多困乏力棕櫚不以多少燒灰纔火著急以盆蓋䕃令火住屋梁上塵懸長者如無以竈頭上空虚者抄於銚子内炒令烟盡於凈地上放冷出火毒伏龍肝於鍋竈直下去取赤土炒令烟盡用右三味等分研和令匀入龍腦麝香各少許毎服二錢温酒調下鹽醋湯亦得患十年者可半月瘥大琥珀丸治婦人百病木香二兩細切微炒琥珀二兩生用北亭一兩以熟湯化為水澄去砂石取青者白磁器内熬成粉京芎二兩炒官桂一兩去粗皮不見火當歸一兩去蘆畧炒白僵蠶一兩揀直者去絲取凈用生薑自然汁於白椀内焙乾没藥一兩生用薑黄一兩畧炒蟬殻一兩去塵土𤓰面洗凈用之右一十味並依法修事稱定分兩一處為末别以乳香一兩用水磨盡香在水内入少白麫為糊丸如菉豆大以好生硃砂一兩半麝香一錢為衣將硃砂麝香末分為三度上之貴色匀也治婦人室女百病常服五丸温酒湯亦得久病十五丸至二十丸日兩服赤白帶下煎荆芥酒下經脈不通虎杖京芎蜜同煎酒下心氣痛不可忍生薑醋湯下上喘欬嗽訶子人參煎湯下五勞烏梅鼈甲葱白煎酒下血邪發狂磨刀水磨生犀下用鉛白霜亦得四肢瘙痒遍體生瘡及五痔何首烏煎酒下血海積冷腹中絞痛食後氣脹腰脚無力炒薑酒下血暈悶亂童子小便酒各半盞煎沸放温下血山崩白艾葉煎酒下臨産作陣血閉悶亂胎息不順子死腹中生衣不下及要催生並用生雞子清一個熱酒調下小産産後敗血奔心口噤舌强寒熱發渇頭面浮腫坐卧不得百節酸疼用生地黄生薑汗各少許入童子小便各半盞同煎三五沸去滓温服下産後中風用川烏頭二個炮裂去皮臍白僵蠶少許一處為末酒煎半盞下産後淋瀝不止口苦盜汗乾荷葉阿膠煎酒下頭面及四肢腫痛伸縮拘急延胡索酒下血癥結塊刺痛難忍當歸煎酒下赤白等痢熱陳米飲下有孕不得服之二十六味牡丹煎丸治婦人血刺血痃上搶血塊走注心胸疼痛血海虚冷臍下膨脹小腹滿悶腿膝無力血多血少背膊悶倦血氣皴裂手足麻脾身體振掉腰脊傴僂月經不調或清或濁赤白帶下血山崩漏面色痿黄身生癮疹腹内虚鳴面生䵟黯手足熱疼併筋攣骨疼兩肋攀急起坐托壁腰背牽掣舒展不得陳自明管見良方云治婦人衝任本虚小腹挾寒或因産勞損子臟風寒搏於血氣結生瘕聚塊硬發歇背項强急手足麻痺或瘀