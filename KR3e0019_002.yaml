body:
  text: 博濟方卷二宋王衮編上焦證人參荆芥散治上焦壅滯頭目昏眩涕唾稠粘心胸煩悶人參柴胡去苗羌活荆芥旋覆花甘菊桑白皮各等分右七味同杵為末每服二錢水一盞煎七分食後臨臥溫服利膈散治上焦風壅多患咽喉胸膈不利荆芥穗子青乾淨好者鼠粘子各一兩甘草三分炮過白牽牛二兩炒令香熟右為末每服一錢入鹽點兼治風牙疼以三末入川椒一粒鹽二錢煎熱熱含冷吐出白蒺藜散治上焦虛熱頭目昏疼或眼赤腫心胸煩悶地骨皮去土白蒺藜去皮旋覆花山茵蔯白菊只有菊花亦得已上各半兩鼠粘子石膏各一兩右七味並生同杵為末每服一錢食後茶清調下日進三服金花散治心腹壅熱薰蒸上焦致口氣生瘡連年不差黃連半兩炒令稍焦赤色如年少即加一分許人參半兩枳殼半兩去白麩炒令微黃甘草半兩炙微赤半夏半兩拍破以漉薑汁浸一宿出焙乾右五味為末每服一錢生薑三片煎六分食後臨臥溫服白龍丹治上焦風壅化痰涎利胸膈逐風祕雷丸末二錢甘遂末三錢牽牛一兩杵取末六錢不用再羅者龍腦少許粉霜四錢輕粉四錢入白麵少許三味同研令勻細滴水和作餅子於慢火內煨令熟放冷再研令細右同為細末研令勻青州棗煮熟取肉和為丸如菉豆大每服五七丸溫漿水下如一切風癎驚搐涎滯並以漿下七丸及至十丸如小兒痰熱及渴不止頭疼但頻少與服自然消除大人風氣壅盛上焦不利最宜服此更在臨時酌其加減香芎散治上焦風壅中脘有痰頭目昏暗心煩口乾利膈化痰涎旋覆花一兩細辛一兩去葉川芎二兩甘草半兩炙獨活羌活各半兩皂角二挺燒存性右七味同杵為細末每服一大錢水一盞煎至六分食後臨臥熱服犀角散治上焦壅熱咽膈腫疼不利鼠粘子一兩銚子內以文武火隔紙炒令香為度甘草一分荆芥半兩右三味同為細末每服一錢水五分一盞煎令沸去滓溫服大利胸膈中焦證沉香散治脾元氣不和中焦痞悶氣滯噎塞進食和氣沉香木香青橘去白陳橘去白郁李仁湯浸去皮别研人參各用一兩豆蔲檳榔肉桂去皮甘草炙乾薑炮製各半兩右十一味同為末每服一大錢水一盞煎至七分溫服不以時候四倍散治脾元氣不和大補虛損訶子一兩煨人參二兩白茯苓去皮四兩白术半斤右四味同為細末每服二錢水一盞入生薑棗子同煎至六分去滓溫服空心食前服如早晨常服有大功效白豆蔲散補中益氣調順脾元心胸滿悶不思飲食上熱下冷白豆蔲仁半兩肉豆蔲仁三箇白术一兩肉桂去皮半兩青橘皮去瓤半兩厚朴去皮薑汁炙半兩甘草三分炙右七味同為末每服二錢水一盞生薑二片粟米少許棗二枚同煎至七分去滓熱服大妙木香通真散治中脘氣不和心胸滿悶氣刺脅肋飲食無味和氣木香半兩人參一兩官桂一兩半去皮川芎一兩陳橘皮二兩去皮桃仁一兩麩炒去皮尖茯苓一兩去皮青橘皮一兩去白神麯一兩茴香一兩用舶上者厚朴一兩半用生薑汁塗炙令黃檳榔半兩女人喫即入也右十二味除桃仁叧研外餘並搗羅為末入桃仁拌和令勻每服一錢水一盞鹽少許同煎七分溫服不拘時候大能和順脾元氣賺氣散治氣調和脾胃御藥院云治心胸痞悶腹脅虛脹飲食減少氣不宣通荆三稜五兩白术三兩蓬莪茂五兩煨熱杵末木香半兩枳殼去白一兩麩炒右五味同為末每服二錢生薑三片水一盞煎六分溫服如和脾胃即更入棗同煎若解傷寒併三兩服汗出立差下焦證燒石子茴香散治下焦虛冷臍腹撮疼心胸痞脹和元氣進飲食舶上茴香川附子炮去皮臍官桂去皮川椒去目木香胡椒陳橘去白紫巴戟去心乾薑炮各半兩荆三稜一兩煨右一十味同杵為細末每服用獖豬石子一對切去筋膜切作薄片以末二錢入蔥絲少許鹽半錢濕紙裹煨熟餌訖以酒或粥飯壓之須臾臍下暖甚妙牛膝煎丸治男子下元虛冷傷憊筋骨衰弱遍身癮疹及風氣上攻下疰疼痛不可忍者牛膝五兩去苗切作細假用好酒浸三日取出細研如麵糊用酒於銅銀瓷器內慢火熬成膏為度附子炮去皮臍川芎虎骨酥炙黃色各三兩破故紙葫蘆巴蓯蓉酒浸三日細切焙各四兩巴戟去心生用仙靈脾去莖幹生用各一兩右八味各修事淨一處杵為細末用牛膝膏和合入臼杵令軟硬得所丸如小彈子大如是難丸更入少許熟蜜同丸每日早晨及夜卧溫酒化下一丸嚼下亦得志意服一月永無風氣攻疰及癮疹自然肢體安暢補骨脂丸治脾腎久冷積氣成塊或發疼痛補暖大木瓜一箇去皮瓤入硇砂一兩去砂石蒸令熟研爛補骨脂炒蘹香子薯蕷官桂去皮青橘去白木香檳榔已上各一兩荆三稜半兩醋浸一宿炒令黃肉豆蔲半兩去殼右九味為末用木瓜為丸如梧桐子大每日空心鹽湯下二十丸溫酒亦得硇砂丸治男子元臟虛憊積冷聖濟總録名羊骨煎丸治腎藏虛冷不思飲食倦怠無巴戟有白术羊脛骨一條去淨肉用硇砂二兩醋二升同煎旋煎旋蘸骨炙焦黃以醋盡為度焙乾沉香木香白檳榔官桂去皮人參牛膝去苗茯苓薯蕷郁李仁附子炮巴戟去心丁香蓯蓉已上各一兩石斛半兩阿魏半分同麵三兩先將醋化搜作餅子炙黃右十六味並杵羅為末用酒煮麵糊為丸如梧桐子大每日空心鹽酒或鹽湯下二十丸三焦總治麻仁丸治三焦不和藏腑虗冷胸膈疰悶大便祕結麻仁四兩先以溫水浴懸在井中五日令生芽日曬退皮取仁大黃四兩二兩蒸二兩生用白檳榔一兩半煨半生薯蕷一兩半官桂去皮一兩半羌活一兩半山茱萸一兩半郁李仁四兩兔絲子一兩半酒浸一宿後炒黃木香二兩枳殼去瓤麩炒令黃車前子防風各一兩半右十三味同為細末鍊蜜為丸如梧桐子大每服十五丸至二十丸臨卧溫水下三焦散治三焦不和榮衛不調肢體煩倦頭目昏疼飲食無味多困少力寒熱痰壅頭旋前胡柴胡各去苗桔梗羌活獨活人參枳殼去瓤麩炒鱉甲去裙襴醋浸炙黃各一兩旋覆花一兩半甘草半兩炙石膏一分如頭疼旋入右十一味為細末每服一錢半至二錢水一盞煎至七分溫服解傷寒發汗入麻黃一兩去節同杵為末如上焦多壅熱入地骨皮一兩半麥門冬散治三焦不利心肺多壅痰涎併積口舌乾燥咽嗌腫疼肌體黃瘁氣血不調麥門冬去心半兩桔梗半夏各一分赤芍藥半兩菊花一分蔓荆子一分甘草半兩前胡防風款冬花桑白皮各半兩杏仁一分五味子一分用新者白术一分貝母升麻各半兩右十六味各洗擇令淨焙杵羅為末食後夜卧各進一服每服二錢水七分盞生薑一片同煎至三分去滓溫服大益心肺牛黃甘露丸治三焦渴疾飲水無度舌上皴裂肌肉黃瘦精神減退小便多腹脅脹硃砂一兩成塊者牛黃一分鐵粉半兩胡桐律半兩犀角半兩鎊葳蕤半兩麝香一分銀箔五十片鉛白霜半兩丁香半兩地龍半兩知母半兩宣連一兩麥門冬去心半兩檳榔牡蠣苦參石膏錫藺紙甘草炙白稨豆各半兩慢火炒生栝樓根一兩杵研細金箔一百三十片右二十三味除栝樓根别杵同為細末煉蜜和臨和時即入金箔及生栝樓根一處和勻為丸如豌豆大空心金箔三片銀箔三片碎研米飲下十丸漸加至二十丸飯後臨卧各一服日近輕者當日止重者三日止十日後只空心一服夜後一服用金銀箔各一片一月日外只用溫漿水下五十丸其藥合二月至九月即用生栝樓根九月後只用煉蜜和為丸亦得忌鹹酸炙􅏼魚酒等利膈丸治三焦不順胸膈壅塞頭昏目眩涕唾痰涎精神不爽牽牛子四兩一半生一半熟不蛀皂角塗酥炙令香熟用二兩右二味為末以生薑自然汁煮糊為丸如梧桐子大每服二十丸荆芥薑湯下神妙沉香丸消化滯氣調順三焦空胸膈理脾元大能化酒食毒丁香一分沉香一分乳香一錢半阿魏少許舶上茴香半兩炒肉桂半兩去粗皮檳榔二枚冬加二枚肉豆蔲二枚夏加二枚蓽撥半兩巴豆十五箇去皮心不出油别研右杵為細末研入巴豆阿魏令勻煮白米飯為丸如菉豆大每服五丸生薑湯下如胸膈氣不和及元臟冷氣上攻迷悶加至十丸溫酒下常服茶湯任下要微動以意加服之橘香散調順三焦平和胃氣順氣白术四兩米泔浸一宿淨洗陳橘皮二兩去白茯苓二兩去皮甘草二兩炙附子一兩炮乾薑半兩炮右搗為末每服二錢水一中盞薑二片棗一枚同煎至七分溫服如覺傷寒入荆芥煎服五藏證治茯神丸治心肺壅熱口苦舌乾涕唾稠黏胸膈煩悶不思飲食肢體倦怠或發煩熱狀似骨蒸茯苓二兩去皮木柴胡一兩半去苗黃耆一兩半桔梗鱉甲二兩醋炙令黃人參白前各一兩枳殼一兩半炙去白生乾地黃二兩赤芍藥一兩半右十味杵為細末煉蜜為丸如梧桐子大每食後生薑湯下十丸臨時更加減服金花散治心肺積熱咽喉不利口舌生瘡心胸煩悶痰涎併多菉豆粉四兩雄黃三分甘草末七錢朴硝五錢甜硝五錢白豆蔲半兩生腦子半錢麝香半錢右八味杵為末旋滴生蜜少許研令勻入瓷器內收貯每服半錢用薄荷水調下小兒驚亦宜服之潤肺散治肺氣壅滯咳嗽不已甜葶藶一兩銚子內紙襯慢火炒熟用肉桂一兩馬兜鈴大者二枚微炒用右三味杵為細末每服一錢水一盞煎至七分放溫食後時時呷一口可自早至午服盡或臨卧溫水調一字或半字亦得黃耆散治肺臟壅塞咳嗽涕唾稠黏咽喉不利黃耆去蘆蒸出擘破於槐砧上碎銼一兩甘草半兩炙柴胡一兩去蘆以布拭去土淨銼勿犯鐵器人參一兩秦艽一兩須是於腳下左文裂者為秦以布拭却毛川升麻半兩山梔子一兩如雀腦者去皮以甘草水浸一宿焙用黃芩一兩地骨皮半兩茯苓赤者以水中澄去浮者炒用一兩右十味同杵為末以瓷器內盛貯每服三錢水一盞同煎至六分去滓溫服食後服之蛤蚧散治患肺痿咳嗽即肺壅嗽蛤蚧一對新好者用湯洗十遍慢火內炙令香研細末人參茯苓去皮知母貝母去心煨過湯洗桑白皮已上各二兩甘草五兩炙大杏仁六兩湯去皮尖爛煮令香取出研右八味同為細末入杏仁拌勻却粗羅再篩過研細為妙每服半錢入生薑二片酥少許水八分沸熱服如以湯點頻服亦妙鵝梨煎丸治脾肺風攻皮膚成瘡癬瘙癢大化痰涎解壅熱鵝梨十箇大者去皮核薄荷一斤皂夾十挺肥大不蛀者已上三味於酸漿水中揉取自然汁濾去滓杏仁四兩去皮尖爛研將杏仁膏並前自然汁同於銀石器內慢火熬成膏後别入藥末防風去蘆白蒺藜微炒去刺天麻炙令通黃色各二兩甘草一兩炮威靈仙一兩去泥右九味杵羅為細末入前膏內搜和為丸如梧桐子大每服食後用溫漿水下十五丸至二十丸臨卧時再服救生丹治逺年日近肺氣喘急坐卧不能總録內作鉛丹雞內金三七枚雞肫內兩片黃皮是也旋取去却穀食淨洗隂乾每夜露七宿甜葶藶半兩洗焙黑牽牛子半兩用瓦上煿令下焦黃丹半兩亦如砒信製信砒一分别研細每夜露七宿至晚收於床下半夏一分洗淨焙生用右六味為細末煮青州棗大者十二枚去皮核搗和為丸如乾即入淡醋少許丸如菉豆大以硃砂為衣食後臨卧溫蔥茶下七丸甚者十丸不過三五服立效須忌大冷大熱毒食等杏仁丸治肺氣喘急者由肺乘於風邪則肺脹脹則肺不利經絡澀氣道不宣則上氣逆喘或息鳴馬兜鈴杏仁去皮尖蟬蛻各半兩為末砒霜一分右為細末煮棗二十枚去皮核和藥末為丸如梧桐子大空心薄荷湯下二丸妙紫蘇膏治肺痿勞嗽喘促涕唾稠黏咽膈不利生地黃三兩生薑二兩與地黃相和研布絞取汁生天門冬半斤生麥門冬一斤杏仁三兩生研入紫蘇子二兩炒研生牛蒡四兩生玄參一斤右八味洗令淨銼碎同研令如泥蘇子杏仁投於地黃汁內更以細物濾絞汁去滓於銀石器內盛用煉蜜五兩半真酥二兩安於炊飯甑上蒸一飯久於淨器內收不以時候抄一小匙咽之如久服大益心肺滑潤肌膚補助榮衛忌生冷豬肉秦芁散治肺痿勞咳嗽不止時覺寒熱涕唾稠濁秦芁炙紫胡去蘆貝母炮桔梗炮麻黃各一兩甘草三分炙訶子一兩半煨去核用肉稱陳橘皮一兩去白右八味同為末每服二錢空心晚食前用小便一盞烏梅一箇同煎三五沸溫服華蓋散治肺感寒氣有痰咳嗽久療不差紫蘇子炒麻黃去根節杏仁去皮尖陳橘皮去白桑白皮赤茯苓去皮各一兩甘草半兩炙右七味同為末每服二錢水一盞煎至六分食後溫服豆蔲湯治脾胃虛弱不思飲食吐嘔滿悶胸膈不利心腹痛草豆蔲去皮用肉八兩生薑和皮切作片子用一斤甘草四兩銼碎右三味勻和入銀器內用水過藥三指許慢火熬令水盡取出焙乾杵為末每服一錢點之夏月煎之作冷湯服亦妙十味人參散調理榮衛進飲食解利經絡去久滯風邪人參厚朴薑汁炙官桂去皮甘草炙杏仁去皮尖白术乾薑炮茯苓去皮麻黃去根節倍加用陳橘皮去瓤右各等分為末每服二錢水一盞入薑棗煎七分熱服如才覺吹著不安連二三服汗出立愈平胃散治脾胃氣不和不思飲食厚朴去粗皮薑汁塗炙令香淨二兩半甘草一兩半炙陳橘皮去瓤二兩半人參去蘆一兩蒼术米泔水浸二日刮去皮四兩茯苓去皮一兩右六味杵為末每服一大錢水一盞入生薑棗子同煎七分去滓溫服空心服之或杵細末用白蜜為丸如梧桐子大每服十丸鹽湯嚼下空心服治氣利膈進食平胃丸也如做湯入鹽點服亦曰白术湯此藥本無人參茯苓二味好事君子加之丁沉丸治脾胃一切氣不和吐逆不思飲食霍亂不止心腹刺痛膨悶膈噎塞久積虛氣傷酒痰逆婦人血氣及月候不調理中丁香沉香木香檳榔白豆蔲雲南根各半兩肉豆蔲去皮甘草炙青橘去白各半兩人參茯苓各二兩吳白术四兩官桂一分乾薑一分炮訶子一兩去核丁香皮半兩柳桂一分金叉石斛一分玄參一兩半麝香一錢研右二十味同為細末續入麝香和勻煉蜜為丸如酸棗大每服半丸或一丸爛嚼炒生薑橘皮鹽湯下溫酒亦得婦人炒生薑橘皮醋湯下草豆蔲散治脾胃氣不和霍亂不止酒食所傷兼患脾泄能和一切冷氣厚朴二兩去皮用生薑三兩取汁浸炙汁盡為度草豆蔲和皮一兩乾薑一兩炮白术一兩炮黃色訶子一兩炮去瓤細切炒用二兩右杵羅為末每服二錢霍亂冷米飲下或酒調下脾痛不可忍者炒生薑酒下三錢餘即如湯煎服椒朴丸治脾胃虛乏伏積冷氣喫食不消多困羸瘦面黃口淡不思飲食梓州厚朴去皮用十兩以薑汁炙令香細銼漢椒揀淨十兩鹽花十兩黑附子二兩炮去皮臍銼碎右以水十碗於銀石器內以文武火熬候水盡為度焙乾同研為末煉蜜并糯米粉同為糊和丸如梧桐子大每服二十丸至三十丸空心溫酒下如大腸滑泄生薑米飲下藿香散治胃氣消食定霍亂止嘔逆進飲食化冷痰藿香一兩厚朴一兩去粗皮薑汁炙令香熟甘草三分炙青橘皮三分湯去瓤細切麵炒官桂半兩去粗皮乾薑一兩半炮枇杷葉一分炙去毛右七味同為末每服二錢水一盞入生薑二片棗一枚同煎七分服丁香散暖脾助胃止心腹痛進食定嘔逆治㵼痢肉豆蔲去皮人參各半兩白茯苓去皮蒼术三分厚朴去皮薑汁炙令香半兩青木香半兩荆三稜炮半兩乾薑炮銼半兩吳茱茰丁香各一分芍藥半兩炙甘草一分右十二味同杵細末每日空心食前米飲調下二錢蓽澄茄散治脾元虛冷氣不和胸不快腹肚膨脹氣刺氣痛元氣㽱疼不思飲食酒色過度面黃口淡蓽澄茄半兩炒荆三稜二兩炮趂熱杵陳橘皮二兩去瓤甘草二兩炮丁香二兩香附子三兩炒蠻薑一兩一分厚朴一兩去皮薑汁炙令黃香舶上茴香二兩官桂二兩去皮桔梗一兩白鹽十二兩揀擇淨炒研細後入阿魏皂子大一塊麵裹煨麵黃為度去麵别研細旋入諸藥右十三味同為末細研和令勻每服一大錢入生薑二片水八分盞煎五七沸熱喫如作湯入薑錢點之大療中酒兼其味甚佳香蘇散治肝亢風盛刑於脾胃致多飱泄調順中脘平和胃氣紫蘇葉一分揀擇淨焙乾肉豆蔲一分去殼天雄一分銼碎以鹽一分同炒令黃色住青橘皮去白一分蠻薑半分炮白术半兩細銼微炒黃色縮砂仁一分川芎甘草各一分炙右九味為細末每服二錢水一盞生薑三片同煎五分溫服日進三服柴胡散治榮衛不順體熱黃瘦筋骨疼痛多困少力飲食進退柴胡去蘆二兩鱉甲二兩醋浸一宿炙令黃甘草知母各一兩秦芁一兩半右五味杵為末每服二錢水八分盞棗二枚煎六分熱服烏頭丸補暖水藏壯筋骨縮小便大治風川烏頭一斤用東流河水浸二七日每日三度換水日滿取出去黑皮并臍尖切作桞葉片子入牽牛子一合用炒候香熟即去牽子不用舶上茴香二兩别杵為末青鹽五兩别研川椒五兩揀去子牛膝五兩細切以好酒浸一七日爛研陳橘皮去白二兩右六味依法修製了用牛膝膏拌和勻入臼再杵千下丸如桐子大每日空心鹽湯溫酒任下十五丸至二十丸牛膝雖酒浸後爛研與諸末拌和恐難得細或只將牛膝浸日足後焙乾為末却將浸牛膝酒煮糊和末為丸亦得若更服利膈湯散最相宜也諸氣夫人之生稟於榮衛人之本皆係於氣氣若和平邪正不能干犯氣若盛衰百病由是生焉故怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收聚熱則腠理開而氣泄憂則氣亂勞則氣耗思則氣結經曰九氣七氣及言諸氣者皆不出於此也診其脈寸口伏胸中逆氣是諸氣上衝胸中故面胕腫喘息如脈浮大不治上氣脈躁而喘者屬肺肺脹欲作風水發汗即愈其脈若虛寧得伏匿者生牢強者死喘息低不得者其脈滑手足溫即生如脈澀及手足冷脈數者亦死謂其形損故也至於五積六聚癥瘕癖塊皆由隂陽不和臟腑虛弱受於風邪搏於臟腑之氣所為也腑者六腑也臟者五臟也臟為隂腑為陽陽浮而動隂沉而靜是故五臟積癥發不離其部上下有所窮已聚瘕者六腑所成痛無常處上下無所留止蓋由臟腑受邪初未能為疾留滯不散乃成癥瘕也丁沉香丸治一切氣不和心腹疰悶氣脹胸膈噎塞不利及積冷氣或時攻衝脾胃氣逆不思飲食霍亂不止臟腑滑泄酒食所傷醋心不消冷痰併多大效甘草炒官桂去皮沉香丁香木香檳榔訶子炮去核各半兩人參一兩半白术四兩銼碎炒令黃色肉豆蔲半兩去皮青橘皮去瓤半兩白豆蔲去皮半兩右一十二味同為細末煉蜜為丸如小彈子大每服一丸生薑湯嚼下阿魏丸治丈夫婦人一切氣攻刺疼痛呼吸不得大腸滑泄阿魏一兩半當歸半兩細切醋炒官桂半兩陳橘皮半兩去白細切醋炒白芨三分木香三分吳白芷半兩附子半兩炮去皮臍乾薑一兩炮蓬莪荗一兩吳茱茰半兩醋炒延胡索半兩銼碎醋炒川芎半兩銼醋炒肉豆蔲硃砂各三分研細為末右除阿魏硃砂外同杵為細末以頭醋半升浸阿魏經宿用生袋取汁煮麵糊為丸如梧桐子大以硃砂為衣每服五丸溫酒下橘皮湯亦得婦人醋湯下小丁沉丸治一切氣疾開胃口消酒食毒甘草一兩炮縮砂一兩去皮白芷一兩炒令黃陳橘皮四兩去白益智一兩丁香半兩生薑一斤細切入青鹽四兩拌令勻入合和經一宿焙乾沉香一兩木香半兩舶上茴香半兩炒阿魏一兩用醋半斤煎為膏入諸末在內麝香少許右一十二味杵為末醋煮麵糊為丸如雞豆用硃砂為衣空心喫酒或鹽薑湯嚼下一二丸大化酒食毒和氣塌氣散治虛氣攻衝心胸滿悶元氣冷疼及一切氣不調順舶上茴香炒枳殼去白麩炒茯苓去皮人參各一兩乾薑半兩炮陳橘皮去白二兩青橘皮去白二兩甘草半兩炙蒼术半兩丁香一分髙良薑一分右一十一味同杵為末每服一錢水一盞入生薑棗同煎至七分熱服入鹽如茶點服亦得撞氣丸治一切氣木香半兩荆三稜一兩炮青橘皮一兩去白胡椒一兩官桂一兩去皮乾薑半兩炮茴香一兩炒甘草一兩炮檳榔一枚炮木爪末一兩阿魏一錢用白麵和煨熱用右一十一味搗羅為末用蒸餅先水浸過後和為丸如彈子大硃砂為衣每服一丸鹽湯嚼下乳香丸散滯氣消酒食利胸膈化痰和順元氣止冷氣攻刺乳香沉香沒藥木香硃砂細研枳殼去白蓬莪茂烏頭炮檳榔各一兩芫花醋炒令赤狼毒醋熬乾漆炒各半兩阿魏一分青橘皮去白三分右一十四味同杵為末以硇砂一兩半用水飛過去砂石以川楝子肉四兩為末同以好醋熬成膏入在前末和勻可丸如豌豆大每服十丸十五丸溫酒或薑湯鹽湯任下亦得桂枝丸治氣利胸膈進飲食充肌膚療心疼腹痛若宿酒後服妙檳榔三箇大者牽牛三兩以一半麩內炒一半生用官桂三兩去皮青橘皮二兩去白陳橘皮二兩去白乾薑三兩炮右六味同為細末煮醋麵糊為丸如菉豆大每服十五丸茶酒任下如婦人心腹疼即醋湯下男子用茴香湯下勝金丸治一切氣不和及女人血氣腫化積滯消酒食芫花大戟甘遂荆三稜牽牛乾漆青橘皮去白陳橘皮去白巴豆各半兩硇砂膽礬各一分右除硇砂膽礬外餘並用生薑半斤搗碎入好醋一升浸一宿取出薑不用控乾焙令乾為末醋化硇砂并膽礬煮麵糊攪和為丸如豌豆大消酒食及常服茶酒任下三五丸婦人心氣痛醋湯下水氣及一切氣腫并痢疾生薑酒下一切氣不和生薑湯下五積散治一切氣蒼术二十兩桔梗十兩陳橘皮六兩去白吳白芷三兩厚朴二兩去皮枳殼四兩麩炒去瓤以桂一處杵為末官桂去皮春夏用三兩秋冬用四兩芍藥一兩白茯苓一兩去皮當歸二兩去土人參二兩川芎一兩半甘草三兩半夏一兩洗七遍乾薑春夏用一兩半秋冬二兩麻黃去節根春夏用二兩秋冬用三兩右各洗擇淨焙乾除官桂枳殼别杵外諸藥同為粗末分作六分於大鐵鍋內以文武火炒令微赤黃熟為度不可令焦須是勻取出以淨紙襯安板床下候冷勿令塵土侵却入前枳殼官桂末和勻於密器內收貯若隂氣傷寒手足逆冷或睡裏虛驚及虛汗不止脈氣沉細面青或手足冷心多嘔逆宜入順元散一錢同煎熱服或婦人産前胎不安及傷腹痛只依常法以末二錢水一盞煎至七分服如生産痛陳踈及艱難經兩三日不生胎死腹中或産母困頓無力産戶乾即入順元散同煎以水七分酒煎數十沸相次喫兩服其産母便省有力其血氣內和便自有痛陳胎死者不至三服其順元散多少量産母虛實用之神效或是傷寒遍身煩熱頭疼每服更入蔥白一莖豉七粒同煎服之連喫三服出汗陽毒不宜或脾胃不和內傷冷食渾身疼痛頭昏無力或痰逆或胸膈不利氣壅或多噎塞飲食不可及元氣攻刺兩脅疼痛及女人血海久冷月候不勻走疰腹痛經不行者並如常法煎服順元散順元散川烏頭二兩炮去皮臍附子一兩炮去皮臍天南星一兩炮右三味同為細末每服入前散子用之豆蔲散和一切氣及踈轉後用之亦得肉豆蔲三箇官桂一分去皮川芎一分香附子二十一箇炮過陳橘皮去白一兩甘草三分炮零陵香一分右七味同為散每服一錢水一盞薑棗同煎六分溫服不拘時丈夫女人老少並宜服之治項氣方豬靨二七箇於瓦上􅏼乾甘草一兩桑白皮一兩黃檗少許石榴根皮一兩醋炒膩粉一十五文刺椿根頭皮一兩右七味同為散每服二錢以陳米飲調下空心卧服忌生冷油膩動風物磁石丸治諸氣腫大有妙效次用補藥羌活陳橘皮木香澤㵼附子炮去皮臍檳榔白术赤茯苓去皮肉蓯蓉訶子炮去皮用官桂去皮新辣者黃耆别研取細末鱉甲醋炙令黃烏頭炮椒紅桑白皮别杵羅為末不用筋滓上好磁石脅鐵多者燒赤入醋中淬十遍細研水飛過至細為妙右一十七味各半兩為末用羊石子或獖豬石子去筋膜生細研和末再杵一二千下如硬更入少酒糊丸如梧桐子大焙乾空心日午溫酒下二十丸至三十丸切忌房室并鹽藏諸毒物須至百日外分氣丸消滯氣利胸膈止心疼化酒食毒治腹脅脹滿荆三稜醋浸一宿切作片子焙乾用牽牛微炒大戟各三兩細銼炒令紫色芫花二兩醋炒甘遂二兩槌碎炒令黃色住官桂去皮一兩右同杵為細末以醋煮糊為丸如菉豆大每服十丸煎陳橘皮湯下不嚼破如大段腹脹膨滿氣滯如要行動漸加丸數併喫三兩服以微利為度搜癥丸治結氣硇砂川烏頭官桂乾漆各半兩右搗為細末用青州棗煨熟取肉為丸如菉豆大每棗肉一箇用巴豆五枚一處同杵二十下每服五丸木爪酒下七聖散治氣厚朴四兩去皮後銼細用薑汁浸一宿炒令紫黑色生薑二斤洗淨細切作片子日曬乾别炒令紫黑色甘草二兩細銼炒令紫黑色陳橘皮去皮六兩炒令勻草豆蔲二兩炮後銼細更炒令勻右各炒了更同炒令勻同為細末常服二錢入鹽少許點喫忽患脾氣等疾每服三錢薑二片棗一枚水一盞同煎至六分溫服婦人冷血氣亦宜服忽氣㵼及氣痛等疾並宜服食凡踈轉後並宜以此補治之補隂丹治男子本藏氣婦人血氣一切氣疾及産後一切血臟病患宜服之硃砂去石硇砂去石延胡索半夏湯浸七遍芫花醋浸炒黃色木香斑貓去翅足酒浸後炒令焦黑止各半兩海蛤荆三稜蓬莪茂大附子炮去皮臍舶上茴香川苦楝子醋浸炒黃青橘皮各一兩肉豆蔲三枚檳榔三枚右一十六味搗羅為細末酒煮麵糊為丸如梧桐子大每服五七丸女人用醋湯丈夫用溫酒或鹽湯下空心臨卧各一服此藥大健脾元能療小腸氣膀胱氣刺疼痛婦人産後惡物不盡變作血瘕者並宜服之蔥白散治一切冷氣不和及本臟膀胱氣攻衝疼痛大治婦人産前産後腹痛胎不安或血刺者兼能治血臟宿冷百骨節倦疼肌瘦怯弱傷勞帶癖服久盡除但婦人一切疾病最宜服之川芎當歸枳殼去白麩炒厚朴去皮薑汁炙青橘皮去白官桂去皮乾薑炮舶上茴香炒苦楝子芍藥木香神麯炒麥蘖炒荆三稜炮蓬莪茂醋浸一宿焙人參茯苓去皮各用一兩乾地黃一兩訶子半兩去核大黃半兩二味相度用之右二十味同杵為末每有患者三平錢常服只二錢用蔥白二寸擘破水一盞同煎至七分入鹽半錢和滓熱服內訶子大黃二味或有用者或不用者蓋相度病狀可入即入此二味多不全用若須入大黃即服時不須入鹽也丁香煮散治一切冷氣攻衝心胸不利不思飲食腹脅刺痛口舌無味丁香一兩三分蓬莪茂二兩蓽澄茄一兩半藿香一兩半沉香一兩訶子二兩去核前胡一兩人參一兩京芎一兩木香三分檳榔七箇豆蔲去皮七箇枳殼一兩三分炒令黃色芍藥半兩當歸三分麝香半兩右一十六味同搗為末每服一錢水一盞煎至五分熱服大治吐逆及酒後嘔吐不止胸膈悶不思飲食丁沉煎丸又名蓽澄茄丸治心腹冷氣不和絞刺痛疼大效蓽澄茄新者沉香木香丁香肉豆蔲去皮檳榔茴香炒川苦楝子髙良薑官桂去皮當歸淨洗去土切細焙乾蓬莪茂各一兩右十二味都杵羅為末用附子二兩炮烏頭二兩炮别杵為末用米醋五升浸硇砂一兩經一宿澄去砂石以此醋煮附子烏頭為糊溲和前藥末為劑杵三五百下為丸如彈子大每服一丸細嚼丈夫炒生薑鹽湯下婦人炒生薑醋湯下有孕不可服但心腹諸疾服之必差大阿魏丸治男子女人一切冷氣霍亂吐㵼元氣將脫四肢厥冷本臟氣上攻築心疼悶絶不知人事及治傷冷傷寒或氣虛夾隂氣傷寒並見先服此用正真氣阿魏一兩半以醋化入白麵三兩匙同和為餅子炙令黃硫黃一兩半别研如粉青木香一兩附子一兩半炮石菖蒲一兩半並以米泔浸一宿炒檳榔白术各一兩炒乾薑半兩生桃仁三分麩炒去皮尖别研細當歸三分訶子一兩炮去核厚朴三分去粗皮以生薑汁塗炙淨稱右一十二味除硫黃桃仁外同細杵為末次入硫黃桃仁同研令勻以稀麵糊為丸如梧桐子大每服十丸溫酒鹽湯任下女人醋湯下並用空心服如常服即大壯元氣進食駐顔理中丸治一切冷氣攻刺疼痛心腹脹滿胃冷吐逆臍腹撮疼阿魏一分用白麵兩匙醋和作餅子炙令黃熟荆三稜煨蓬莪茂煨甘草炙青橘皮去白陳橘皮去瓤乾薑炮乾木瓜官桂去皮白术各一兩右一十味杵羅為末用麵糊為丸如櫻桃大以好硃砂為衣每服一丸嚼破煎生薑木瓜鹽湯下如婦人血臟氣攻刺即用炒當歸生薑湯嚼下一丸一切氣痛但服此藥必效順氣散調順冷氣解利傷寒吳茱茰洗令淨春夏用一分秋冬用半兩麻黃一兩去節人參半兩訶子半兩煨去核稱大黃三分官桂一兩去皮厚朴一兩去皮薑汁炙乾薑半兩炮陳橘皮一兩去白甘草一兩炙右一十味同為末每服一平錢水一中盞薑二片棗一箇同煎六分通口服如外傷風邪即先服此藥三服次喫發汗丸散必效蓽澄茄丸治丈夫元陽虛冷氣上衝心胸滿悶腸脅雷鳴或多攻刺嘔逆膨脹沉香丁香木香舶上茴香各半兩烏藥一兩白芷一兩一分胡盧根三分蓽澄茄一分右八味同為末煉蜜為丸如彈子大每服一丸薑鹽湯嚼下硇砂木香丸治丈夫婦人一切冷氣攻刺疼痛或成積聚隱見不常發則㽱刺巴豆一兩去皮以紙出油盡為度别研硇砂半兩别研細後入巴豆時入諸藥中附子一枚炮去皮臍官桂去皮茱茰炒木香荆三稜炒舶上茴香乾薑炮丁香各一分右一十味同為末用乾柿一枚洗過輕蒸令軟和末丸如菉豆大取食利胸膈氣淡茶下十丸女人血氣及諸般氣艾酒下丈夫臟腑氣蔥酒下化痰津液下酌其虛實加減丸數七香丸消化酒食毒破心胸冷氣攻刺疼痛丁香二分官桂一分青橘皮半兩縮砂半兩去皮木香一分檳榔三枚巴豆二十粒去皮膜以紙裹出油用右七味為末醋糊為丸如菉豆大每服十丸十五丸薑湯茶酒任下勝金丸治冷熱氣不和不思飲食或腹痛㽱刺小梔子川烏頭各等分右同生杵為細末酒糊為丸如梧桐子大每服十五丸炒生薑湯下如小腸氣痛炒茴香蔥酒下二十丸沉香蓽澄茄散治一切冷氣不和及膀胱小腸氣疾常服即大妙能補護四十嵗已上者宜服之蓽澄茄沉香胡盧巴微炒破故紙微炒官桂去皮舶上茴香微炒川苦楝子炮捶破去核用肉木香紫巴戟穿心者已上各一兩黑附子炮製去皮臍用四兩桃仁麵炒去皮尖用二兩川烏頭半兩泡去皮臍右一十二味同杵為細末每服二錢水一大盞入鹽同煎至八分溫服又小腸一切氣痛服之有效如空心入鹽點半錢熱服救生丹消酒食化滯氣空利胸膈丁香一分肉桂一分去皮大甘草七錢炒存性麵薑半兩燒存性木香一分巴豆十五箇去殼油煎令黑色為度右六味杵為細末以酒煮麵糊為丸如菉豆大茶酒送下三二丸硇砂丸消久積食治心腹腸滿胸膈不利痰實胃噎硇砂炒者稱二錢平狼毒銼碎醋拌微炒乾用一兩芫花醋浸一宿炒黃色一兩乾漆一兩鱉甲醋炙黃香一兩硫黃一分細研如粉巴豆一十五枚去皮膜以醋一升煮令紫色右件杵羅為細末入研了藥一處同和令勻煮麵糊為丸豌豆大每服三丸食後臨卧溫生薑湯下萬金丸消化積滯調三焦空利胸膈定氣刺疼痛腹脅脹疼冷氣攻疰婦人血氣小兒夜啼胃冷痰涎並宜服之舶上硫黃一分巴豆去皮稱半兩二味同以生絹袋子盛於漿水內用文武火煮一伏時放冷别研令細柴胡半兩去苗附子一兩炮乾薑半兩桔梗一分青黛半兩當歸一分陳橘皮去白一分右九味同為細末以麵為丸如小豆大每服二丸至三丸溫水下婦人血氣醋湯下小兒夜啼常服一丸溫水下水㵼生熟水下血淋地榆湯下白痢乾薑湯下痰涎併多生薑湯下一切氣疾煎生薑橘皮湯下並不以時候服三稜丸治積年五藏氣塊積滯荆三稜石三稜二味釅醋浸一宿取出切杵為末醋熬成膏雞瓜三稜炮青橘皮去白厚朴去皮薑汁塗炙硇砂以溫水飛過熬成霜巴豆出油去皮膜已上各半兩檳榔二箇生用一箇炮用一箇肉豆蔲一箇去殼木香一分乾漆一分炒右一十一味入於膏子內和搗一千下丸如菉豆大每服五丸如氣痛茴香湯下臍下氣塊神麯湯下心膈氣禹餘糧湯下左脅塊柴胡湯下右脅木香湯下血氣塊當歸酒下血氣痛赤芍藥湯下五七丸氣針丸治久積風壅疏利滯氣空胸膈止刺疼牽牛二兩一半生一半炒木香青橘皮去白川大黃微炮檳榔各一兩右五味為末煉蜜為丸如梧桐子大每服十五丸至二十丸以溫水下三稜丸治積聚氣塊及和脾胃或心腹滿悶噎塞者荆三稜三兩擘破以好醋三升用文武火煮令盡為度勿於鐵器中枳殼去瓤麩炒一兩木香一兩青橘皮去白一兩檳榔一兩官桂去皮一兩甘草二兩炮右七味同杵為末每服一大錢水一盞煎至七分去滓溫服如患在膈上即食後服之膈噎通關散治五膈氣噎塞妨悶遍身虛腫涕唾稠濁不下飲食麥蘖三錢馬兜鈴三錢訶子一枚芫花三錢漿水浸微炒硃砂一錢白丁香三錢硇砂二錢飛去砂石黃丹一錢白礬鉛白霜各一錢右一十味同研令至細勻每服一錢半入膩粉兩文雞子一箇去黃只取清調末却入雞子殼內用濕紙裹慢火煨熟放冷爛嚼臘茶湯下臨卧服之來日逐下黑惡物永差如小可噎閉依法服一錢必效半夏散治五膈氣噎心胸不利涕唾稠粘飲食進退半夏半兩薑汁浸一宿焙乾厚朴半兩去皮薑汁炙枇杷葉炙去毛半兩肉豆蔲一箇去殼母丁香二十五枚青丁香一塊棗大右六味為細末每服一錢水八分盞煎六和滓熱服酒後服尤妙也檳榔散治胸膈注悶噎塞不快不思飲食大治脾胃一切病并腎膈氣醒酒化氣檳榔木香人參甘草炙乾薑炮官桂去皮青橘皮去白白术米泔浸一宿焙乾荆三稜擘破煨神麯炒厚朴去皮用薑湯炙令香黃色已上等分右十一味杵為末每服點半錢入鹽少許如患脾胃病并腎膈氣每服一錢入鹽湯服甚妙蓽撥散治噎疾虎頭王字骨酥炙額骨是也蓽撥微焙人參去蘆羚角屑已上各等分右四味為末每服二錢溫水調下臨卧食後服博濟方卷二
