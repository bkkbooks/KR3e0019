body:
  text: 提要博濟方五卷醫家類臣等謹案博濟方五卷宋王衮撰衮太原人其仕履未詳惟郎簡原序稱其嘗為錢塘酒官而已此書諸家書目皆著於録惟宋史藝文志陳振孫書録解題俱作三卷朝公武讀書志作五卷稍有不同蓋三五字形相近傳寫者有一訛也公武又稱衮於慶厯間因官滑臺暇日出家藏七十餘方擇其善者為此書名醫云其方用之無不效如草還丹治大風太乙丹治鬼胎尤竒驗今案衮自序有云嚮侍家君之任滑臺道次得疾遇醫之庸者妄投湯劑疾竟不瘳據此則官滑臺者乃衮之父而公武即以為衮殊為失考衮又言博採禁方逾二十載所得方論凡七千餘道因於中擇其尤精要者得五百餘首而公武乃云家藏七十餘方則又傳寫之誤也原書久無傳本惟永樂大典內載有其文裒輯編次共得三百五十餘方視衮序所稱五百首者尚存十之七謹分立三十五類依次排比從讀書志之目釐為五卷其中方藥多他書所未備今雖不盡可施用而當時實著有竒效足為醫家觸類旁通之助惟頗好竒異往往雜以方術家言如論服杏仁則云彭祖夏姬商山四皓煉杏仁為丹王子晉服四十年而騰空丁令威服二十年而身飛此類殊誕妄不足信今故取服食諸法編附卷末以著其謬俾讀者知所持擇焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序大鈞播物融結而為萬類其最靈最貴者惟人人之所稟賢不肖雖異然莫不自重其性命所不免者疾苦也古之君子居位行道曷嘗不以周人之急除民之瘼為心哉人而無食乎可賑而飽之也人而無衣乎可溫而解之也至於一脈內潰五管生釁惛怓瞀亂號呼楚毒謦咳間有不可生之意當是時非妙診靈劑可以起廢保命則雖有金玉牣其室骨肉環其前割慈忍愛痛心疾首又何珠球哉豫厯宦不啻數十載或遘奇傑或韜巾衍所得方録較然神異者用以濟人至今未嘗少懈居常患不能家至户曉使天下之人皆獲其利以是汲汲然有不足者今春錢塘酒官王君惠然見過出方書三編示豫且曰衮平素善醫診所托精要方若干首不敢自愛欲刋摹以周施四方冀人人得遂其生豫樂聽所云頓起夙昔之願稱歎者久之雅聞其人好奇博涉之士也因自録素所奇異方有驗於人者得三十餘通請附於類例之內以助成一家噫救災恤患陽秋之大誼也博施濟衆仁者之首善也惟冀一圓一劑有瘳有喜使幅員之衆無札瘥無疵癘胥考終命是所願也豫既嘉其秉心贊厥美事粗舉崖略庸紀於末郎簡序自序天地之間運行而生成者非五行乎人稟五行之秀而生故具之於形稟之於氣也其在天則四時六氣運乎外一失其道則為災為沴焉其在人則五味七情攻乎內一失其理則為疾為沴焉時候乖有德者和之疾沴生善醫者治之蓋醫之興其來浸久軒后著之於書周禮眀列其職皆所以重人命也然人之疾狀多端醫道又不可一塗取也方書藥録其數實繁故自姬漢而下沿及於今雖巨言博識編聨周施者甚衆然不能盛行於世何也亦非採擇之精治療無凖蓋眀其術者即深祕其隱要昧於道者乃不詳其證候逮乎臨用有悮十全衮嚮侍家君之任滑臺道次得疾遇醫之庸者不究其脈理妄投湯藥而疾竟不瘳復又母氏多病積有年所衮遂因公暇潛心醫術博採禁方逾二十載矣所得方論凡七千餘道皆傳之於家牒得之於親舊故非耳剽口授率經效用因於其中擇其尤精要者理療可憑方書必驗得五百餘首仍於逐篇之前或言其疾狀或紀其脈息或序其形證或論其得病之由庶使昧於醫者可審度而修制之工於醫者可消息而變用之噫今之人若得一妙方獲一奇術乃緘而祕之惕惕然惟恐人之知也是欲獨善其身而非仁人泛愛之心也衮嘗念人之有疾苦若已父母有之汲汲然欲其痊也故竭精研慮編次成集傳諸好事斯亦博濟之一端也故目之曰王氏博濟方王衮序
