body:
  text: 博濟方卷一宋王袞編傷寒人參煑散治内傷寒冷外傷寒氣嘔吐煩熱頭疼身不疼及氣虚傷寒人參一兩白术三分陳橘皮去白乾薑炮杏仁去皮尖甘草炙枳殻各半兩芍藥三分蠻薑一分聖濟總録作髙良薑右九味同為末毎服二錢生薑五片棗二枚水一盞煎至七分熱服再以稀粥助之汗出差金沸草散治傷寒壯熱風氣壅盛頭目心胸不利婦人血風朝發丈夫風氣上攻狀如中脘有痰令人壮熱頭疼項筋𦂳急時發寒熱皆類傷風有寒氣則出汗如風盛則觧利荆芥穂四兩旋覆花三兩前胡三兩麻黄去節三兩甘草一兩炙半夏一兩洗净薑汁畧浸赤芍藥一兩右七味同為末毎服二錢水一盞入生薑棗同煎至六分熱服如汗出併三服陳自眀管見良方但頭不疼項不强為異耳石膏散治傷寒頭疼不可忍者石膏一兩麻黄一兩去根節何首烏半兩乾葛三分右為末毎服二錢薑一片水一盞同煎至八分温服太一散治傷寒頭痛大附子一兩炮去皮臍甘草半兩生石葦半兩去毛石膏二兩滑石二兩右五味同為細末毎服二錢葱白薄荷茶調人參訶子散治傷寒氣不順食嘔胸膈不利有時泄㵼人參乾葛厚朴去皮地黄各二分丁香一分訶子七枚豆蔲一箇去皮右七味同為末水一盞末二錢入生薑棗同煎熱服沉香散治傷寒嘔結痞心胸真氣虚弱脉息沉細正氣補元奪命沉香舶上茴香青橘皮去白胡椒蓽澄茄川楝子陳橘皮去白各一兩右七味同生杵為末如患者但得心頭有氣未斷亦服之毎服二錢葱白三莖各長一寸擘破入酒并童子小便各半盞煎至六分放温和滓服患重者不過三兩服氣正脉生柴胡散治傷寒日數過多心中氣悶或發疼痛狂言不定狂躁不得睡大小便不通柴胡一兩去苗大黄一兩朴硝一兩甘草半兩枳殻一兩去瓤右五味為末毎服三大錢水二盞煎至六分温服一日只二服不可多服候大小便通即自然汗出或當此候喫下毒氣藥通利即不用服柴胡散或狂言須服大有奇效陷胸散治心胸悶結喘不定服之自汗出大黄一兩半甘草半兩枳殻半兩去瓤右三味為末毎服三錢水七分盞煎二三沸温和滓服汗出為度六日内多使此散如無證不用豆蔲散治兩感傷寒結胷壯熱惡寒飲食不下大小膓祕塞陰毒昏沉臍下水結撮痛四肢逆冷心躁不省人事食癥結聚心下逆滿坐卧不得肉豆􅅳二枚麻黄去根一分木香一分白术一分吴茱茰一銖附子八銖炮去皮乾薑二銖炮桂心三銖蛜􅖉五箇糯米炒令黄去米訶黎勒二枚炮㯽榔二枚當歸一分青橘皮二七片茯苓去皮八銖甘草一分炙大黄八銖濕紙裏煨右十六味同為細末毎服三錢棗三枚水一盞煎至七分食後熱服盖覆若胸腹内痛空心服必效如稍溏利無妨金針丸治傷寒結胷氣送并手足冷吐嘔不定陽起石不灰木阿魏各半兩巴豆二十五粒去皮心不去油杏仁二十五枚去皮尖右五味同為細末用軟粟米飯為丸如彈子大毎服取一丸穿一眼子於燈上燒煙絶為末以生薑米飲調服之以利為效僊茅丸治傷寒結胸及惡候者大效僊茅一分貫衆半兩黒附子半兩去皮蓽撥一分巴豆半兩去皮心甘草少許乾薑半兩右七味同為細末麫糊為丸如梧桐子大下結胸生薑棗湯下一丸五七日患者更打破一丸同前湯下如常傷寒只用冷漿水下如轉後湏用順氣㣲表藥服之汗出差人參散治傷寒和氣温中安神䰟五日内服人參茯苓去皮白术米泔浸一宿陳橘皮去瓤各一兩右四味杵為末毎服二錢水一中盞生薑二片煎至六分温服之一日三服順氣散治傷寒脾胃氣不和汗前汗後嘔逆腹脹虚氣攻刺心脇疼痛及治欬𠻳見羅適傷寒救俗方厚朴去麄皮薑汁浸炒黄茴香炒陳皮浸去瓤焙枳殻湯浸去瓤麩炒黄川芎炒桔梗蒼术米泔浸一宿炒白芷炒甘草炙麻黄去節杏仁去皮尖炒右各等分為末杏仁别研一處和匀毎服二錢葱白三寸薑二片棗二枚同煎至七分熱服此藥調理傷寒汗後氣虚甚有奇效凡病人若手足逆冷嘔惡有陰毒傷寒之證急併三五服自然回陽順氣汗出如服了覺身熱汗久未行却併服金沸散表之年老傷寒不問陰陽二毒並先服順氣散三兩服後方服金沸散表汗又少壮者若是陽毒竝先表汗後用此藥調氣若被風雨逼濕竝宜服之返陰丹治傷寒厥逆太陰𤣥精石一兩硫黄一兩硝石一兩各為末膩粉半兩右四味依次第布在乾熨斗内用紙盖覆慢火煨久候藥上有黄牙生起便止傾乳鉢内閉氣細研五七百下用蒸餅為丸如皂子大若傷寒脉候㣲細四肢逆冷者及曽經轉㵼者煎艾湯約一盞先熱吃艾湯一半細嚼一丸以湯下之湏㬰汗出便差重者二丸必愈神妙正元散觧傷寒聖濟總録云治傷寒陰證脉候沉細麻黄去節陳橘皮去白炙大黄生甘草炙乾薑炮茱茰官桂去麄皮芍藥生附子炮去皮臍半夏湯洗七遍右十味唯麻黄多於衆藥一倍餘藥減用一半同𢷬為末毎服一大錢水一盞入生薑三片棗一枚煎至七分熱服如出汗湏候汗乾可去盖覆凡纔覺傷寒四肢頭目骨節疼痛便服此藥如人行五里許再服或連喫三服立見汗出便差若患陰毒傷寒更入退陰散半錢同煎或傷冷傷食頭昏氣滿及心腹諸疾服之無有不見效者退陰湯川烏頭炮乾薑各半兩右二味同為粗散炒令轉色放冷再𢷬細末毎服一錢水一盞鹽一捻煎半盞去滓温服此藥大治陰毒傷寒手足逆冷脉息沉細頭痛腰重連喫三服若小小傷冷毎服一字入正元散鹽一捻若陰毒傷寒欬逆煎一服細細熱呷乃止奪命丹治陰陽二毒衝心硃砂二兩金箔八十片膩粉半兩黄蠟三兩巴豆八十箇紙裹出油右五味同為末煉蠟和丸如雞豆大毎服以膩粉一錢米飲一盞調下如人行一里藥性動下惡物如藥在其中取出掘一地坑埋三伏時取出除却上面黒物以麝香裹養之如更用之擘為兩處重為丸一粒可療五七人神聖之功卒難序述風證燒肝散治三十六種風二十四般冷五勞七傷一切痢疾脾胃久虚不思飲食四肢無力起止甚難小便赤澀累年口瘡久醫不差俱依此法服之必愈茵蔯犀角石斛柴胡去苗白术芍藥各半兩乾薑防風桔梗紫蘓白蕪荑人參胡椒吴茱茰官桂去皮各一兩右一十五味同為末以羊肝一具如無即獖豬肝代之分作三分浄洗去血脉脂膜細用末五錢葱白一莖細切相和以濕紙三五重裹之後掘地坑内以火燒令香熟毎日空心生薑湯下大叚冷勞不過三服見效骨碎補丸治風虚攻疰徧身筋骨疼痛坐卧不能飲食减少行步無力元氣耗損威靈僊草烏頭各半兩白附子荆芥各一兩牛膝一兩自然銅醋内淬半兩半夏湯洗七遍半兩蓯蓉一兩酒浸切作片焙沒藥一分地龍一分去土縮砂半兩去皮骨碎補半兩去毛右一十二味同𢷬為末酒煮糊為丸如桐子大毎服五十丸臨卧空心茶酒任下服至十日覺皮膚間㣲㣲行之是藥效婦人以醋湯或當歸酒下馬藺花煎丸治元臟虚風壅熱上攻下疰脚氣等馬藺花一兩大附子一兩泡去皮臍切同馬藺花以水一升半煮水乾焙芫花一兩大附子春夏二十二粒秋冬三十八粒擘破和殻同芫花用醋一升半煑醋乾焙白附子一兩陳橘皮一兩去瓤𦍑活一兩破故紙一兩牽牛子半兩㯽榔半兩右十味為末醋麫糊為丸如梧桐子大食前服或卧時空心加減自五丸加服丈夫艾鹽湯下婦人橘皮湯下草還丹治風順氣調利三焦眀耳目益真元壮筋骨駐顔容保生延夀僊茅川𦍑活紫花白术防風去頭金毛狗脊去毛茯苓去皮以上各一兩九節石菖蒲乾薑白牽牛各一兩半葳靈僊二錢何首烏蒼术各一兩右十二味各要新好者洗澤浄焙乾竝生用細杵為末以白生砂蜜和為劑再入臼杵三千下鍊熟丸如桐子大毎服十五丸至二十丸冷水下不嚼婦人月候不通紅花酒下半月見效牛膝煎丸大治下元氣􅌷冷氣流注脚膝無力行步不能状如軟風補益真元川烏頭五兩逐日三度換水浸令透軟去皮臍細切用好酒三升漸漸下熬成膏更細研木𤓰三箇下面剜去取瓤核将好艾先熟杵為末入在木𤓰内填實蒸熟細研如泥止海桐皮牛膝去蘆𦍑活去蘆巴㦸蓯蓉各一兩半青鹽細研青橘皮去白舶上茴香金毛狗脊去毛蓽蔛各二兩右一十味杵羅為末以前二味膏攪和令匀相度莫令硬丸如桐子大毎日空心温酒或鹽湯下三十丸勿嚼牛膝海桐皮煎丸治腎臓風并腎俞氣時有上攻耳目頭面背膊及流注手臂腰脚筋絡頑麻疼痛或時無力耳作蟬鳴以至重聽大壮筋骨補元氣牛膝半斤海桐皮半斤二味細剉杵為末用好酒五升於銀石器内􅆈成膏附子二兩炮去皮臍赤箭一兩川烏頭二兩炮去皮臍川苦練一兩五加皮一兩虎腦骨四兩塗酥炙令黄色大黄二兩半桃仁二兩去皮尖以麩炒黄色赤芍藥一兩肉桂一兩去皮當歸一兩麻黄一兩去根節地龍一兩去土㣲炒川芎二兩木香獨活沒藥研乳香研防風去蘆骨碎補麒麟竭舶上茴香沉香乾蝎天南星生用各一兩麝香半兩研􅔈砂半兩研飛過右二十九味修事净同為末再研令匀細後入前膏内和匀再杵三二千下丸如梧桐子大毎日空心温酒或鹹湯下十丸忌生冷油膩毒物等天雄沉香煎丸治下元積冷傷憊陽事不能筋骨無力或成下墜及小膓氣痛并腎臟風毒攻疰脾胃不和腰脚沉重天雄四兩生用防風二兩生用𦂳黒小豆二兩净拭生用漢椒四兩附子四兩生用草烏頭四兩生用牛膝二兩沉香天麻各二兩生用已上九味以無灰酒一斗於銀鍋内慢火煨不得令大沸酒盡為度焙令乾官桂三兩去皮肉蓯蓉三兩酒浸去土炙熟紫巴㦸二兩去心丁香木香𦍑活乾薑各一兩右一十六味同杵為末煉蜜丸如桐子大毎日空心温酒下二十丸加至三十丸此藥兼眀耳目雄氣海駐顔色金粉丸治風冷氣流疰脚脚疼痛行步艱難久患不差川烏頭一兩毎箇擘開作兩片牛膝一兩去苗酒浸細切之何首烏一兩擘破右三味用大豆一斗淘揀净先入一半在甑内次下此三味在内更用餘大豆盖之蒸可半日許取出藥於篩子内陰乾為末别入地黄金粉一兩拌和匀以酒煑麫糊為丸如梧桐子大空心木𤓰酒下二十丸至三十丸紫金丹治腎臓風上攻下疰虚腫疼痛補暖丹田大進飲食及療婦人血風血氣流注筋骨疼痛或發寒熱口苦舌乾四肢煩倦血海久虚兼化痰涎黒附子半兩炮去皮臍丁香半兩硇砂半兩縮砂去皮半兩當歸半兩天南星半兩炮半夏半兩肉荳蔲五箇自然銅一兩火煆於醋内焠七遍木香半兩青箱子半兩防葵半兩硃砂半兩水銀一分右一十四味先将水銀硃砂硇砂三味同細研餘即一處為細末和均以醋麫糊為丸如梧桐子大薄荷茶下十丸或薄荷酒下亦得日二服勞證夫勞者牢固也勞傷也經曰五勞六極七傷皆因榮衛不調血氣虚損或房或酒或大病愈後有失調理因變證候其状極多不能備舉大抵春夏劇秋冬差鹿茸丸治虚勞傷憊腰脚疼痛少力精神不爽飲食減退駐顔益氣附子一兩炮去皮臍鹿茸二兩去毛塗酥炙㣲黄蓯蓉一兩酒浸一宿去皮炙乾巴㦸一兩去心防風三分去蘆當歸一兩羌活三分桂心三分去皮萆薢三分剉酸棗仁三分㣲炒牛膝一兩去苗木香三分白蒺藜三分去刺㣲炒石斛一兩去根剉補骨脂一兩㣲炒白茯苓一兩去皮桃仁一兩湯浸去皮尖雙仁麩炒㣲黄右一十七味同為細末煉蜜為丸如梧桐子大毎日空心及晩食前以温酒下二十丸鱉甲散治五心煩熱飲食減少狀似勞氣鱉甲一兩半醋炙常山一兩生大黄一兩炮甘草三分半生半熟石膏一兩柴胡一兩去蘆炒右六味杵為末毎服二錢水一盞小麥一把煎至七分去滓温服却将二服滓再煎至一服神效神效喝起散治丈夫女人背脾勞倦肢節酸疼多困少力飲食無味面黄體瘦或發寒熱鱉甲浄洗醋炙令黄柴胡去苗秦芁牡丹皮附子炮去皮臍各等分右五味同為末毎服三錢用獖豬石子一箇去筋膜以葱白一寸椒末一錢同研如糊入碗與藥相和用童子小便一小盞煎三五沸入藥末攪匀盞盖子盖之放温服人參半夏丸治患勞氣心胸煩悶痰涎壅塞不思飲食頭目昏眩半夏一兩湯洗二七次大腹皮二枚人參三分茯苓一兩去皮前胡三分去苗橘皮三分去白枇杷葉三分去毛炙鱉甲三分醋炙令黄柴胡三分去苗芍藥半兩右一十味同為散毎服三錢水一中盞半生薑三片同煎至七分温服𦍑活煑散治風勞攻疰四肢背胛酸疼上焦虚熱心胸躁悶面無顔色四肢昏沉多困少力元藏虚憊腰脚沉重日漸羸瘦冷氣時攻膓脇疗刺脹滿酒後痰唾稠多聖濟總録作羌活湯用棗二枚葱白二寸𦍑活二兩荆芥二兩去梗附子二兩去皮臍秦芁二兩去蘆人參一兩麻黄二兩去節茯苓一兩去皮牛膝二兩酒浸一宿白蒺藜二兩酒浸一宿焙沉香一兩牡丹皮一兩當歸一兩半夏一兩薑汁浸一宿漢防己官桂各一兩去皮甘草一兩鹿茸酥炙萆薢一兩薑汁浸右一十五味同𢷬為末毎服二錢水一盞棗二枚葱白一寸煎至七分温服空心午前臨卧各一服忌動風物沉香鱉甲煮散治脾腎風勞氣攻疰背膊四肢煩倦百骨節酸疼喫食減少心胸不快涕唾稠粘多困少力面色黒黄肌膚瘦瘁沉香木香人參黄耆牛膝去苗茯苓紫巴㦸去心川當歸秦芁去蘆柴胡去蘆荆芥各半兩半夏生薑汁浸二宿炒令黄色半兩桂心一兩不得近火去皮附子一兩炮去皮臍𦍑活三分乾地黄三分乾蝎一分生鱉甲一兩醋炙令黄肉豆蔲四枚去殻右件洗擇焙乾杵羅為末毎服二錢用水一大盞葱白二寸薑三片棗二枚同煎七分空心夜卧日午食前各一服忌毒物金花丸治急熱勞煩躁羸面目痿黄頭痛眼澀多困少力黄芩黄連宣州者川大黄各一兩右件為末煉蜜為丸如梧桐子大毎日空心食後温水下十五丸二十丸治鬼交多饒驚魘川楝子十箇炮胡蘆巴一分舶上茴香一兩柴胡半兩附子一箇炮去皮臍宣連半兩鱉甲一箇醋炙令黄右件同杵為末煑麫糊為丸如梧桐子大毎服五丸茶酒任下青蒿煎丸治骨蒸勞青蒿一斤切浄洗去土甘草一兩炙黄色為末杏仁一兩湯浸去皮尖别研柴胡一兩去蘆為末銀州者鱉甲一兩半醋浸炙令黄赤色為末蜜二合右先用童子小便五升煎青蒿取一升去蒿滓入小浄鍋子内再煎如稀餳入酥少許及蜜藥末等熬成膏可丸如梧桐子大毎日空心温酒下二十丸漸加至三十丸忌豬肉熱麫莧菜胡荽等毒物橘皮煎丸治冷勞瘦疾目暗手足攣急形容枯悴食不消化腹脹不能納食食物無味面黄力弱積年膓風痔疾痃癖氣一切勞病女人血癥氣塊赤白帶下子宫冷甚宿水露血治五種膈氣冷膈熱膈氣膈思憂膈四肢無力饒睡此藥大能通利五藏眀目去一切風冷陳橘皮一斤去瓤净洗官桂去皮乾薑炮川當歸炙以上四味别羅細附子炮去皮臍京三稜炮萆薢已上三味别杵羅神麯各六兩烏頭炮水煮三五沸木香各一兩川椒去子炒出汗一兩大麥蘖四兩厚朴去皮薑汁炙已上六味别杵羅留出半兩蘖末右件用無灰好酒四升先煎上四味如人行十里更下次三味又如人行十里次入下六味又添酒兩碗煎成膏取出以留出者麥蘖末相和匀再𢷬一千下為劑丸如梧桐子大毎日空心以茶酒任下二十丸至三十丸午時再服忌生葱鹽䜴此藥煎若用銀石鍋極妙如無即取熟使鐺盡洗無油膩先於鐺抹真酥次下酒及下藥用慢火煎不住以銀匙攪直候如膏取出於净盤中匀攤候硬軟得所攪了衆手為九曬乾此藥如久服即補氣壮真元駐顔色進飲食燒肝散治丈夫女人五勞七傷胸膈滿悶飲食少味脚膝無力大膓虚滑或即口内生瘡牙齒宣露及偏療婦人風血氣塊者肉豆􅅳三箇和皮官桂三分去皮香白芷半兩當歸破故紙人參茯苓桔梗各半兩右八味為末毎服四錢羊肝四兩批作片子糝藥在上令匀以刀背㣲槌以南粉塗濕紙裹文武火燒令香熟為度放冷用米飲嚼下沉香散治丈夫女人五勞七傷熱無力小便黄赤喫食無味心多驚悸骨節酸疼心胸痞悶兩脇疼痛散滯氣沉香㯽榔大附子炮去皮臍人參去蘆黄耆枳殻去瓤麩炒乾薑炮各半兩柴胡去苗一兩雀腦芎用半兩訶子炮去核甘草五味子各一兩半夏二兩用漿水煮三十沸細切小片子焙乾用之草豆蔲三分炮去皮用右件為末毎服二大錢水一盞生薑一片棗子二枚同煎至七分温服日可三服柴胡膏治五勞七傷肢體煩倦日漸消瘦行步稍難飲食不進柴胡半兩去蘆紅芍藥一兩一分蒺藜根一兩一分青橘皮川附子炮吴茱茰陳橘皮各半兩青木香一分烏鷄毛隻净去骨皮膓肚唯擇肉右八味為末入烏鷄肉内再杵成膏於甆器内收貯毎食前用鹹酒一盞膏一匙頭調服常令患人有酒容只服兩日便見效騐大柴胡鱉甲散柴胡去蘆秦芁常山貝母甘草山梔子烏梅豉心鱉甲醋炙黄芩各一兩生薑半兩大黄半兩桃枝栁枝葱白薤白各一握糯米一合右一十七味杵為末分作八貼用水一升酒一盞同煎至八分作三服早午晚日三服兩貼滓併煎作一服此方累醫較人大叚瘦者即喫藥大效炙肝散治男子五勞七傷手足酸疼四肢煩倦多患口瘡咽喉不利心胸痞滿不思飲食久積瀉痢脚膝浮腫日漸消瘦栁桂吴白芷𦍑活温水洗浸過獨活芍藥各一兩白术半兩蠻薑半兩訶子皮七箇好者右杵為末毎服用獖豬肝一具净除筋膜切如栁葉状換水七遍控乾用藥末十錢鹹一分同拌令匀作丸串子以慢火炙熟空心任意服之以生薑粥下之延夀散治男子女人少童等𫝊尸諸勞𠻳寒熱百般變候並宜出却蒸汗勞蟲永去根本牡丹皮附子炮去皮臍柴胡去苗秦芁去苗鱉甲酒浸炙令赤色各半兩右五味同為細末入人中白半兩同研以甆器盛之毎服用豬石子一枚葱白椒末同一處細剉如膏入藥末三錢匙拌和以童子小便一盞水半盞同煎令沸温服其法人貼體著皂紗衫一領服後衣物盖覆令惡汗出粘膩盡出仍脱皂衫揩拭身乾避風将息毎七一度服後汗輕即住皂衣遂以皂角湯泡洗安息香烘乾末後用了即棄於十字路中或長流水内永差養正膏治𫝊尸出汗取辟蟲邪鱉甲一兩醋浸炙令黄净去裙杵碎天靈盖用七匙頭大一片浄洗酥塗炙令黄色桃仁四十九箇去皮尖青蒿一握淡豉三七粒葱白二莖安息香一分栁桃桑枝各七莖長各七寸許右八味隔夜以水一升浸至五更煎取半升再以童子小便半升同煎取四合又用㯽榔一箇為末麝香一錢七将所煎藥去滓調下至日髙二丈時放温頓服以衣盖汗出審看十指汗出如藕絲五色臭汗汗出後仍㵼下蟲状惡物盡甚者旬日再服永效延齡膏治一切勞蝦蟇鶴骨丁香棗葉鰻鱺豬牙皂角木香各等分麝香别研細少許右為末用羊腸大者盛之纒定兩頭於飯甑上蒸熟為度取出候冷以竹刀子割開同膓研細再入麝香同研令匀為丸如梧桐子大毎日到辰巳間用茅香熟水吞下一百丸更㸔病人强弱漸漸服之須得一度喫盡一百丸後以衣被盖之出汗病甚者略露面其蟲逡巡從汗出屍蟲如麥麩大餘者皆㣲壯出盡汗後病人其身體輕快十去三四也候汗乾後即一時換却原著衣服并卧物等初服藥見當時隨藥便盡吐出並不住即難療或一百丸存六七十丸猶可醫别以新藥補數如藥全住疾無不退服藥後忌一切動勞等物此藥病甚者喫及兩服至三服即永除根本一服後别用喫無觸忌治勞煑散三五服為妙初出汗頻換手帕揩之約兩炊飯久腸勞隨㵼下一度别用盆一箇盛之其蟲皆㣲壮浮在上面動服藥後如不吐甚妙也一生永忌觸犯之藥苦參人參空青麥門冬烏頭切忌服之鬼哭飲子治一切勞阿魏一分童子小便磨使一處東引桃枝小者一大握搥碎甘草大者三寸搥碎青蒿一大握如用其子只一兩半㯽榔一兩為末葱白二寸并根用右用童子小便二升浸桃枝甘草青蒿葱白四味一宿来日五更初煎取六合去滓然後入阿魏更煎兩沸分為二服毎服臨喫時入㯽榔末半兩同煎如覺心頭惡必吐吐後更進第二服如是服前一服後心頭安穏即須進第二服必然通轉當下必見惡物服時仍不得令人與患者面對恐惡蟲飛入人口鼻内此藥如是女人患須是男子面向北與煎如男子患却須女人向北與煎仍忌猫狗見患者春喫二服秋喫三服毎年五服勞蟲並盡即去病根血證順中散治肺臓壅熱毒則胸膈壅滯血與氣皆逆行上於肺肺壅不利故令人吐血不止朝夕不住發寒熱氣喘促紅物至多頻頻嘔吐漸至勞劣檳榔一枚好者大黄半兩甘草半兩木香半兩白牽牛子半兩茴香半兩青橘皮半兩湯浸去白焙右件同杵為末毎服一錢用木香煎湯下或木香酒下亦得如作常服茶酒任下一字如曽中藥毒嘔逆黒血至多不能飲食服此順中散亦能觧毒止血治暴吐血不止方用人參一味為末毎服一大錢以鷄子青投新水半盞調下雌黄丸治吐血衂血雌黄一兩用小磁合子内盛上用不灰木末一錢雲母末一錢蚯蚓糞一錢水飛黄丹一錢滴水令水和匀作餅子盖頭石脂鏁口灰半椀盖合子上用三斤炭燒如不聞藥香未得住火如聞香即住火為度放冷取出净去上面櫃子藥滓令净研為細末入下二味馬兠鈴子去皮甘草此二味候雌黄燒下秤約及錢許餘只各用四錢半右件同研為末煉蜜為丸如皂子大以綿裹一丸含化漢防己散治咯血漢防己萬州黄蘖各一兩右件同細𢷬為末毎服一錢水一盞小麥二十粒同煎七分食後温服盜汗煎麥散治榮衛不調夜多盜汗四肢煩疼飲食進退肌瘦面黄大鱉甲二兩醋煮三五十沸後浄去裙襴别令好醋煑令香銀州柴胡二兩去苗𤣥參二兩乾漆一兩炒秦芁二兩去土人參一兩茯苓一兩去皮乾葛一兩大川烏頭一兩炮製去皮臍右件為末毎服二錢先用小麥三七粒煎湯一盞去麥同煎至七分温服食後或臨卧時服之如久患後亦宜服此以退其勞倦調順經絡如智散治五心虚煩夜多盜汗面色黄瘁四肢少力多困少睡飲食不進萎蕤川芎青橘皮去白肉桂去皮當歸去須木鱉子𦍑活秦芁柴胡去苗烏梅黄耆已上各一兩甘草如五心發熱即減半兩無用一兩右同杵為末毎服一錢水一盞入青蒿頭子七枚同煎至七分去滓温服若冬月無青蒿以薑棗代煎之地骨皮散治骨蒸壮熱肌肉減瘦多困少力夜多盜汗地骨皮水洗秦芁水浄洗柴胡去蘆枳殻去白麩炒香熟用知母生用當歸去蘆鱉甲去裙襴醋炙令黄色右各等分為末毎服二大錢水一大盞桃栁枝頭各七箇薑錢三片烏梅一箇同煎至七分去滓温服毎日空心臨卧各一服博濟方卷一
