body:
  text: 博濟方卷二宋王衮編上焦證人參荆芥散治上焦壅滯頭目昬眩涕唾稠粘心胷煩懣人參柴胡去苗羌活荆芥旋覆花甘菊桑白皮各等分右七味同杵為末每服二錢水一盞煎七分食後臨臥温服利膈散治上焦風壅多患咽喉胷膈不利荆芥穗子青乾净好者䑕粘子各一兩甘草三分炮過白牽牛二兩炒令香熟右為末每服一錢入鹽㸃兼治風牙疼以三末入川椒一粒鹽二錢煎熱熱含冷吐出白蒺藜散治上焦虚熱頭目昬疼或眼赤腫心胷煩悶地骨皮去土白蒺藜去皮旋覆花山茵蔯白菊只有菊花亦得已上各半兩䑕粘子石膏各一兩右七味並生同杵為末毎服一錢食後茶清調下日進三服金花散治心腹壅熱薫蒸上焦致口氣生瘡連年不差黄連半兩炒令稍焦赤色如年少即加一分許人參半兩枳殻半兩去白麩炒令微黄甘草半兩炙微赤半夏半兩拍破以漉薑汁浸一宿出焙乾右五味為末毎服一錢生薑三片煎六分食後臨臥温服白龍丹治上焦風壅化痰涎利胷膈逐風祕雷丸末二錢甘遂末三錢牽牛一兩杵取末六錢不用再羅者龍腦少許粉霜四錢輕粉四錢入白麫少許三味同研令匀細滴水和作餅子於慢火内煨令熟放冷再研令細右同為細末研令匀青州棗煑熟取肉和為丸如菉豆大毎服五七丸温漿水下如一切風癎驚搐涎滯並以漿下七丸及至十丸如小兒痰熱及渴不止頭疼但頻少與服自然消除大人風氣壅盛上焦不利最宜服此更在臨時酌其加减香芎散治上焦風壅中脘有痰頭目昬暗心煩口乾利膈化痰涎旋覆花一兩細辛一兩去葉川芎二兩甘草半兩炙獨活羌活各半兩皂角二挺燒存性右七味同杵為細末毎服一大錢水一盞煎至六分食後臨臥熱服犀角散治上焦壅熱咽膈腫疼不利鼠粘子一兩銚子内以文武火隔紙炒令香為度甘草一分荆芥半兩右三味同為細末毎服一錢水五分一盞煎令沸去滓温服大利胷膈中焦證沉香散治脾元氣不和中焦痞悶氣滯噎塞進食和氣沉香木香青橘去白陳橘去白郁李仁湯浸去皮别研人參各用一兩豆蔲檳榔肉桂去皮甘草炙乾薑炮製各半兩右十一味同為末每服一大錢水一盞煎至七分温服不以時候四倍散治脾元氣不和大補虚損訶子一兩煨人參二兩白茯苓去皮四兩白术半斤右四味同為細末毎服二錢水一盞入生薑棗子同煎至六分去滓温服空心食前服如早晨常服有大功效白豆􅅳散補中益氣調順脾元心胷滿悶不思飲食上熱下冷白豆􅅳仁半兩肉豆蔲仁三箇白术一兩肉桂去皮半兩青橘皮去瓤半兩厚朴去皮薑汁炙半兩甘草三分炙右七味同為末毎服二錢水一盞生薑二片粟米少許棗二枚同煎至七分去滓熱服大妙木香通真散治中脘氣不和心胷滿悶氣刺脇肋飲食無味和氣木香半兩人參一兩官桂一兩半去皮川芎一兩陳橘皮二兩去皮桃仁一兩麩炒去皮尖茯苓一兩去皮青橘皮一兩去白神麯一兩茴香一兩用舶上者厚朴一兩半用生薑汁塗炙令黄檳榔半兩女人喫即入也右十二味除桃仁叧研外餘並𢷬羅為末入桃仁拌和令匀毎服一錢水一盞鹽少許同煎七分温服不拘時候大能和順脾元氣賺氣散治氣調和脾胃御藥院云治心胷痞悶腹脇虚脹飲食减少氣不宣通荆三稜五兩白术三兩蓬莪茂五兩煨熱杵末木香半兩枳殻去白一兩麩炒右五味同為末毎服二錢生薑三片水一盞煎六分温服如和脾胃即更入棗同煎若解傷寒併三兩服汗出立差下焦證燒石子茴香散治下焦虚冷臍腹撮疼心胷痞脹和元氣進飲食舶上茴香川附子炮去皮臍官桂去皮川椒去目木香胡椒陳橘去白紫巴㦸去心乾薑炮各半兩荆三稜一兩煨右一十味同杵為細末毎服用獖豬石子一對切去筋膜切作薄片以末二錢入葱絲少許鹽半錢濕紙裹煨熟餌訖以酒或粥飯壓之須􅁷臍下暖甚妙牛膝煎丸治男子下元虚冷傷憊筋骨衰弱遍身瘾疹及風氣上攻下疰疼痛不可忍者牛膝五兩去苗切作細叚用好酒浸三日取出細研如麵糊用酒於銅銀甆噐内慢火熬成膏為度附子炮去皮臍川芎虎骨酥炙黄色各三兩破故紙葫蘆巴蓯蓉酒浸三日細切焙各四兩巴㦸去心生用仙靈脾去莖幹生用各一兩右八味各修事浄一處杵為細末用牛膝膏和合入臼杵令軟硬得所丸如小彈子大如是難丸更入少許熟蜜同丸毎日早晨及夜卧温酒化下一丸嚼下亦得志意服一月永無風氣攻疰及癮疹自然肢體安暢補骨脂丸治脾腎久冷積氣成塊或發疼痛補暖大木𤓰一箇去皮瓤入硇砂一兩去砂石蒸令熟研爛補骨脂炒蘹香子薯蕷官桂去皮青橘去白木香檳榔已上各一兩荆三稜半兩醋浸一宿炒令黄肉豆蔲半兩去殻右九味為末用木𤓰為丸如梧桐子大毎日空心鹽湯下二十丸温酒亦得硇砂丸治男子元臓虚憊積冷聖濟總録名羊骨煎丸治腎藏虚冷不思飲食倦怠無巴㦸有白术羊脛骨一條去净肉用硇砂二兩醋二升同煎旋煎旋蘸骨炙焦黄以醋盡為度焙乾沉香木香白檳榔官桂去皮人參牛膝去苗茯苓薯蕷郁李仁附子炮巴㦸去心丁香蓯蓉已上各一兩石斛半兩阿魏半分同麵三兩先將醋化搜作餅子炙黄右十六味並杵羅為末用酒煑麵糊為丸如梧桐子大毎日空心鹽酒或鹽湯下二十丸三焦總治麻仁丸治三焦不和蔵腑虗冷胷膈疰悶大便祕結麻仁四兩先以温水浴懸在井中五日令生芽日曬退皮取仁大黄四兩二兩蒸二兩生用白檳榔一兩半煨半生薯蕷一兩半官桂去皮一兩半羌活一兩半山茱萸一兩半郁李仁四兩兎絲子一兩半酒浸一宿後炒黄木香二兩枳殻去瓤麩炒令黄車前子防風各一兩半右十三味同為細末鍊蜜為丸如梧桐子大毎服十五丸至二十丸臨卧温水下三焦散治三焦不和榮衛不調肢體煩倦頭目昏疼飲食無味多困少力寒熱痰壅頭旋前胡柴胡各去苗桔梗羌活獨活人參枳殻去瓤麩炒鼈甲去裙襴醋浸炙黄各一兩旋覆花一兩半甘草半兩炙石膏一分如頭疼旋入右十一味為細末毎服一錢半至二錢水一盞煎至七分温服解傷寒發汗入麻黄一兩去節同杵為末如上焦多壅熱入地骨皮一兩半麥門冬散治三焦不利心肺多壅痰涎併積口舌乾燥咽嗌腫疼肌體黄瘁氣血不調麥門冬去心半兩桔梗半夏各一分赤芍藥半兩菊花一分蔓荆子一分甘草半兩前胡防風款冬花桑白皮各半兩杏仁一分五味子一分用新者白术一分貝母升麻各半兩右十六味各洗擇令净焙杵羅為末食後夜卧各進一服毎服二錢水七分盞生薑一片同煎至三分去滓温服大益心肺牛黄甘露丸治三焦渴疾飲水無度舌上皴裂肌肉黄瘦精神減退小便多腹脇脹硃砂一兩成塊者牛黄一分鐵粉半兩胡桐律半兩犀角半兩鎊葳蕤半兩麝香一分銀箔五十片鉛白霜半兩丁香半兩地龍半兩知母半兩宣連一兩麥門冬去心半兩檳榔牡蠣苦參石膏錫藺紙甘草炙白稨豆各半兩慢火炒生栝樓根一兩杵研細金箔一百三十片右二十三味除栝樓根别杵同為細末煉蜜和臨和時即入金箔及生栝樓根一處和匀為丸如豌豆大空心金箔三片銀箔三片碎研米飲下十丸漸加至二十丸飯後臨卧各一服日近輕者當日止重者三日止十日後只空心一服夜後一服用金銀箔各一片一月日外只用温漿水下五十丸其藥合二月至九月即用生栝樓根九月後只用煉蜜和為丸亦得忌鹹酸炙􅏼魚酒等利膈丸治三焦不順胷膈壅塞頭昏目眩涕唾痰涎精神不爽牽牛子四兩一半生一半熟不蛀皂角塗酥炙令香熟用二兩右二味為末以生薑自然汁煑糊為丸如梧桐子大毎服二十丸荆芥薑湯下神妙沉香丸消化滯氣調順三焦空胷膈理脾元大能化酒食毒丁香一分沉香一分乳香一錢半阿魏少許舶上茴香半兩炒肉桂半兩去麄皮檳榔二枚冬加二枚肉豆􅅳二枚夏加二枚蓽撥半兩巴豆十五箇去皮心不出油别研右杵為細末研入巴豆阿魏令匀煑白米飯為丸如菉豆大毎服五丸生薑湯下如胷膈氣不和及元臓冷氣上攻迷悶加至十丸温酒下常服茶湯任下要㣲動以意加服之橘香散調順三焦平和胃氣順氣白术四兩米泔浸一宿凈洗陳橘皮二兩去白茯苓二兩去皮甘草二兩炙附子一兩炮乾薑半兩炮右𢷬為末毎服二錢水一中盞薑二片棗一枚同煎至七分温服如覺傷寒入荆芥煎服五藏證治茯神丸治心肺壅熱口苦舌乾涕唾稠黏胷膈煩悶不思飲食肢體倦怠或發煩熱狀似骨蒸茯苓二兩去皮木柴胡一兩半去苗黄耆一兩半桔梗鼈甲二兩醋炙令黄人參白前各一兩枳殻一兩半炙去白生乾地黄二兩赤芍藥一兩半右十味杵為細末煉蜜為丸如梧桐子大毎食後生薑湯下十丸臨時更加减服金花散治心肺積熱咽喉不利口舌生瘡心胷煩悶痰涎併多菉豆粉四兩雄黄三分甘草末七錢朴硝五錢甜硝五錢白豆蔲半兩生腦子半錢麝香半錢右八味杵為末旋滴生蜜少許研令匀入甆器内收貯毎服半錢用薄荷水調下小兒驚亦宜服之潤肺散治肺氣壅滯咳嗽不已甜葶藶一兩銚子内紙襯慢火炒熟用肉桂一兩馬兠鈴大者二枚㣲炒用右三味杵為細末毎服一錢水一盞煎至七分放温食後時時呷一口可自早至午服盡或臨卧温水調一字或半字亦得黄耆散治肺臓壅塞咳嗽涕唾稠黏咽喉不利黄耆去蘆蒸出擘破於槐砧上碎剉一兩甘草半兩炙柴胡一兩去蘆以布拭去土凈剉勿犯鐵器人參一兩秦艽一兩須是於脚下左文裂者為秦以布拭却毛川升麻半兩山梔子一兩如雀腦者去皮以甘草水浸一宿焙用黄芩一兩地骨皮半兩茯苓赤者以水中澄去浮者炒用一兩右十味同杵為末以瓷器内盛貯毎服三錢水一盞同煎至六分去滓温服食後服之蛤蚧散治患肺痿咳嗽即肺壅嗽蛤蚧一對新好者用湯洗十遍慢火内炙令香研細末人參茯苓去皮知母貝母去心煨過湯洗桑白皮已上各二兩甘草五兩炙大杏仁六兩湯去皮尖爛煑令香取出研右八味同為細末入杏仁拌匀却麄羅再篩過研細為妙毎服半錢入生薑二片酥少許水八分沸熱服如以湯㸃頻服亦妙鵞梨煎丸治脾肺風攻皮膚成瘡癬㿋痒大化痰涎解壅熱鵞梨十箇大者去皮核薄荷一斤皂夾十挺肥大不蛀者已上三味於酸漿水中揉取自然汁濾去滓杏仁四兩去皮尖爛研將杏仁膏並前自然汁同於銀石器内慢火熬成膏後别入藥末防風去蘆白蒺藜微炒去刺天麻炙令通黄色各二兩甘草一兩炮威靈仙一兩去泥右九味杵羅為細末入前膏内搜和為丸如梧桐子大毎服食後用温漿水下十五丸至二十丸臨卧時再服救生丹治逺年日近肺氣喘急坐卧不能總録内作鉛丹鷄内金三七枚鷄肫内兩片黄皮是也旋取去却穀食淨洗隂乾每夜露七宿甜葶藶半兩洗焙黒牽牛子半兩用瓦上煿令下焦黄丹半兩亦如砒信製信砒一分别研細每夜露七宿至晚收於床下半夏一分洗净焙生用右六味為細末煑青州棗大者十二枚去皮核搗和為丸如乾即入淡醋少許丸如菉豆大以硃砂為衣食後臨卧温葱茶下七丸甚者十丸不過三五服立效須忌大冷大熱毒食等杏仁丸治肺氣喘急者由肺乘於風邪則肺脹脹則肺不利經絡澁氣道不宣則上氣逆喘或息鳴馬兠鈴杏仁去皮尖蟬蛻各半兩為末砒霜一分右為細末煑棗二十枚去皮核和藥末為丸如梧桐子大空心薄荷湯下二丸妙紫蘇膏治肺痿勞嗽喘促涕唾稠黏咽膈不利生地黄三兩生薑二兩與地黄相和研布絞取汁生天門冬半斤生麥門冬一斤杏仁三兩生研入紫蘇子二兩炒研生牛蒡四兩生𤣥參一斤右八味洗令净剉碎同研令如泥蘇子杏仁投於地黄汁内更以細物濾絞汁去滓於銀石器内盛用煉蜜五兩半真酥二兩安於炊飯甑上蒸一飯久於净器内收不以時候抄一小匙嚥之如久服大益心肺滑潤肌膚補助榮衛忌生冷豬肉秦芁散治肺痿勞咳嗽不止時覺寒熱涕唾稠濁秦芁炙紫胡去蘆貝母炮桔梗炮麻黄各一兩甘草三分炙訶子一兩半煨去核用肉稱陳橘皮一兩去白右八味同為末毎服二錢空心晚食前用小便一盞烏梅一箇同煎三五沸温服華葢散治肺感寒氣有痰咳嗽久療不差紫蘇子炒麻黄去根節杏仁去皮尖陳橘皮去白桑白皮赤茯苓去皮各一兩甘草半兩炙右七味同為末毎服二錢水一盞煎至六分食後温服豆蔲湯治脾胃虚弱不思飲食吐嘔滿悶胷膈不利心腹痛草豆􅅳去皮用肉八兩生薑和皮切作片子用一斤甘草四兩剉碎右三味匀和入銀器内用水過藥三指許慢火熬令水盡取出焙乾杵為末毎服一錢㸃之夏月煎之作冷湯服亦妙十味人參散調理榮衛進飲食解利經絡去乆滯風邪人參厚朴薑汁炙官桂去皮甘草炙杏仁去皮尖白术乾薑炮茯苓去皮麻黄去根節倍加用陳橘皮去瓤右各等分為末毎服二錢水一盞入薑棗煎七分熱服如纔覺吹着不安連二三服汗出立愈平胃散治脾胃氣不和不思飲食厚朴去麄皮薑汁塗炙令香净二兩半甘草一兩半炙陳橘皮去瓤二兩半人參去蘆一兩蒼术米泔水浸二日刮去皮四兩茯苓去皮一兩右六味杵為末毎服一大錢水一盞入生薑棗子同煎七分去滓温服空心服之或杵細末用白蜜為丸如梧桐子大毎服十丸鹽湯嚼下空心服治氣利膈進食平胃丸也如做湯入鹽㸃服亦曰白术湯此藥本無人參茯苓二味好事君子加之丁沉丸治脾胃一切氣不和吐逆不思飲食霍亂不止心腹刺痛膨悶膈噎塞乆積虚氣傷酒痰逆婦人血氣及月候不調理中丁香沉香木香檳榔白豆􅅳雲南根各半兩肉豆蔲去皮甘草炙青橘去白各半兩人參茯苓各二兩吳白术四兩官桂一分乾薑一分炮訶子一兩去核丁香皮半兩柳桂一分金釵石斛一分𤣥參一兩半麝香一錢研右二十味同為細末續入麝香和匀煉蜜為丸如酸棗大毎服半丸或一丸爛嚼炒生薑橘皮鹽湯下温酒亦得婦人炒生薑橘皮醋湯下草豆􅅳散治脾胃氣不和霍亂不止酒食所傷兼患脾洩能和一切冷氣厚朴二兩去皮用生薑三兩取汁浸炙汁盡為度草豆􅅳和皮一兩乾薑一兩炮白术一兩炮黄色訶子一兩炮去瓤細切炒用二兩右杵羅為末毎服二錢霍亂冷米飲下或酒調下脾痛不可忍者炒生薑酒下三錢餘即如湯煎服椒朴丸治脾胃虚乏伏積冷氣喫食不消多困羸瘦面黄口淡不思飲食梓州厚朴去皮用十兩以薑汁炙令香細剉漢椒揀净十兩鹽花十兩黒附子二兩炮去皮臍剉碎右以水十椀於銀石器内以文武火熬候水盡為度焙乾同研為末煉蜜并糯米粉同為糊和丸如梧桐子大毎服二十丸至三十丸空心温酒下如大腸滑洩生薑米飲下藿香散治胃氣消食定霍亂止嘔逆進飲食化冷痰藿香一兩厚朴一兩去麄皮薑汁炙令香熟甘草三分炙青橘皮三分湯去瓤細切麫炒官桂半兩去麄皮乾薑一兩半炮枇杷葉一分炙去毛右七味同為末毎服二錢水一盞入生薑二片棗一枚同煎七分服丁香散暖脾助胃止心腹痛進食定嘔逆治㵼痢肉豆􅅳去皮人參各半兩白茯苓去皮蒼术三分厚朴去皮薑汁炙令香半兩青木香半兩荆三稜炮半兩乾薑炮剉半兩吳茱茰丁香各一分芍藥半兩炙甘草一分右十二味同杵細末毎日空心食前米飲調下二錢蓽澄茄散治脾元虚冷氣不和胷不快腹肚膨脹氣刺氣痛元氣㽲疼不思飲食酒色過度面黄口淡蓽澄茄半兩炒荆三稜二兩炮趂熱杵陳橘皮二兩去瓤甘草二兩炮丁香二兩香附子三兩炒蠻薑一兩一分厚朴一兩去皮薑汁炙令黄香舶上茴香二兩官桂二兩去皮桔梗一兩白鹽十二兩揀擇净炒研細後入阿魏皂子大一塊麫裹煨麫黄為度去麵别研細旋入諸藥右十三味同為末細研和令匀毎服一大錢入生薑二片水八分盞煎五七沸熱喫如作湯入薑錢㸃之大療中酒兼其味甚佳香蘇散治肝亢風盛刑於脾胃致多飱洩調順中脘平和胃氣紫蘇葉一分揀擇净焙乾肉豆蔲一分去殻天雄一分剉碎以鹽一分同炒令黄色住青橘皮去白一分蠻薑半分炮白术半兩細剉㣲炒黄色縮砂仁一分川芎甘草各一分炙右九味為細末毎服二錢水一盞生薑三片同煎五分温服日進三服柴胡散治榮衛不順體熱黄瘦筋骨疼痛多困少力飲食進退柴胡去蘆二兩鼈甲二兩醋浸一宿炙令黄甘草知母各一兩秦芁一兩半右五味杵為末毎服二錢水八分琖棗二枚煎六分熱服烏頭丸補煖水藏壯筋骨縮小便大治風川烏頭一斤用東流河水浸二七日毎日三度換水日滿取出去黒皮并臍尖切作桞葉片子入牽牛子一合用炒候香熟即去牽子不用舶上茴香二兩别杵為末青鹽五兩别研川椒五兩揀去子牛膝五兩細切以好酒浸一七日爛研陳橘皮去白二兩右六味依法修製了用牛膝膏拌和匀入臼再杵千下丸如桐子大毎日空心鹽湯温酒任下十五丸至二十丸牛膝雖酒浸後爛研與諸末拌和恐難得細或只將牛膝浸日足後焙乾為末却將浸牛膝酒煑糊和末為丸亦得若更服利膈湯散最相宜也諸氣夫人之生禀於榮衛人之本皆係於氣氣若和平邪正不能干犯氣若盛衰百病由是生焉故怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收聚熱則腠理開而氣洩憂則氣亂勞則氣耗思則氣結經曰九氣七氣及言諸氣者皆不出於此也診其脉寸口伏胷中逆氣是諸氣上衝胷中故面胕腫喘息如脉浮大不治上氣脉躁而喘者屬肺肺脹欲作風水發汗即愈其脉若虚寧得伏匿者生牢强者死喘息低不得者其脉滑手足温即生如脉濇及手足冷脉數者亦死謂其形損故也至於五積六聚癥瘕癖塊皆由隂陽不和臓腑虚弱受於風邪搏於臓腑之氣所為也腑者六腑也臓者五臓也臓為隂腑為陽陽浮而動隂沉而静是故五臓積癥發不離其部上下有所窮已聚瘕者六腑所成痛無常處上下無所留止葢由臟腑受邪初未能為疾留滯不散乃成癥瘕也丁沉香丸治一切氣不和心腹疰悶氣脹胷膈噎塞不利及積冷氣或時攻衝脾胃氣逆不思飲食霍亂不止臟腑滑洩酒食所傷醋心不消冷痰併多大效甘草炒官桂去皮沉香丁香木香檳榔訶子炮去核各半兩人參一兩半白术四兩剉碎炒令黄色肉豆􅅳半兩去皮青橘皮去瓤半兩白豆蔲去皮半兩右一十二味同為細末煉蜜為丸如小彈子大毎服一丸生薑湯嚼下阿魏丸治丈夫婦人一切氣攻刺疼痛呼吸不得大腸滑洩阿魏一兩半當歸半兩細切醋炒官桂半兩陳橘皮半兩去白細切醋炒白芨三分木香三分吳白芷半兩附子半兩炮去皮臍乾薑一兩炮蓬莪荗一兩吳茱茰半兩醋炒延胡索半兩剉碎醋炒川芎半兩剉醋炒肉豆蔲硃砂各三分研細為末右除阿魏硃砂外同杵為細末以頭醋半升浸阿魏經宿用生袋取汁煑麫糊為丸如梧桐子大以硃砂為衣毎服五丸温酒下橘皮湯亦得婦人醋湯下小丁沉丸治一切氣疾開胃口消酒食毒甘草一兩炮縮砂一兩去皮白芷一兩炒令黄陳橘皮四兩去白益智一兩丁香半兩生薑一斤細切入青鹽四兩拌令匀入合和經一宿焙乾沉香一兩木香半兩舶上茴香半兩炒阿魏一兩用醋半斤煎為膏入諸末在内麝香少許右一十二味杵為末醋煑麫糊為丸如鷄豆用硃砂為衣空心喫酒或鹽薑湯嚼下一二丸大化酒食毒和氣塌氣散治虚氣攻衝心胷滿悶元氣冷疼及一切氣不調順舶上茴香炒枳殻去白麩炒茯苓去皮人參各一兩乾薑半兩炮陳橘皮去白二兩青橘皮去白二兩甘草半兩炙蒼术半兩丁香一分髙良薑一分右一十一味同杵為末毎服一錢水一盞入生薑棗同煎至七分熱服入鹽如茶㸃服亦得撞氣丸治一切氣木香半兩荆三稜一兩炮青橘皮一兩去白胡椒一兩官桂一兩去皮乾薑半兩炮茴香一兩炒甘草一兩炮檳榔一枚炮木爪末一兩阿魏一錢用白麫和煨熱用右一十一味𢷬羅為末用蒸餅先水浸過後和為丸如彈子大硃砂為衣毎服一丸鹽湯嚼下乳香丸散滯氣消酒食利胷膈化痰和順元氣止冷氣攻刺乳香沉香没藥木香硃砂細研枳殻去白蓬莪茂烏頭炮檳榔各一兩芫花醋炒令赤狼毒醋熬乾漆炒各半兩阿魏一分青橘皮去白三分右一十四味同杵為末以硇砂一兩半用水飛過去砂石以川楝子肉四兩為末同以好醋熬成膏入在前末和匀可丸如豌豆大毎服十丸十五丸温酒或薑湯鹽湯任下亦得桂枝丸治氣利胷膈進飲食充肌膚療心疼腹痛若宿酒後服妙檳榔三箇大者牽牛三兩以一半麩内炒一半生用官桂三兩去皮青橘皮二兩去白陳橘皮二兩去白乾薑三兩炮右六味同為細末煑醋麫糊為丸如菉豆大毎服十五丸茶酒任下如婦人心腹疼即醋湯下男子用茴香湯下勝金丸治一切氣不和及女人血氣腫化積滯消酒食芫花大㦸甘遂荆三稜牽牛乾漆青橘皮去白陳橘皮去白巴豆各半兩硇砂膽礬各一分右除硇砂膽礬外餘並用生薑半斤𢷬碎入好醋一升浸一宿取出薑不用控乾焙令乾為末醋化硇砂并膽礬煑麫糊攪和為丸如豌豆大消酒食及常服茶酒任下三五丸婦人心氣痛醋湯下水氣及一切氣腫并痢疾生薑酒下一切氣不和生薑湯下五積散治一切氣蒼术二十兩桔梗十兩陳橘皮六兩去白吳白芷三兩厚朴二兩去皮枳殻四兩麩炒去瓤以桂一處杵為末官桂去皮春夏用三兩秋冬用四兩芍藥一兩白茯苓一兩去皮當歸二兩去土人參二兩川芎一兩半甘草三兩半夏一兩洗七遍乾薑春夏用一兩半秋冬二兩麻黄去節根春夏用二兩秋冬用三兩右各洗擇净焙乾除官桂枳殻别杵外諸藥同為粗末分作六分於大鐵鍋内以文武火炒令㣲赤黄熟為度不可令焦須是匀取出以净紙襯安板床下候冷勿令塵土侵却入前枳殻官桂末和匀於宻器内收貯若隂氣傷寒手足逆冷或睡裏虚驚及虚汗不止脉氣沉細面青或手足冷心多嘔逆宜入順元散一錢同煎熱服或婦人産前胎不安及傷腹痛只依常法以末二錢水一盞煎至七分服如生産痛陣踈及艱難經兩三日不生胎死腹中或産母困頓無力産戸乾即入順元散同煎以水七分酒煎數十沸相次喫兩服其産母便省有力其血氣内和便自有痛陣胎死者不至三服其順元散多少量産母虚實用之神效或是傷寒徧身煩熱頭疼毎服更入葱白一莖豉七粒同煎服之連喫三服出汗陽毒不宜或脾胃不和内傷冷食渾身疼痛頭昏無力或痰逆或胷膈不利氣壅或多噎塞飲食不可及元氣攻刺兩脇疼痛及女人血海乆冷月候不匀走疰腹痛經不行者並如常法煎服順元散順元散川烏頭二兩炮去皮臍附子一兩炮去皮臍天南星一兩炮右三味同為細末毎服入前散子用之豆􅅳散和一切氣及踈轉後用之亦得肉豆蔲三箇官桂一分去皮川芎一分香附子二十一箇炮過陳橘皮去白一兩甘草三分炮零陵香一分右七味同為散毎服一錢水一盞薑棗同煎六分温服不拘時丈夫女人老少並宜服之治項氣方豬靨二七箇於瓦上􅏼乾甘草一兩桑白皮一兩黄檗少許石榴根皮一兩醋炒膩粉一十五文刺椿根頭皮一兩右七味同為散毎服二錢以陳米飲調下空心卧服忌生冷油膩動風物磁石丸治諸氣腫大有妙效次用補藥羌活陳橘皮木香澤㵼附子炮去皮臍檳榔白术赤茯苓去皮肉蓯蓉訶子炮去皮用官桂去皮新辣者黄耆别研取細末鼈甲醋炙令黄烏頭炮椒紅桑白皮别杵羅為末不用筋滓上好磁石脇鐵多者燒赤入醋中淬十遍細研水飛過至細為妙右一十七味各半兩為末用羊石子或獖豬石子去筋膜生細研和末再杵一二千下如硬更入少酒糊丸如梧桐子大焙乾空心日午温酒下二十丸至三十丸切忌房室并鹽藏諸毒物須至百日外分氣丸消滯氣利胷膈止心疼化酒食毒治腹脇脹滿荆三稜醋浸一宿切作片子焙乾用牽牛㣲炒大㦸各三兩細剉炒令紫色芫花二兩醋炒甘遂二兩槌碎炒令黄色住官桂去皮一兩右同杵為細末以醋煑糊為丸如菉豆大毎服十丸煎陳橘皮湯下不嚼破如大段腹脹膨滿氣滯如要行動漸加丸數併喫三兩服以㣲利為度搜癥丸治結氣硇砂川烏頭官桂乾漆各半兩右𢷬為細末用青州棗煨熟取肉為丸如菉豆大毎棗肉一箇用巴豆五枚一處同杵二十下毎服五丸木爪酒下七聖散治氣厚朴四兩去皮後剉細用薑汁浸一宿炒令紫黒色生薑二斤洗净細切作片子日曬乾别炒令紫黒色甘草二兩細剉炒令紫黒色陳橘皮去皮六兩炒令匀草豆􅅳二兩炮後剉細更炒令匀右各炒了更同炒令匀同為細末常服二錢入鹽少許㸃喫忽患脾氣等疾毎服三錢薑二片棗一枚水一盞同煎至六分温服婦人冷血氣亦宜服忽氣㵼及氣痛等疾並宜服食凡踈轉後並宜以此補治之補隂丹治男子本藏氣婦人血氣一切氣疾及産後一切血臟病患宜服之硃砂去石硇砂去石延胡索半夏湯浸七遍芫花醋浸炒黄色木香斑猫去翅足酒浸後炒令焦黒止各半兩海蛤荆三稜蓬莪茂大附子炮去皮臍舶上茴香川苦楝子醋浸炒黄青橘皮各一兩肉豆􅅳三枚檳榔三枚右一十六味搗羅為細末酒煑麵糊為丸如梧桐子大毎服五七丸女人用醋湯丈夫用温酒或鹽湯下空心臨卧各一服此藥大健脾元能療小腸氣膀胱氣刺疼痛婦人産後惡物不盡變作血瘕者並宜服之葱白散治一切冷氣不和及本臟膀胱氣攻衝疼痛大治婦人産前産後腹痛胎不安或血刺者兼能治血臟宿冷百骨節倦疼肌瘦怯弱傷勞帶癖服乆盡除但婦人一切疾病最宜服之川芎當歸枳殻去白麩炒厚朴去皮薑汁炙青橘皮去白官桂去皮乾薑炮舶上茴香炒苦楝子芍藥木香神麯炒麥蘖炒荆三稜炮蓬莪茂醋浸一宿焙人參茯苓去皮各用一兩乾地黄一兩訶子半兩去核大黄半兩二味相度用之右二十味同杵為末毎有患者三平錢常服只二錢用葱白二寸擘破水一盞同煎至七分入鹽半錢和滓熱服内訶子大黄二味或有用者或不用者葢相度病狀可入即入此二味多不全用若須入大黄即服時不須入鹽也丁香煑散治一切冷氣攻衝心胷不利不思飲食腹脇刺痛口舌無味丁香一兩三分蓬莪茂二兩蓽澄茄一兩半藿香一兩半沉香一兩訶子二兩去核前胡一兩人參一兩京芎一兩木香三分檳榔七箇豆蔲去皮七箇枳殻一兩三分炒令黄色芍藥半兩當歸三分麝香半兩右一十六味同𢷬為末毎服一錢水一盞煎至五分熱服大治吐逆及酒後嘔吐不止胷膈悶不思飲食丁沉煎丸又名蓽澄茄丸治心腹冷氣不和絞刺痛疼大效蓽澄茄新者沉香木香丁香肉豆􅅳去皮檳榔茴香炒川苦楝子髙良薑官桂去皮當歸净洗去土切細焙乾蓬莪茂各一兩右十二味都杵羅為末用附子二兩炮烏頭二兩炮别杵為末用米醋五升浸硇砂一兩經一宿澄去砂石以此醋煑附子烏頭為糊溲和前藥末為劑杵三五百下為丸如彈子大毎服一丸細嚼丈夫炒生薑鹽湯下婦人炒生薑醋湯下有孕不可服但心腹諸疾服之必差大阿魏丸治男子女人一切冷氣霍亂吐㵼元氣將脫四肢厥冷本臟氣上攻築心疼悶絶不知人事及治傷冷傷寒或氣虚夾隂氣傷寒並見先服此用正真氣阿魏一兩半以醋化入白麫三兩匙同和為餅子炙令黄硫黄一兩半别研如粉青木香一兩附子一兩半炮石菖蒲一兩半並以米泔浸一宿炒檳榔白术各一兩炒乾薑半兩生桃仁三分麩炒去皮尖别研細當歸三分訶子一兩炮去核厚朴三分去粗皮以生薑汁塗炙净稱右一十二味除硫黄桃仁外同細杵為末次入硫黄桃仁同研令匀以稀麵糊為丸如梧桐子大毎服十丸温酒鹽湯任下女人醋湯下並用空心服如常服即大壯元氣進食駐顔理中丸治一切冷氣攻刺疼痛心腹脹滿胃冷吐逆臍腹撮疼阿魏一分用白麫兩匙醋和作餅子炙令黄熟荆三稜煨蓬莪茂煨甘草炙青橘皮去白陳橘皮去瓤乾薑炮乾木𤓰官桂去皮白术各一兩右一十味杵羅為末用麫糊為丸如櫻桃大以好硃砂為衣毎服一丸嚼破煎生薑木𤓰鹽湯下如婦人血臟氣攻刺即用炒當歸生薑湯嚼下一丸一切氣痛但服此藥必效順氣散調順冷氣解利傷寒吳茱茰洗令净春夏用一分秋冬用半兩麻黄一兩去節人參半兩訶子半兩煨去核稱大黄三分官桂一兩去皮厚朴一兩去皮薑汁炙乾薑半兩炮陳橘皮一兩去白甘草一兩炙右一十味同為末毎服一平錢水一中盞薑二片棗一箇同煎六分通口服如外傷風邪即先服此藥三服次喫發汗丸散必效蓽澄茄丸治丈夫元陽虚冷氣上衝心胷滿悶腸脇雷鳴或多攻刺嘔逆膨脹沉香丁香木香舶上茴香各半兩烏藥一兩白芷一兩一分胡盧根三分蓽澄茄一分右八味同為末煉蜜為丸如彈子大毎服一丸薑鹽湯嚼下硇砂木香丸治丈夫婦人一切冷氣攻刺疼痛或成積聚隠見不常發則㽲刺巴豆一兩去皮以紙出油盡為度别研硇砂半兩别研細後入巴豆時入諸藥中附子一枚炮去皮臍官桂去皮茱茰炒木香荆三稜炒舶上茴香乾薑炮丁香各一分右一十味同為末用乾柿一枚洗過輕蒸令軟和末丸如菉豆大取食利胷膈氣淡茶下十丸女人血氣及諸般氣艾酒下丈夫臟腑氣葱酒下化痰津液下酌其虚實加減丸數七香丸消化酒食毒破心胷冷氣攻刺疼痛丁香二分官桂一分青橘皮半兩縮砂半兩去皮木香一分檳榔三枚巴豆二十粒去皮膜以紙裹出油用右七味為末醋糊為丸如菉豆大毎服十丸十五丸薑湯茶酒任下勝金丸治冷熱氣不和不思飲食或腹痛㽲刺小梔子川烏頭各等分右同生杵為細末酒糊為丸如梧桐子大毎服十五丸炒生薑湯下如小腸氣痛炒茴香葱酒下二十丸沉香蓽澄茄散治一切冷氣不和及膀胱小腸氣疾常服即大妙能補䕶四十嵗已上者宜服之蓽澄茄沉香胡盧巴㣲炒破故紙㣲炒官桂去皮舶上茴香㣲炒川苦楝子炮搥破去核用肉木香紫巴㦸穿心者已上各一兩黒附子炮製去皮臍用四兩桃仁麫炒去皮尖用二兩川烏頭半兩泡去皮臍右一十二味同杵為細末毎服二錢水一大盞入鹽同煎至八分温服又小腸一切氣痛服之有效如空心入鹽㸃半錢熱服救生丹消酒食化滯氣空利胷膈丁香一分肉桂一分去皮大甘草七錢炒存性麫薑半兩燒存性木香一分巴豆十五箇去殻油煎令黒色為度右六味杵為細末以酒煑麫糊為丸如菉豆大茶酒送下三二丸硇砂丸消乆積食治心腹腸滿胷膈不利痰實胃噎硇砂炒者稱二錢平狼毒剉碎醋拌㣲炒乾用一兩芫花醋浸一宿炒黄色一兩乾漆一兩鼈甲醋炙黄香一兩硫黄一分細研如粉巴豆一十五枚去皮膜以醋一升煑令紫色右件杵羅為細末入研了藥一處同和令匀煑麵糊為丸豌豆大毎服三丸食後臨卧温生薑湯下萬金丸消化積滯調三焦空利胷膈定氣刺疼痛腹脇脹疼冷氣攻疰婦人血氣小兒夜啼胃冷痰涎並宜服之舶上硫黄一分巴豆去皮稱半兩二味同以生絹袋子盛於漿水内用文武火煑一伏時放冷别研令細柴胡半兩去苗附子一兩炮乾薑半兩桔梗一分青黛半兩當歸一分陳橘皮去白一分右九味同為細末以麵為丸如小豆大毎服二丸至三丸温水下婦人血氣醋湯下小兒夜啼常服一丸温水下水㵼生熟水下血淋地榆湯下白痢乾薑湯下痰涎併多生薑湯下一切氣疾煎生薑橘皮湯下並不以時候服三稜丸治積年五藏氣塊積滯荆三稜石三稜二味釅醋浸一宿取出切杵為末醋熬成膏鷄𤓰三稜炮青橘皮去白厚朴去皮薑汁塗炙硇砂以温水飛過熬成霜巴豆出油去皮膜已上各半兩檳榔二箇生用一箇炮用一箇肉豆􅅳一箇去殻木香一分乾漆一分炒右一十一味入於膏子内和𢷬一千下丸如菉豆大毎服五丸如氣痛茴香湯下臍下氣塊神麯湯下心膈氣禹餘粮湯下左脇塊柴胡湯下右脇木香湯下血氣塊當歸酒下血氣痛赤芍葯湯下五七丸氣針丸治久積風壅疎利滯氣空胷膈止刺疼牽牛二兩一半生一半炒木香青橘皮去白川大黄㣲炮檳榔各一兩右五味為末煉蜜為丸如梧桐子大毎服十五丸至二十丸以温水下三稜丸治積聚氣塊及和脾胃或心腹滿悶噎塞者荆三稜三兩擘破以好醋三升用文武火煑令盡為度勿於鐵器中枳殻去瓤麩炒一兩木香一兩青橘皮去白一兩檳榔一兩官桂去皮一兩甘草二兩炮右七味同杵為末毎服一大錢水一盞煎至七分去滓温服如患在膈上即食後服之膈噎通闗散治五膈氣噎塞妨悶遍身虚腫涕唾稠濁不下飲食麥蘖三錢馬兠鈴三錢訶子一枚芫花三錢漿水浸㣲炒硃砂一錢白丁香三錢硇砂二錢飛去砂石黄丹一錢白礬鉛白霜各一錢右一十味同研令至細匀毎服一錢半入膩粉兩文鷄子一箇去黄只取清調末却入鷄子殻内用濕紙裹慢火煨熟放冷爛嚼臘茶湯下臨卧服之來日逐下黒惡物永差如小可噎閉依法服一錢必效半夏散治五膈氣噎心胷不利涕唾稠粘飲食進退半夏半兩薑汁浸一宿焙乾厚朴半兩去皮薑汁炙枇杷葉炙去毛半兩肉豆􅅳一箇去殻母丁香二十五枚青丁香一塊棗大右六味為細末毎服一錢水八分盞煎六和滓熱服酒後服尤妙也檳榔散治胷膈注悶噎塞不快不思飲食大治脾胃一切病并腎膈氣醒酒化氣檳榔木香人參甘草炙乾薑炮官桂去皮青橘皮去白白术米泔浸一宿焙乾荆三稜擘破煨神麯炒厚朴去皮用薑湯炙令香黄色已上等分右十一味杵為末毎服㸃半錢入鹽少許如患脾胃病并腎膈氣毎服一錢入鹽湯服甚妙蓽撥散治噎疾虎頭王字骨酥炙額骨是也蓽撥㣲焙人參去蘆羚角屑已上各等分右四味為末每服二錢温水調下臨卧食後服博濟方卷二
