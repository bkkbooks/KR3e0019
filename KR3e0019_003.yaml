body:
  text: 博濟方卷三宋王衮編目疾目者五臟六腑之精華宗脈之所聚肝藏外候也藏府虛實風邪痰熱所乘風傳於肝上衝於目故為病多矣若血氣充實則瞻視分明若榮衛虛損則目多昏暗風冷則淚出勞熱則赤澀如久不愈往往變為大病其臟主血足厥隂是其經也防風散治風毒眼暴赤眼菊花防風甘草葳靈仙黃連牛蒡子各三分右杵為末每服一錢風眼蔥湯下赤目新汲水調下日可二服撥雲散治風毒眼目昏暗翳膜遮障菊花防風去蘆白蒺藜炒令黃羌活去蘆柴胡去蘆甘草炙各等分右六味同為末每服一錢半水一盞煎至六分食後臨卧溫服之大明散治一切風毒氣眼翳膜昏暗眼睛澀疼熱淚時多蟬退白蒺藜川羌活荆芥穗黃耆烏蛇皮各等分蛇皮蟬退二味入罐子內蓋口洗煆過右六味同為末研令勻每服一大錢酒調下日三服神效芎羌散治男女血風毒眼昏澀赤爛丈夫腎臟風毒氣眼昏癢腫疼退翳膜洗睛輪荆芥只用穗炒過牛蒡子炒木賊蒼术生用各等分右同為末每服二錢煎荆芥湯點臘茶調下日可三服空心日午臨卧各一服大效洗輪散治風毒攻疰眼目赤疼大退翳膜去瘀肉洗風砂鐡屑磁末因入目澀痛仙靈脾葉去梗秦皮黃連槐花各等分生犀少許鎊右五味同杵研為細末每服半錢以新水調澄清洗之砂鐡等不三兩洗自然退在水中如風毒眼即時每半錢水一盞煎至七分放熱洗之每服可經三次青金丹治丈夫女人一切風毒上攻眼目赤腫昏澀時發癢疼或緣眶赤爛冷淚頻多及氣毒上攻外障翳膜赤筋瘀肉並能理療小可暴赤眼腫痛點之立差銅青真者㽔仁以水浸去皮尖與銅青一處浸二宿去水爛研生犀淨水磨紙上飛過稱用真珠母以水磨控乾取下稱四味各一兩白丁香以水研飛過去滓控乾稱半錢海螵蛸水飛過乾稱半錢生龍腦細研半錢右七味各研磨後將銅青與㽔仁同殺研如糊次入白丁香研次入下三味後又殺研令勻細用細香墨濃研汁於淨器中相度和熟為度丸如菉豆大每丸用兒孩子乳汁化點之餘者且以紙蓋如點時乾再入乳汁化之未用者常以生腦子養在磁器中收貯羌活散治男子婦人小兒逺年近日毒氣上攻眼目昏暗赤澀瘀肉生瘡翳膜遮障不明及久患偏邪頭疼眼目漸小細及有夾腦風痛多視黑花但有此狀服藥五日見效羌活川芎天麻旋覆花青橘皮天南星炮藁本已上各一兩牽牛子六兩杵取二兩末餘者不用微焙乾右七味一處為末後入牽牛子末和勻取生薑自然汁煮麵糊為丸如梧桐子大每日食後溫酒鹽湯米飲任下二十丸日進三服不醫內外障及暴赤眼蟬蛻散治眼目赤疼澀腫兼生翳膜瘡等蟬殼地骨皮宣連牡丹皮白术蒼术菊花草龍膽已上各一兩甜瓜子半升右九味同杵為末每服一錢半瓜子荆芥同煎湯調下每日食後臨卧各一服大治時疾後餘毒上攻眼目甚效忌熱麵牙豆醋醬等仙术散治眼目翳膜遮障昏暗退翳蒼术一兩米泔浸淘一兩宿蟬殼一分淨去泥稱木賊一兩穀精草一分甘草一兩炙黃芩半兩蛇退皮一錢湯洗焙乾滴油杵右七味同為細末每服一錢空心臨卧冷水調下磁石丸治內外障翳不問年逺近及中一切疾磁石三兩須燒令透赤旋投淡醋內碎之十遍後搗篩過入乳鉢內用水少許研細泥更入水再研動傾於别器要隨水飛過後於灰上安紙箱子三五個便將所飛過汁都研動勻入紙箱子內著盆合却一宿取出後紙箱內曬乾或乾與衆藥相和牛膝一兩去苗頭一寸用漿水浸一宿時以無灰酒煮五伏以來却曬乾用之官桂一兩削去薄皮用之茯苓一兩半去皮用巴戟一兩去心用無灰酒煮五七沸以來却曬或焙乾乾薑一兩炮製去皮逺志一兩去心取上粗皮用地骨皮一兩去赤皮俠白者附子一兩炮去皮臍蓯蓉三兩水洗三兩遍用無灰酒浸兩日後更入少酒同三五沸來濕切碎拌和諸藥時入同杵熟為丸子覆盆子一兩去莖葉擇取子粒用防風一兩去苗頭一寸半用柏子仁一兩别研用紙裹壓去出油生地黃乾者二兩水洗三五遍細切曬乾鹿茸二兩取上軟者稱用之用無灰酒煮十餘沸已來去大皮焙乾用之右藥為末煉蜜為丸如桐子大一應丈夫女人所患者不計年月逺近或障翳侵塞或皮膜侵遍空心茶酒鹽湯任下二十至三十丸雖不覩三光服之必效忌動風炙煿物羚羊角飲子治班瘡後翳膜忽生及風毒暴赤等眼羚羊角用一對以索子札縳定一處鎊共取細末二兩再研如粉車前子決明子防風川升麻綿黃耆川大黃黃芩芒硝各二兩右九味同研為末每服二錢水二中盞煎至一盞半凡欲服藥時先將藥末以水浸一宿次日以此水并藥同煎熟却入磁瓶子內用油單紙封繫垂在井中一宿至次日取出微暖動臨卧時徐徐呷不得就枕頭睡至明見效如要急取功即空心日午時各喫一服祕金散治自幼久患疳氣上攻眼目羞明生翳久療不差大人有翳膜遮障但睛不損粗黃連沙參玄精石決明子各一兩右為末每服半錢用羊子肝一具竹刀子切作縫子糝末於內以線繫入瓶子內用米泔煮熟淡喫每箇作三服決明散治青盲眼夫五臟六腑之精氣皆上注於目若臟虛有風邪痰飲乘之有熱則赤痛無熱則內生障蓋臟腑血氣不榮盛於目故外壯不異而只不見物或加有痰熱則生翳如蠅翅狀覆在睛上此方乃至人傳授大效石決明草決明青箱子蛇蛻細辛井泉石甘草以上各等分右七味修事皆不得犯鐡器仍須用木臼中杵細杵羅然後用獖豬肝一具去膽膜淨洗瀝乾後用竹刀子隨肝竪切作縫子將上件藥末平稱一兩逐縫子糝入藥末畢後將麻線子細意札縳了却入生絹袋內牢縳定用上鍋子或瓦石鍋亦得入淘米濃泔煮之更入青竹葉一握枸把根一握黑豆三合同煮肝熟為度取出候冷仍先飽喫食後方用竹刀子逐片切喫旋呷元汁送下喫盡後更喫豆無妨久患者不過三兩具見效切請合藥時須潔淨敬信不得犯鐡器服未有不驗也洗頭明眼方鳯眼草即椿樹上固翅也燒灰淋水洗頭依日洗之經一年眼如童子眼明及加椿皮灰尤佳右用正月七日二月八日三月四日四月五日五月二日六月四日七月七日八月三日九月二十日十月二十三日十一月二十九日十二月十四日決明散治眼一切疾石決明草決明丹丞明又名丹丞石青箱子白芷甘草黃蘖黃連穀精草龍骨蔓菁草枳實牡礪枸把子蛇皮雄者五分雌者五分在草木屋上者雄沾土在地並為之雌者已上各用一兩羌活白蒺藜蟬退白附子黃耆各半兩魚子活水中生下者半兩其子滑硫黃水溫溫洗過虎睛一箇切作七片子每一度杵羅入一片子用文武火炙乾入候杵羅時一七遍了盡篩羅為度右藥每服七分五更時披衣以陳茶清調下日午臨卧凖前服之眥小弩肉細腫疼痛不可忍者三五日見效大假赤白翳膜遮睛久不可見光明者服一七日減三五分見物至第二七日取下眼中翳膜如赤白濃膠半月至三七日其眼好安如不患時復舊若根枯死者不療活者通醫訣曰如何知死活如有煩惱傷酒色遇風雨眼中疼痛者即是活眼也若或有此無淚不疼痛者名為無根也更不用此藥忌毒魚麵禁豬肉酒色等辰砂膏治一切眼疾白龍腦烏魚骨研至細飛過用川硝麝香好真者牛黃牙硝井鹽石膽各少許唯石膽多於衆藥硃砂明瑩者少許膩粉一大兩右件同研令勻至細為妙入白砂蜜和令得所以銅筯點之通神膏治眼生翳膜赤脈努肉澀癢痛有淚白砂蜜四兩青鹽一字麝香一字乳香硇砂半字當歸半錢黃連一錢白礬半字飛過右八味於乳鉢內輕研破於青竹筒內煮半日用綿濾去滓瓷瓶內收貯每點眼了瞑目少時以溫湯洗翳膜等並退紫金膏治外障退翳膜療風毒上攻眼疼赤腫或瞼眥癢爛時多熱淚昏澀大效槐嫩枝芽三十條於中春採窨乾收之如無收者以嫩枝子亦得谷丹先細研過抄二大錢宣連緊實者七枚子各長可二寸半白砂蜜四兩烏魚骨飛過抄二大錢輕粉抄三大錢乳香明淨者稱一錢許龍腦少許右先將槐枝并黃連用雪水或井花水亦得一碗半入銀石器內慢火熬及半盞許去滓次乳香碾碎先入又熬之候如一茶腳許先將蜜熬去滓放冷却入前熬者膏子及衆末攪勻再熬候金漆狀乃成入不犯水瓷器內收之每用少許點大妙明眼金波膏去瘀肉洗翳膜宣連四兩㽔仁半兩杏仁四十九粒金州蘖三兩已上二味捶碎以水二碗浸一宿於器內熬取半碗濾過右先將杏仁去尖雙仁以㽔仁於口內退皮同杏仁研如粉入前藥汁內同煎及一大盞更濾過入好蜜及藥九分入麝香一錢白礬一字飛過硇砂一字空青三錢如無只以生青代之略捶碎龍腦二錢以絹袋子盛在藥內又熬及一半許於冷水內滴直候藥在水上不散用小瓶子一箇封閉令密於飯甑上蒸三度逐度於井內拔過及冷為妙磁銀器內收貯點之如常法治療功能卒不可述甘石膏點眼昏花視物不明烏馬兒監司經驗方爐甘石研代赭石穀醋淬七次研黃丹各四兩水飛白沙蜜半斤右將二石碾為極細末次與黃丹和合用銅鍋將蜜煉去白沫更添水五六碗熬沸下煎藥以文武火熬用一碗用銅器攪試將藥滴水中沈下為度方可住火熬成用夾紙四重濾過用淨瓷器盛貯密封不要透下塵土恐點時癮眼如眼昏花不時點之有驗食膏治眼目昏花井鹽五錢無以青鹽代之訶子一箇去核黃連去鬚五錢烏賊魚骨二錢半去甲黃丹三兩水飛右為細末用好蜜一十兩熬去白沫濾淨入前藥末於銀銅器內用文武火慢熬用槐栁條攪成膏紫色為度用淨瓷器盛貯於地內埋一伏時去其火毒取出每用豆大一塊溫水化開洗眼耳病燒腎散治腎虛上攻耳內生瘡虛鳴及聾者磁石一兩燒赤醋淬十遍細研水飛過附子一兩炮製去皮臍巴戟一兩川椒一兩去目及開口者微炒去汗右四味搗羅為末每服用獖豬石子一隻去筋膜細切蔥白薤白各一分細切入藥末一錢鹽一字攪和令勻以十重濕紙裹於暖灰內燒熟空心細嚼酒解粥下十日內見效如聖散治水入耳內濃出疼痛日夜不止箭筸內蛀末如有蟲子一處同研令細用三錢麝香一錢膩粉一錢右三味一處同研細每用先以綿杖子搌淨然後可三剜耳子深送以綿塞定如覺放劄即是惡物要出去綿側耳令汁流出依前腫痛甚者三服差小膏子治凍耳兼療濕癬丹參一兩黃蠟半兩䜴一合蔥白五莖清油三兩右先將油煎三兩沸次入參豉煎令焦即濾去然後入蠟勻攪入磁合子內盛每患即塗之三兩上即差治蚰蜓入耳川烏頭三箇木鱉子七箇白礬五文白丁香一撮夜明砂一文烏雞糞三兩黃丹二文豬牙皂角一挺小兒衣帶一箇如無耳內血三兩滴亦得右九味一處細搗為末每服一字釅醋調灌入耳內少時蟲盡出齒鬚髮齒牙者骨之所終髓之所養手陽明支脈入於齒若髓氣不足陽明脈虛則不能榮於齒牙為風冷所傷故多疼痛既不榮盛固結為蟲食於齒牙則有孔蟲居其間又相傳受餘齒牽連疼痛陽明既虛則生壅熱熱則血氣妄行故令人齒牙宣露香臍散治牙齒搖動解骨槽毒氣却令堅牢香臍十箇無香者皮子是細切牛膝一斤去蘆細切木律四兩郁李仁二兩秋熟出子黃茄子二箇細切右五味入鐡臼內搗成相著握作團子後入罐子內上用瓦子蓋口留一小竅用鹽泥固濟燒罐子通赤候煙白色即住去火以新土罨一伏時取出入麝香一錢再同研細每日早晨揩痛處牙齒候須臾溫水潄口臨卧更貼少許咽津亦無妨和劑局方名麝臍散無麝香有升麻細辛用法並同泄牙散治牙齒浮動宣露疼痛聖濟總録名細辛散木律作梧桐淚荆芥去梗細辛莽草升麻各一兩木律半兩右同杵為末每服五錢水二盞入槐枝十數莖鹽二錢同煎令濃熱含冷吐麝香膏治大人小兒齒齦損爛及走馬疳麝香一分研豬牙皂角三挺燒存性用膩粉十兩黃蘖一兩白礬二兩水銀十兩蜜陀僧一兩緑礬一兩半同白礬杵碎入銚子內枯了用苦楝根白皮一兩右件杵為末用無灰酒三升熬成膏患者先淨潄口塗之久患者取藥一匙砒霜粉霜末各一錢拌和勻使絶妙黑散子治牙疳及宣露藁本升麻皂角不蛀者燒灰存性各半兩石膏一兩半右四味杵羅為末臨卧時以手指蘸揩擦齒上微潄存藥氣此散大能牢牙去臭黑金散烏髭鬢兼治牙齒一切疾麻籸二斤細杵不用羅地黃三斤揀擇勻停好者然後曬乾皂角六挺不蛀肥好者每挺截作三假青鹽三兩搗碎不用羅東引桃枝栁枝桑枝各十五截如大指大各長一握馬齒及盛時採一斤採時不得令婦人雞犬見採到即於淨室隂乾據數收用牆頭豆生者右藥用一斗三升瓦罐子新好者將前件藥物逐味分作三處逐一味一重重下於罐子內藥絶用一新瓦片可罐子口蓋覆仍於蓋子中心開一竅子出煙罐子周回以好黃土紙筋泥固濟候乾於淨房內用炭火四向慢慢燒之須是用火得所煙盡撥却火塞眼子却黃土焙一兩宿候冷取出藥其色如鴉羽於磁器內研細切勿犯鐵更入升麻白芷各一兩細研羅入於末內令勻以瓷器內收密封閉逐漸取出一匙頭許亦以小瓷器內收每日不以旦暮或食後揩齒表裏精細耐煩揩之悉令周回即合口須臾若不倦久長用之髭鬢自然黑潤異常牙齒堅白無脫口氣香潔合時切忌見婦人雞犬揩齒七聖散牢牙益齒白麵四兩皂角二挺不去皮子銼碎訶子一兩鹽一兩海鹽右件一處以麵裹用槐枝子燒煙盡為度後次入升麻細辛各一兩同杵為末每日早揩須臾潄口揩牙烏髭地散歌曰野客自仙鄉來呈變髮方南方採菵草內地取生薑筒漆豬牙皂烏麻及地黃兔絲都七味固濟入瓷缸火煆須連日黃烏終夜長藥成將揩齒功效實難量不惟髭髮黑兼亦夀延長菵草生薑切作片焙乾筒子漆豬牙皂角地黃兔絲子烏麻子胡麻代之亦得右件各四兩入瓶內以黃泥固濟火煆一日後入地一尺二寸深窖却三伏時取出盒子盛露三夜不得著日氣細羅為末如齒藥用之烏髭鬢揩齒法生乾地黃十二分好者細切升麻一兩碎之訶子二枚末白鹽花半分麻籸末四合取一遍打者粟饙飯一大合硃砂一兩細研臨燒時以沙牛糞調之免飛上右件都伴令勻於一淨沙瓶中盛密封頭通身遍泥隂乾七八日待泥乾入爐中坐之瓶四畔以炭火周回燒其炭續續添盡七斤即住其藥以為黑灰收之并細為末每日夜用之揩齒一如後法揩齒法欲使藥時用生薑一塊如杏仁大爛嚼須臾即吐却滓以左手指揩三五遍就濕指點末更揩十數遍含津不得吐以兩手取津塗髭髮待辛辣定即細細咽之此藥即兼治腳風腸風下氣駐顔益齒若能勤用一生不白髭髮一百日却黑赤者五十日黑用藥二十日即便見效也若能空心三遍用更飯後用之見效即速矣眩暈頭風眩暈者由血氣虛為風邪所乘也諸陽經脈上走於頭靣因運動勞役陽氣發泄腠理開疏而受風邪頭風之狀頭靣多汗惡風甚則頭疼心煩悶或因新浴髮中外風亦為此病久不差眩暈由風邪流入于腦腦轉而目系急目系急故成眩暈也其脈寸口洪大而長是也服大效香砂丸必愈大效香砂丸巴豆生出油去皮生硃乳香當歸去苗細辛丁香少許官桂少許去皮龍腦五十文麝香五十文檳榔用少許右各等分為末以水浸蒸餅和為丸如桐子大發日用好茶下一丸須是當門齒與冷茶嚼下十年只用一粒額上汗出即差獨活散治風毒氣上攻頭目疼痛昏眩不快利膈化痰獨活川芎甘菊各一兩乾葛一分炒防風一兩半夏湯洗去滑作餅子炙二兩右五味同為末以半夏末用生薑自然汁一大盞煮如膏和為丸如豌豆大每服七丸至十丸荆芥薄荷湯下伊祁丸治肝腎虛氣上攻頭旋項筋急眼有黑花耳內虛鳴伊祁半兩點醋微炒穿心巴戟糯米炒候赤黃去米不用沙苑白蒺藜慢火微炒黑附子炮去皮臍羌活去蘆各一兩右五味同為末煉蜜為丸如梧桐子大空心鹽酒下十五丸二十丸食後臨卧米飲下芎术湯治冒雨中濕眩暈嘔逆頭重不食川芎半夏湯泡七次白术各一兩甘草炙半兩右㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候咳喘華蓋散治咳嗽解表滋潤皮膚調理自然汗出麻黃三兩不去節甘草一兩杏仁二兩湯浸去皮尖右三味先以前二味為粗末後入杏仁研細同拌令勻每服三錢水一盞煎至七分去滓服每日三服紫蘇飲治咳嗽墜痰涎潤肺紫蘇貝母欵冬花漢防己各一分右四味研為細末每服一錢水一茶碗煎至七分溫溫服之欵肺散治寒壅相交咳嗽不止胸膈悶亂痰涎併多麻黃二兩去根節炒貝母桑白皮各一兩銼炒柴胡杏仁一兩去皮尖炒欵冬花一兩去塵砂糯米一兩右七味新好者杵為末每服一大錢水一盞煎七分溫服不拘時候阿膠散治久患咳嗽及勞嗽阿膠二兩炒過如無以黃明膠四兩代亦得炒過用人參半兩杏仁二十箇去皮尖黃蜀葵花一分甘草半分欵冬花一分右六味同杵為末每服二錢早晨用糯米粥一盂子入末熱喫晚食前再服如只用糯米濃飲調下亦得黑靈丸治咳嗽不以日近年深皆效羌活獨活各一分巴豆三十粒不去皮半夏三十箇同入瓶子內鹽泥固濟炭火三斤煆取出入前二味右同杵為末煉蜜為丸如桐子大每服一丸以後味藥煎湯下馬兜鈴半兩官桂一分甜葶藶半兩微炒右三味同杵為末每服一錢水一盞煎至八分下丸子其餘飲子時時呷令藥香常在咽喉中華蓋散治上喘咳嗽兼治膈熱桑白皮神麴炒桔梗各一兩人參三分百合三分